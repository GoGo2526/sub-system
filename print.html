<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>觀塘官立小學(秀明道)-代課通知單系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            color: #1a1a1a;
        }

        /* 預覽容器 */
        .preview-area {
            max-width: 900px;
            margin: 20px auto;
            padding: 0;
        }

        /* A4 紙張樣式 (預覽用) */
        .a4-page {
            background: white;
            width: 210mm;
            min-height: 297mm;
            padding: 15mm 15mm 15mm 15mm; 
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
        }

        /* 校名標頭 */
        .school-header {
            border-bottom: 3px solid black;
            padding-bottom: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        /* 表格樣式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        th, td {
            border: 2px solid black;
            padding: 8px 6px;
            text-align: center;
            font-weight: bold;
            font-size: 15px; /* 表格內文字大小保持不變 */
        }

        th {
            background-color: #d1d5db !important;
            color: black;
        }

        /* 控制列 */
        .toolbar {
            position: -webkit-sticky; /* 增加 iOS 系統的固定支援 */
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e5e7eb;
        }

        /* 手機觀看版面寬度與左右滑動設定 */
        @media screen and (max-width: 768px) {
            html, body {
                overflow: hidden; /* 鎖定網頁整體滾動，確保頂部工具列完全固定不動 */
                height: 100%;
                height: 100dvh; /* 支援手機動態視窗高度 */
                display: flex;
                flex-direction: column;
            }
            .toolbar {
                position: relative;
                flex-shrink: 0;
                margin-bottom: 0 !important; /* 避免 flex 佈局下底部產生多餘空白 */
            }
            .preview-area {
                width: 100%;
                flex: 1; /* 自動填滿下方剩餘空間 */
                overflow: auto; /* 允許下方的文件區域獨立上下左右滑動 */
                -webkit-overflow-scrolling: touch; /* 讓手機(如 iOS)的滑動體驗更順暢 */
                padding: 10px 0;
            }
            .a4-page {
                margin: 0 10px 20px 10px; /* 在滑動區域內為文件保留適當邊距 */
                /* width 維持原有的 210mm，確保內部文字與表格不變形，並能觸發滑動 */
            }
        }

        /* 列印專屬設定 */
        @page {
            size: A4 portrait; /* 預設A4直印 */
            margin: 0mm; /* 邊界設為0mm，藉此強制消除瀏覽器預設列印的網址、頁數及日期 */
        }

        @media print {
            html, body { 
                background: white; 
                margin: 0; 
                padding: 0; 
                width: 210mm;
                height: 297mm;
            }
            .preview-area { margin: 0; padding: 0; max-width: none; }
            .no-print { display: none !important; }
            .a4-page {
                box-shadow: none;
                margin: 0;
                width: 100%; /* 自動調整文件寬度 */
                height: 296.5mm; /* 固定一頁大小，稍微減去0.5mm避免溢出產生空白頁 */
                padding: 15mm; /* 邊框保留合適距離 */
                page-break-after: always; /* 強制分頁，確保存檔與教師副本獨立印於新的一頁 */
                page-break-inside: avoid;
                box-sizing: border-box;
                overflow: hidden;
            }
            .a4-page:last-child { page-break-after: auto; }
            th { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="toolbar no-print p-4 shadow-sm mb-4">
    <div class="max-w-5xl mx-auto flex flex-wrap md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-3 flex-1 min-w-[280px]">
            <div class="bg-blue-600 p-2 rounded-lg text-white shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </div>
            <div>
                <!-- 更改左上角名稱，加上自動縮放及換行設定 -->
                <h1 class="text-lg md:text-xl font-bold break-words leading-tight">
                    <span class="block md:inline-block">觀塘官立小學(秀明道)</span>
                    <span class="hidden md:inline-flex items-center">-代課通知單系統
                        <button onclick="window.history.back()" class="ml-2 bg-gray-200 hover:bg-gray-300 text-gray-800 text-sm px-2 py-0.5 rounded shadow-sm transition-colors cursor-pointer" title="返回上一頁">←</button>
                    </span>
                    <span class="md:hidden flex items-center mt-0.5">代課通知單系統
                        <button onclick="window.history.back()" class="ml-2 bg-gray-200 hover:bg-gray-300 text-gray-800 text-sm px-2 py-0.5 rounded shadow-sm transition-colors cursor-pointer" title="返回上一頁">←</button>
                    </span>
                </h1>
            </div>
        </div>

        <!-- 按鈕隨網頁改變大小並更新顏色 -->
        <div class="flex flex-wrap w-full md:w-auto gap-3">
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" class="hidden" onchange="handleFile(event)">
            <button onclick="document.getElementById('fileInput').click()" class="flex-1 md:flex-none justify-center flex items-center gap-2 px-4 py-2.5 bg-green-700 text-white border border-transparent rounded-md hover:bg-green-800 transition font-medium text-base shadow-sm min-w-[140px]">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                匯入試算表
            </button>
            <button onclick="window.print()" class="flex-1 md:flex-none justify-center flex items-center gap-2 px-4 py-2.5 bg-blue-800 text-white rounded-md hover:bg-blue-900 transition font-medium text-base shadow-sm min-w-[140px]">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                列印通知單
            </button>
        </div>
    </div>
</div>

<div id="loading" class="no-print hidden fixed inset-0 bg-black bg-opacity-20 z-50 flex items-center justify-center">
    <div class="bg-white p-4 rounded-lg shadow-xl flex items-center gap-3">
        <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div>
        <span class="font-medium">正在處理資料...</span>
    </div>
</div>

<div id="renderTarget" class="preview-area">
    <div class="no-print text-center py-20 text-gray-400">
        <p>尚未匯入資料，請點擊上方「匯入試算表」按鈕開始。</p>
        <p class="text-sm mt-2">支援 .xlsx 或 .csv 格式</p>
    </div>
</div>

<script>
    const PERIOD_TIMES = {
        "班主任節": "08:15 - 08:35",
        "第一節": "08:35 - 09:10",
        "第二節": "09:10 - 09:45",
        "小息": "09:45 - 10:05",
        "第三節": "10:05 - 10:40",
        "第四節": "10:40 - 11:15",
        "第五節": "11:15 - 11:50",
        "午膳": "11:50 - 12:45",
        "第六節": "12:45 - 13:20",
        "第七節": "13:20 - 13:55",
        "第八節": "13:55 - 14:30",
        "第九節": "14:30 - 15:05"
    };

    function formatDateWithDay(dateInput) {
        if (!dateInput) return "";
        let date;
        
        if (!isNaN(dateInput) && typeof dateInput === 'number') {
            date = new Date((dateInput - 25569) * 86400 * 1000);
        } else {
            const cleanDate = String(dateInput).replace(/年|月/g, '-').replace(/日/g, '');
            date = new Date(cleanDate);
        }

        if (isNaN(date.getTime())) return String(dateInput);

        const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        const y = date.getFullYear();
        const m = date.getMonth() + 1;
        const d = date.getDate();
        return `${y}年${m}月${d}日 (${days[date.getDay()]})`;
    }

    function getFileId(dateStr) {
        const nums = String(dateStr).replace(/\D/g, '');
        return `SUB-${nums.substring(0, 8) || 'NEW'}`;
    }

    async function handleFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        document.getElementById('loading').classList.remove('hidden');
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                
                renderNotices(processData(jsonData));
            } catch (err) {
                console.error(err);
                alert('讀取檔案失敗，請確保 Excel 格式正確且包含必要的標題列。');
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function processData(rows) {
        const groups = {};
        
        rows.forEach(row => {
            const teacher = row["原任老師"] || row["教師名稱"] || "未知老師";
            const date = row["代課日期"] || row["日期"] || new Date().toLocaleDateString();
            const key = `${teacher}_${date}`;
            
            if (!groups[key]) {
                groups[key] = {
                    originalTeacher: teacher,
                    date: formatDateWithDay(date),
                    fileNumber: row["處理編號"] || getFileId(date),
                    absenceReason: row["缺課原因"] || "職務需要",
                    records: []
                };
            }
            
            let period = row["節數"] || "";
            let time = row["時段"] || PERIOD_TIMES[period] || "";

            groups[key].records.push({
                period: period,
                time: time,
                className: row["班別"] || "",
                subject: row["科目"] || "",
                subTeacher: row["代課老師"] || "",
                swappedClass: row["對調課堂"] || ""
            });
        });
        
        return Object.values(groups);
    }

    function generateNoticeComponent(data, typeLabel) {
        const rows = data.records.map(r => `
            <tr>
                <td class="whitespace-nowrap">${data.originalTeacher}</td>
                <td class="whitespace-nowrap">${r.period}</td>
                <td class="whitespace-nowrap">${r.time}</td>
                <td class="whitespace-nowrap">${r.className}</td>
                <td class="whitespace-nowrap">${r.subject}</td>
                <td class="whitespace-nowrap">${r.subTeacher}</td>
                <td class="whitespace-nowrap">${r.swappedClass}</td>
            </tr>
        `).join('');

        const emptyRowsNeeded = Math.max(0, 4 - data.records.length);
        const emptyRows = Array(emptyRowsNeeded).fill('<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>').join('');

        return `
            <div class="notice-section h-full flex flex-col">
                <div class="school-header">
                    <div>
                        <!-- 放大中英學校名稱 -->
                        <h2 class="text-3xl font-black tracking-wide">觀塘官立小學(秀明道)</h2>
                        <p class="text-sm font-bold tracking-tighter mt-1">KWUN TONG GOVERNMENT PRIMARY SCHOOL (SAU MING ROAD)</p>
                    </div>
                    <!-- 放大存檔副本/教師副本文字 -->
                    <div class="border-2 border-black px-3 py-1 text-base font-bold bg-gray-100 flex items-center">
                        ${typeLabel}
                    </div>
                </div>

                <!-- 取消底線，並增加與下一行的距離 (mb-8) -->
                <div class="text-center mt-4 mb-8">
                    <h3 class="text-3xl font-black">代課通知單</h3>
                </div>

                <!-- 文字放大為 text-lg，使用 flex-wrap 自動調節欄位大小 -->
                <div class="flex flex-wrap gap-x-6 gap-y-5 mb-6 text-lg font-bold">
                    <div class="flex items-end flex-1 min-w-[45%]">原任老師：<span class="border-b border-black flex-1 text-center pb-0.5 ml-1 break-words">${data.originalTeacher}</span></div>
                    <div class="flex items-end flex-1 min-w-[45%]">代課日期：<span class="border-b border-black flex-1 text-center pb-0.5 ml-1 break-words">${data.date}</span></div>
                    <div class="flex items-end flex-1 min-w-[45%]">缺課原因：<span class="border-b border-black flex-1 text-center pb-0.5 ml-1 break-words">${data.absenceReason}</span></div>
                    <div class="flex items-end flex-1 min-w-[45%]">檔案編號：<span class="border-b border-black flex-1 text-center pb-0.5 ml-1 break-words">${data.fileNumber}</span></div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th class="whitespace-nowrap">原任老師</th>
                            <th class="whitespace-nowrap">節數</th>
                            <th class="whitespace-nowrap">時段</th>
                            <th class="whitespace-nowrap">班別</th>
                            <th class="whitespace-nowrap">科目</th>
                            <th class="whitespace-nowrap">代課老師</th>
                            <th class="whitespace-nowrap">對調課堂</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                        ${emptyRows}
                    </tbody>
                </table>

                <!-- 放大備註欄位標題與方格內文字 -->
                <div class="mt-6 text-lg font-bold flex-1">
                    <p class="mb-2">備註 / 注意事項：</p>
                    <div class="border border-black p-3 font-normal leading-relaxed text-base">
                        <p>1. 請代課老師準時到達課室。</p>
                        <p>2. 如有學生缺席，請盡快通知校務處。</p>
                    </div>
                    
                    <!-- 放大簽署區文字與列印日期 -->
                    <div class="flex justify-between mt-12 text-lg">
                        <div class="flex items-end">負責老師簽署：<span class="border-b border-black w-48 inline-block ml-1"></span></div>
                        <div class="flex items-end">列印日期：<span class="border-b border-black w-48 inline-block ml-1 text-center">${new Date().getFullYear()}年${new Date().getMonth() + 1}月${new Date().getDate()}日</span></div>
                    </div>
                </div>
            </div>
        `;
    }

    function renderNotices(allGroups) {
        const target = document.getElementById('renderTarget');
        target.innerHTML = '';

        allGroups.forEach(group => {
            const officePage = document.createElement('div');
            officePage.className = 'a4-page';
            officePage.innerHTML = generateNoticeComponent(group, '存檔副本 (Office Copy)');
            target.appendChild(officePage);
            
            const teacherPage = document.createElement('div');
            teacherPage.className = 'a4-page';
            teacherPage.innerHTML = generateNoticeComponent(group, '教師副本 (Teacher\'s Copy)');
            target.appendChild(teacherPage);
        });
    }
</script>

</body>
</html>
