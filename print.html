<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代課通知單系統 - 雙副本版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
        }

        /* 容器樣式 */
        .page-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        /* 通知單基本結構 */
        .notice-card {
            background-color: white;
            width: 100%;
            position: relative;
        }

        /* 分隔線 */
        .copy-divider {
            border-top: 2px dashed #ccc;
            margin: 40px 0;
            position: relative;
        }
        .copy-divider::after {
            content: "剪裁線";
            position: absolute;
            right: 0;
            top: -12px;
            font-size: 12px;
            color: #999;
            background: white;
            padding-left: 10px;
        }

        .school-header {
            border-bottom: 3px solid black;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th, td {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        /* 修改標頭底色為深灰色 */
        th {
            background-color: #9ca3af; /* Tailwind gray-400 */
        }

        .import-btn {
            background-color: #e0f2fe;
            color: #0369a1;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            border: 1px solid #bae6fd;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 列印特定樣式 */
        @media print {
            @page {
                size: A4 portrait;
                margin: 1.5cm;
            }
            body {
                background-color: white;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
            .page-container {
                box-shadow: none;
                border: none;
                padding: 0;
                max-width: 100%;
            }
            /* 如果內容太長，強制分頁 */
            .page-break {
                page-break-before: always;
            }
            .copy-divider {
                border-top: 1px solid #000; /* 列印時實線或隱藏 */
            }
            th {
                background-color: #9ca3af !important; /* 確保列印時保留底色 */
                -webkit-print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

<!-- 操作列 -->
<div class="no-print flex justify-end max-w-[1000px] mx-auto mb-6 gap-4">
    <input type="file" id="fileInput" accept=".json,.csv" class="hidden" onchange="handleFileUpload(event)">
    <button class="import-btn" onclick="document.getElementById('fileInput').click()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        匯入檔案
    </button>
    <button onclick="window.print()" class="bg-gray-800 text-white px-6 py-2 rounded-md font-bold hover:bg-gray-700 transition-colors">
        列印通知單
    </button>
</div>

<div class="page-container" id="mainContent">
    <!-- 這裡會由 JS 生成兩份副本 -->
    <div id="noticesWrapper"></div>
</div>

<script>
    // 預設初始資料
    let currentData = {
        date: "2024年5月20日 (星期一)",
        refNumber: "SUB-20240520-01",
        records: [
            {"原任老師": "陳大文 老師 (CHW)", "節數": "1", "班別": "1A", "科目": "中文", "代課老師": "張小明 老師 (CSM)"},
            {"原任老師": "陳大文 老師 (CHW)", "節數": "2", "班別": "1A", "科目": "中文", "代課老師": ""},
            {"原任老師": "陳大文 老師 (CHW)", "節數": "4", "班別": "2B", "科目": "常識", "代課老師": ""},
            {"原任老師": "陳大文 老師 (CHW)", "節數": "5", "班別": "3C", "科目": "數學", "代課老師": ""}
        ]
    };

    /**
     * 輔助函數：解析日期字串並獲取星期
     */
    function formatWithDayOfWeek(dateStr) {
        if (!dateStr) return "";
        
        // 如果已經包含括號或「星期」，則不重複處理
        if (dateStr.includes('(') || dateStr.includes('星期')) return dateStr;

        // 嘗試清理字串並解析 (例如將「2024年5月20日」轉為日期對象)
        const cleanDateStr = dateStr.replace('年', '-').replace('月', '-').replace('日', '');
        const dateObj = new Date(cleanDateStr);
        
        if (isNaN(dateObj.getTime())) return dateStr; // 無法解析則回傳原樣

        const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        const dayName = days[dateObj.getDay()];
        
        return `${dateStr} (${dayName})`;
    }

    /**
     * 生成單份通知單的 HTML 結構
     */
    function createNoticeHTML(titleTag, typeLabel) {
        const records = currentData.records || [];
        let rowsHtml = '';
        
        records.forEach((row, index) => {
            const prevRow = records[index - 1];
            // 處理跨行顯示：如果老師名相同則留空
            const originalTeacher = (prevRow && prevRow["原任老師"] === row["原任老師"]) ? "" : (row["原任老師"] || "");
            const substituteTeacher = (prevRow && prevRow["代課老師"] === row["代課老師"]) ? "" : (row["代課老師"] || "");

            rowsHtml += `
                <tr>
                    <td>${originalTeacher}</td>
                    <td>${row["節數"] || ""}</td>
                    <td>${row["班別"] || ""}</td>
                    <td>${row["科目"] || ""}</td>
                    <td>${substituteTeacher}</td>
                </tr>
            `;
        });

        // 補齊最少 4 行
        for (let i = records.length; i < 4; i++) {
            rowsHtml += '<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>';
        }

        return `
            <div class="notice-card">
                <div class="school-header">
                    <div>
                        <h1 class="text-2xl font-bold">觀塘官立小學(秀明道)</h1>
                        <p class="text-sm font-semibold tracking-tighter">KWUN TONG GOVERNMENT PRIMARY SCHOOL (SAU MING ROAD)</p>
                    </div>
                    <div class="border-2 border-black px-2 py-1 text-sm font-bold">
                        ${typeLabel}
                    </div>
                </div>

                <div class="text-center my-6">
                    <h2 class="text-4xl font-bold underline underline-offset-8 decoration-2">代課通知單</h2>
                </div>

                <div class="flex justify-between font-bold mb-4 text-lg">
                    <div>代課日期：<span class="border-b-2 border-black inline-block min-w-[200px] pb-1">${currentData.date}</span></div>
                    <div>處理編號：<span class="border-b-2 border-black inline-block min-w-[150px] pb-1 text-center">${currentData.refNumber}</span></div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th width="25%">原任老師</th>
                            <th width="12%">節數</th>
                            <th width="13%">班別</th>
                            <th width="20%">科目</th>
                            <th width="30%">代課老師</th>
                        </tr>
                    </thead>
                    <tbody>${rowsHtml}</tbody>
                </table>

                <div class="mt-6 font-bold italic">
                    <p>備註 / 注意事項：</p>
                    <div class="border-2 border-black p-4 mt-2 font-normal not-italic text-sm">
                        <p>1. 請代課老師準時到達教室。</p>
                        <p>2. 如有學生缺席，請即時通知校務處。</p>
                    </div>
                </div>
            </div>
        `;
    }

    /**
     * 更新畫面內容
     */
    function updateDisplay() {
        const wrapper = document.getElementById('noticesWrapper');
        
        // 渲染存檔副本
        const officeCopy = createNoticeHTML('office', '存檔副本 (Office Copy)');
        // 渲染教師副本
        const teacherCopy = createNoticeHTML('teacher', '教師副本 (Teacher\'s Copy)');

        // 判斷是否需要分頁：如果資料列超過 8 列，則強制分頁
        const needsPageBreak = currentData.records.length > 8;
        const dividerClass = needsPageBreak ? 'page-break' : 'copy-divider';

        wrapper.innerHTML = `
            <div id="office-section">${officeCopy}</div>
            <div class="${dividerClass}"></div>
            <div id="teacher-section">${teacherCopy}</div>
        `;
    }

    /**
     * 處理檔案匯入
     */
    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            try {
                if (file.name.endsWith('.json')) {
                    const json = JSON.parse(content);
                    currentData = json;
                    // 自動處理日期
                    currentData.date = formatWithDayOfWeek(currentData.date);
                } else {
                    currentData = parseCSV(content);
                }
                updateDisplay();
            } catch (err) {
                alert("讀取檔案失敗，請檢查格式是否正確。");
            }
        };
        reader.readAsText(file);
    }

    function parseCSV(csvText) {
        const lines = csvText.split('\n').filter(line => line.trim() !== '');
        const headers = lines[0].split(',').map(h => h.trim());
        const records = [];
        
        for(let i = 1; i < lines.length; i++) {
            const values = lines[i].split(',').map(v => v.trim());
            const obj = {};
            headers.forEach((h, idx) => obj[h] = values[idx]);
            records.push(obj);
        }

        const rawDate = records[0]?.["代課日期"] || "未提供日期";
        
        return {
            date: formatWithDayOfWeek(rawDate), // 自動處理日期
            refNumber: records[0]?.["處理編號"] || "SUB-NEW",
            records: records
        };
    }

    // 初始化顯示
    window.onload = updateDisplay;
</script>

</body>
</html>
