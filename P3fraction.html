<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三年級數學 - 分數大挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            background-color: #f1f5f9;
            touch-action: manipulation;
        }
        .fraction-num { border-bottom: 3px solid #1e293b; padding: 0 4px; min-width: 35px; text-align: center; }
        .fraction-den { padding: 0 4px; min-width: 35px; text-align: center; }
        
        .drop-zone {
            min-height: 150px;
            border: 3px dashed #cbd5e1;
            border-radius: 1.5rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            position: relative;
        }
        .drop-zone.active {
            border-color: #3b82f6;
            background-color: #eff6ff;
            transform: scale(1.05);
        }
        .draggable {
            cursor: grab;
            touch-action: none; /* 重要：防止觸控時頁面捲動 */
            user-select: none;
            z-index: 10;
        }
        .draggable:active { cursor: grabbing; }
        .dragging {
            opacity: 0.5;
            transform: scale(1.1);
        }
        
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .animate-bounce-slow { animation: bounce-slow 2s infinite; }

        .qr-overlay {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="game-app" class="max-w-5xl mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200 min-h-[600px] flex flex-col">
        <!-- 頂部狀態列 -->
        <div id="status-bar" class="bg-gradient-to-r from-indigo-600 to-blue-700 text-white p-6 flex justify-between items-center hidden">
            <div>
                <h1 class="text-2xl font-black tracking-tight">分數大挑戰</h1>
                <p id="level-text" class="text-blue-100 text-sm font-bold mt-1">比賽進行中</p>
            </div>
            <div class="flex gap-8">
                <div class="text-center">
                    <p class="text-[10px] uppercase font-bold opacity-70">目前得分</p>
                    <p id="score" class="text-4xl font-black">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] uppercase font-bold opacity-70">倒數</p>
                    <p id="timer" class="text-4xl font-black text-yellow-300">--</p>
                </div>
            </div>
        </div>

        <!-- 1. 初始模式選擇畫面 -->
        <div id="start-screen" class="p-8 md:p-16 flex flex-col items-center justify-center flex-1 text-center">
            <div class="mb-8">
                <div class="text-6xl mb-4">🍕</div>
                <h2 class="text-5xl font-black text-slate-800 leading-tight mb-2">分數排列大挑戰</h2>
                <p class="text-slate-500 font-bold text-xl">請選擇比賽模式開始</p>
            </div>
            
            <div class="max-w-md w-full space-y-6">
                <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100">
                    <label class="block text-slate-600 font-bold mb-2">預設比賽總題數：</label>
                    <input type="number" id="total-levels-input" value="10" min="5" max="30" class="w-full text-center text-2xl font-black p-3 rounded-xl border-2 border-indigo-100 focus:border-indigo-500 outline-none">
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <button onclick="prepareGame('random')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-5 rounded-2xl font-black text-xl transition-all shadow-xl hover:shadow-indigo-200">
                        建立隨機比賽 (出現QR Code)
                    </button>
                    <button onclick="showTeacherMode()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-8 py-5 rounded-2xl font-bold text-xl transition-all">
                        建立自訂題目比賽
                    </button>
                </div>
            </div>
        </div>

        <!-- 2. QR Code 等待進入畫面 -->
        <div id="qr-screen" class="hidden fixed inset-0 z-50 qr-overlay flex flex-col items-center justify-center p-8 text-center">
            <div class="max-w-2xl w-full">
                <h2 class="text-4xl font-black text-indigo-900 mb-2">比賽已就緒！</h2>
                <p class="text-slate-500 text-xl font-bold mb-8">請學生使用平板掃描下方 QR Code 加入</p>
                
                <div class="bg-white p-8 rounded-[3rem] shadow-2xl border-4 border-indigo-100 inline-block mb-10">
                    <div id="qr-code-box" class="min-w-[250px] min-h-[250px] flex items-center justify-center">
                        <!-- QR Code 將生成在此 -->
                    </div>
                </div>

                <div class="space-y-4">
                    <button onclick="finalStart()" class="w-full bg-green-500 hover:bg-green-600 text-white py-6 rounded-3xl font-black text-3xl shadow-xl transition-transform hover:scale-105 active:scale-95">
                        所有人已加入，正式開始！
                    </button>
                    <button onclick="cancelPrepare()" class="text-slate-400 font-bold hover:text-slate-600">返回修改設定</button>
                </div>
            </div>
        </div>

        <!-- 3. 遊戲進行畫面 -->
        <div id="game-screen" class="hidden p-8 flex-1">
            <div class="text-center mb-10">
                <div id="sort-order-badge" class="inline-block px-6 py-2 rounded-full text-white font-black text-lg mb-4 shadow-md">
                    載入中...
                </div>
                <h3 id="main-instruction" class="text-3xl font-black text-slate-800">請按順序排列分數</h3>
            </div>

            <div id="fraction-pool" class="flex justify-center flex-wrap gap-6 mb-16 min-h-[140px] p-8 bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200"></div>

            <div id="drop-area" class="flex flex-wrap justify-center items-center gap-4 mb-12"></div>

            <div class="flex justify-center">
                <button id="submit-btn" disabled onclick="checkAnswer()" class="bg-green-600 hover:bg-green-700 text-white px-16 py-5 rounded-2xl font-black text-2xl disabled:opacity-20 transition-all shadow-xl">提交答案</button>
            </div>
        </div>

        <!-- 教師面板 -->
        <div id="teacher-panel" class="hidden fixed inset-0 z-40 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
            <div class="bg-white rounded-[2.5rem] w-full max-w-2xl p-10 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-3xl font-black">教師題目自訂</h3>
                    <button onclick="hideTeacherMode()" class="text-slate-300 hover:text-slate-600 text-2xl">✖</button>
                </div>
                <p class="text-slate-500 mb-6 font-bold">每行一題，分數用逗號隔開（如 1/2, 2/3）。</p>
                <textarea id="preset-input" class="w-full h-48 p-6 border-2 rounded-2xl mb-6 font-mono text-lg focus:ring-4 focus:ring-indigo-100 outline-none" placeholder="1/2, 1/3, 1/4&#10;2/5, 4/5&#10;3/7, 3/8, 3/10"></textarea>
                <button onclick="savePresets()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-xl hover:bg-indigo-700 transition-all shadow-lg">保存並進入比賽 (出現QR Code)</button>
            </div>
        </div>

        <!-- 反饋彈窗 -->
        <div id="feedback-overlay" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-4 z-[60]">
            <div class="bg-white rounded-[3rem] p-10 max-w-4xl w-full shadow-2xl border-4 border-white text-center">
                <div id="feedback-icon" class="text-8xl mb-4"></div>
                <h3 id="feedback-title" class="text-4xl font-black mb-6"></h3>
                <div id="logic-hint" class="block w-full p-8 bg-blue-50 border-2 border-blue-100 text-blue-900 rounded-[2rem] text-2xl font-black mb-8"></div>
                <div class="p-8 bg-slate-100 rounded-[2rem] mb-8">
                    <div id="correct-visual" class="flex justify-center flex-wrap gap-8"></div>
                </div>
                <button onclick="nextLevel()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-6 rounded-2xl font-black text-2xl shadow-xl">繼續挑戰下一題</button>
            </div>
        </div>

        <!-- 結算畫面 -->
        <div id="end-screen" class="hidden p-16 text-center flex-1">
            <div id="result-icon" class="text-9xl mb-8 animate-bounce-slow"></div>
            <h2 id="result-comment" class="text-5xl font-black mb-6"></h2>
            <div class="inline-block px-12 py-4 bg-slate-100 rounded-3xl mb-12">
                <p class="text-2xl font-bold text-slate-500">最終得分</p>
                <p id="final-score" class="text-7xl font-black text-indigo-600">0</p>
            </div>
            <button onclick="location.reload()" class="block mx-auto bg-indigo-600 text-white px-16 py-6 rounded-3xl font-black text-2xl shadow-2xl hover:scale-105 transition-transform">返回主選單</button>
        </div>
    </div>

    <script>
        let score = 0; 
        let timeLeft = 60;
        let timerInterval;
        let currentLevel = 0;
        let levels = [];
        let totalLevelsCount = 10;
        let draggedElement = null;
        let isAscending = true;

        // 觸控拖拽變數
        let touchOffsetX = 0;
        let touchOffsetY = 0;
        let originalParent = null;

        // 生成 QR Code
        function generateQRCode() {
            const currentUrl = window.location.href;
            const qrBox = document.getElementById('qr-code-box');
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(currentUrl)}`;
            qrBox.innerHTML = `<img src="${qrUrl}" class="w-64 h-64 shadow-lg rounded-xl" alt="Game QR Code">`;
        }

        // 準備階段 (顯示 QR Code)
        function prepareGame(mode) {
            if (mode === 'random') {
                totalLevelsCount = parseInt(document.getElementById('total-levels-input').value) || 10;
                levels = generateRandomLevels(totalLevelsCount);
            }
            
            // 顯示 QR Code 畫面
            document.getElementById('qr-screen').classList.remove('hidden');
            generateQRCode();
        }

        function cancelPrepare() {
            document.getElementById('qr-screen').classList.add('hidden');
        }

        // 正式開始
        function finalStart() {
            document.getElementById('qr-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('status-bar').classList.remove('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            score = 0;
            currentLevel = 0;
            updateScoreDisplay();
            loadLevel();
            startTimer();
        }

        function generateRandomLevels(count) {
            let result = [];
            for(let i=0; i<count; i++) {
                let type, numCount, fracs = [];
                const difficulty = i / count;
                if (difficulty < 0.3) { type = 'same_den'; numCount = 2; }
                else if (difficulty < 0.6) { type = Math.random() > 0.5 ? 'same_den' : 'same_num'; numCount = Math.random() > 0.7 ? 3 : 2; }
                else { const rand = Math.random(); type = rand < 0.3 ? 'same_den' : rand < 0.6 ? 'same_num' : 'diff'; numCount = 3; }

                if (type === 'same_den') {
                    const d = Math.floor(Math.random() * 8) + 3;
                    let nums = new Set();
                    while(nums.size < numCount) nums.add(Math.floor(Math.random() * (d-1)) + 1);
                    fracs = Array.from(nums).map(n => ({ n, d }));
                } else if (type === 'same_num') {
                    const n = Math.floor(Math.random() * 3) + 1;
                    let dens = new Set();
                    while(dens.size < numCount) dens.add(Math.floor(Math.random() * 8) + 4);
                    fracs = Array.from(dens).map(d => ({ n, d }));
                } else {
                    let used = new Set();
                    while(fracs.length < numCount) {
                        const d = Math.floor(Math.random() * 10) + 2;
                        const n = Math.floor(Math.random() * (d - 1)) + 1;
                        if(!used.has(`${n}/${d}`)) { used.add(`${n}/${d}`); fracs.push({n, d}); }
                    }
                }
                result.push({ type, fractions: fracs, isAscending: Math.random() > 0.5 });
            }
            return result;
        }

        function startTimer() {
            timeLeft = 60 + (levels.length * 10); 
            document.getElementById('timer').innerText = timeLeft;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function loadLevel() {
            if (currentLevel >= levels.length) { endGame(); return; }
            const data = levels[currentLevel];
            isAscending = data.isAscending;
            const badge = document.getElementById('sort-order-badge');
            badge.innerText = isAscending ? "從小到大 ⬆️" : "從大到小 ⬇️";
            badge.className = isAscending ? "inline-block px-6 py-2 rounded-full text-white font-black text-lg mb-4 shadow-md bg-green-500" : "inline-block px-6 py-2 rounded-full text-white font-black text-lg mb-4 shadow-md bg-orange-500";
            document.getElementById('level-text').innerText = `第 ${currentLevel + 1} / ${levels.length} 題`;
            document.getElementById('submit-btn').disabled = true;
            
            const pool = document.getElementById('fraction-pool');
            pool.innerHTML = '';
            [...data.fractions].sort(() => Math.random() - 0.5).forEach((f, idx) => {
                const card = document.createElement('div');
                card.className = "fraction-container bg-white border-4 border-slate-200 p-6 rounded-[1.5rem] shadow-sm draggable hover:border-indigo-400 transform transition-transform active:scale-95";
                card.draggable = true;
                card.id = `f-${idx}`;
                card.dataset.n = f.n;
                card.dataset.d = f.d;
                card.dataset.val = f.n / f.d;
                card.innerHTML = `<div class="fraction-num text-3xl font-black">${f.n}</div><div class="fraction-den text-3xl font-black">${f.d}</div>`;
                
                // 桌機拖拽
                card.addEventListener('dragstart', e => { draggedElement = card; e.dataTransfer.setData('text/plain', card.id); card.classList.add('dragging'); });
                card.addEventListener('dragend', () => card.classList.remove('dragging'));

                // 平板觸控拖拽
                card.addEventListener('touchstart', handleTouchStart, {passive: false});
                card.addEventListener('touchmove', handleTouchMove, {passive: false});
                card.addEventListener('touchend', handleTouchEnd, {passive: false});

                pool.appendChild(card);
            });

            const dropArea = document.getElementById('drop-area');
            dropArea.innerHTML = '';
            data.fractions.forEach((_, i) => {
                const zone = document.createElement('div');
                zone.className = "drop-zone w-32 h-40";
                zone.addEventListener('dragover', e => e.preventDefault());
                zone.addEventListener('dragenter', e => zone.classList.add('active'));
                zone.addEventListener('dragleave', e => zone.classList.remove('active'));
                zone.addEventListener('drop', e => {
                    e.preventDefault();
                    zone.classList.remove('active');
                    if (zone.hasChildNodes()) pool.appendChild(zone.firstChild);
                    zone.appendChild(draggedElement);
                    checkZonesFull();
                });
                dropArea.appendChild(zone);
                if (i < data.fractions.length - 1) {
                    const symbol = document.createElement('div');
                    symbol.className = "text-4xl font-black text-slate-300 mx-1";
                    symbol.innerHTML = isAscending ? "&lt;" : "&gt;";
                    dropArea.appendChild(symbol);
                }
            });
        }

        // 觸控處理邏輯
        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            draggedElement = e.currentTarget;
            originalParent = draggedElement.parentElement;
            
            const rect = draggedElement.getBoundingClientRect();
            touchOffsetX = touch.clientX - rect.left;
            touchOffsetY = touch.clientY - rect.top;
            
            draggedElement.classList.add('dragging');
            draggedElement.style.position = 'fixed';
            draggedElement.style.width = rect.width + 'px';
            draggedElement.style.height = rect.height + 'px';
            updateTouchPosition(touch.clientX, touch.clientY);
        }

        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            updateTouchPosition(touch.clientX, touch.clientY);
            
            // 視覺反饋：檢查是否在任何 drop-zone 上方
            const zones = document.querySelectorAll('.drop-zone');
            zones.forEach(zone => {
                const r = zone.getBoundingClientRect();
                if (touch.clientX > r.left && touch.clientX < r.right && touch.clientY > r.top && touch.clientY < r.bottom) {
                    zone.classList.add('active');
                } else {
                    zone.classList.remove('active');
                }
            });
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            const touch = e.changedTouches[0];
            draggedElement.classList.remove('dragging');
            draggedElement.style.position = '';
            draggedElement.style.width = '';
            draggedElement.style.height = '';
            draggedElement.style.left = '';
            draggedElement.style.top = '';

            let dropped = false;
            const zones = document.querySelectorAll('.drop-zone');
            const pool = document.getElementById('fraction-pool');

            zones.forEach(zone => {
                zone.classList.remove('active');
                const r = zone.getBoundingClientRect();
                if (touch.clientX > r.left && touch.clientX < r.right && touch.clientY > r.top && touch.clientY < r.bottom) {
                    if (zone.hasChildNodes()) pool.appendChild(zone.firstChild);
                    zone.appendChild(draggedElement);
                    dropped = true;
                }
            });

            if (!dropped) {
                pool.appendChild(draggedElement);
            }
            checkZonesFull();
        }

        function updateTouchPosition(x, y) {
            draggedElement.style.left = (x - touchOffsetX) + 'px';
            draggedElement.style.top = (y - touchOffsetY) + 'px';
        }

        function checkZonesFull() {
            const zones = document.querySelectorAll('.drop-zone');
            document.getElementById('submit-btn').disabled = !Array.from(zones).every(z => z.hasChildNodes());
        }

        function checkAnswer() {
            const zones = document.querySelectorAll('.drop-zone');
            const userF = Array.from(zones).map(z => ({ n: parseInt(z.firstChild.dataset.n), d: parseInt(z.firstChild.dataset.d), val: parseFloat(z.firstChild.dataset.val) }));
            const correctF = [...userF].sort((a, b) => isAscending ? a.val - b.val : b.val - a.val);
            const isCorrect = userF.every((f, i) => Math.abs(f.val - correctF[i].val) < 0.0001);
            
            let hint = levels[currentLevel].type === 'same_den' ? "比較同分母時，分子越大，分數越大。" : levels[currentLevel].type === 'same_num' ? "比較同分子時，分母越大，每一份反而越小。" : "分子分母不同時，可以觀察圓餅圖的大小。";
            showFeedback(isCorrect, correctF, hint);
        }

        function showFeedback(isCorrect, correctF, hint) {
            const overlay = document.getElementById('feedback-overlay');
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            const logicHint = document.getElementById('logic-hint');
            const correctVisual = document.getElementById('correct-visual');
            
            correctVisual.innerHTML = '';
            correctF.forEach((f, i) => {
                const wrap = document.createElement('div');
                wrap.className = "flex flex-col items-center gap-4 p-4 bg-white rounded-2xl shadow-sm";
                wrap.innerHTML = `${createFractionPie(f.n, f.d, 100, isCorrect ? '#10b981' : '#ef4444')}<div class="text-xl font-black">${f.n}/${f.d}</div>`;
                correctVisual.appendChild(wrap);
                if(i < correctF.length - 1) {
                    const arrow = document.createElement('div');
                    arrow.className = "flex items-center text-2xl font-black text-slate-300";
                    arrow.innerHTML = isAscending ? "&lt;" : "&gt;";
                    correctVisual.appendChild(arrow);
                }
            });

            if (isCorrect) { score += Math.floor(100 / levels.length); icon.innerText = "❤️"; title.innerText = "正確！"; title.className = "text-5xl font-black text-green-600 mb-6"; }
            else { icon.innerText = "💡"; title.innerText = "再加油！"; title.className = "text-5xl font-black text-orange-500 mb-6"; }
            logicHint.innerText = hint;
            updateScoreDisplay();
            overlay.classList.remove('hidden');
        }

        function createFractionPie(n, d, size = 100, color = "#4f46e5") {
            const radius = 16, cx = 16, cy = 16, percentage = n / d;
            let slices = '';
            for (let i = 0; i < d; i++) {
                const angle = (2 * Math.PI * i) / d;
                slices += `<line x1="${cx}" y1="${cy}" x2="${cx + radius * Math.sin(angle)}" y2="${cy - radius * Math.cos(angle)}" stroke="#cbd5e1" stroke-width="0.5" />`;
            }
            const endAngle = 2 * Math.PI * percentage, x = cx + radius * Math.sin(endAngle), y = cy - radius * Math.cos(endAngle);
            const pathData = (percentage === 1) ? `M ${cx} ${cy-radius} A ${radius} ${radius} 0 1 1 ${cx-0.01} ${cy-radius} Z` : `M ${cx} ${cy} L ${cx} ${cy - radius} A ${radius} ${radius} 0 ${percentage > 0.5 ? 1 : 0} 1 ${x} ${y} Z`;
            return `<svg width="${size}" height="${size}" viewBox="0 0 32 32"><circle cx="${cx}" cy="${cy}" r="${radius}" fill="#f8fafc" /><path d="${pathData}" fill="${color}" />${slices}<circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="#1e293b" stroke-width="1" /></svg>`;
        }

        function nextLevel() { document.getElementById('feedback-overlay').classList.add('hidden'); currentLevel++; loadLevel(); }
        function updateScoreDisplay() { document.getElementById('score').innerText = score; }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('status-bar').classList.add('hidden');
            const endScreen = document.getElementById('end-screen');
            document.getElementById('final-score').innerText = score >= 95 ? 100 : score;
            document.getElementById('result-icon').innerText = score >= 80 ? "🏆" : score >= 60 ? "🌟" : "💪";
            document.getElementById('result-comment').innerText = score >= 80 ? "卓越的表現！" : score >= 60 ? "很不錯喔！" : "再接再厲！";
            endScreen.classList.remove('hidden');
        }

        function showTeacherMode() { document.getElementById('teacher-panel').classList.remove('hidden'); }
        function hideTeacherMode() { document.getElementById('teacher-panel').classList.add('hidden'); }

        function savePresets() {
            const val = document.getElementById('preset-input').value.trim();
            if (!val) return;
            const newLevels = val.split('\n').filter(l => l.trim()).map(line => {
                const fracs = line.split(',').map(s => {
                    const p = s.trim().split('/');
                    return p.length === 2 ? { n: parseInt(p[0]), d: parseInt(p[1]) } : null;
                }).filter(f => f);
                return fracs.length ? { type: 'diff', fractions: fracs, isAscending: Math.random() > 0.5 } : null;
            }).filter(l => l);

            if (newLevels.length) {
                levels = newLevels;
                hideTeacherMode();
                // 自訂題目保存後，按照要求進入 QR Code 畫面
                prepareGame('preset');
            }
        }
    </script>
</body>
</html>
