<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>分數大挑戰 - 移動優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at center, #f0f9ff, #e0f2fe);
            touch-action: none;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 移動端優化容器 */
        .app-shell {
            width: 96vw;
            height: 94vh;
            max-width: 1024px;
            max-height: 800px;
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .fraction-line {
            width: 100%;
            height: 4px;
            background-color: #1e293b;
            margin: 4px 0;
            border-radius: 2px;
        }

        /* 放置區樣式 */
        .drop-target {
            width: clamp(100px, 20vw, 150px);
            aspect-ratio: 1/1.3;
            border: 3px dashed #cbd5e1;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        .drop-target.highlight {
            border-color: #6366f1;
            background: #eef2ff;
            transform: scale(1.05);
        }

        /* 拖拽物件 */
        .card {
            width: clamp(90px, 18vw, 140px);
            aspect-ratio: 1/1.3;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: none;
            z-index: 10;
        }

        .card.dragging {
            opacity: 0.8;
            transform: scale(1.15);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            z-index: 50;
        }

        .btn-fancy {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
            transition: all 0.2s active;
        }

        .btn-fancy:active {
            transform: scale(0.95);
            box-shadow: 0 5px 10px -5px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>
<body>

    <div class="app-shell" id="app">
        
        <!-- 頂部資訊欄 -->
        <header id="info-bar" class="hidden p-4 md:p-6 bg-slate-900 text-white flex justify-between items-center shrink-0">
            <div class="flex items-center gap-3">
                <span class="bg-indigo-500 p-2 rounded-lg text-xl">🎯</span>
                <div>
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-widest" id="lvl-display">Level 01</div>
                    <div class="text-lg font-black" id="diff-label">入門挑戰</div>
                </div>
            </div>
            <div class="flex gap-6">
                <div class="text-center">
                    <div class="text-[10px] text-slate-400 font-bold uppercase">積分</div>
                    <div class="text-2xl font-black text-indigo-400" id="score">0</div>
                </div>
                <div class="text-center">
                    <div class="text-[10px] text-slate-400 font-bold uppercase">時間</div>
                    <div class="text-2xl font-black text-yellow-400" id="timer">--</div>
                </div>
            </div>
        </header>

        <!-- 畫面 1: 首頁 -->
        <main id="screen-start" class="flex-1 flex flex-col items-center justify-center p-8 text-center bg-slate-50">
            <div class="mb-12">
                <div class="text-7xl mb-4 animate-bounce">🍕</div>
                <h1 class="text-4xl font-black text-slate-800 mb-2">分數排列王</h1>
                <p class="text-slate-500 font-medium">拖動分數，由易到難的階梯挑戰</p>
            </div>
            <div class="w-full max-w-xs space-y-4">
                <button onclick="initGameFlow()" class="btn-fancy w-full text-white py-5 rounded-2xl font-black text-xl">開始挑戰</button>
                <p class="text-xs text-slate-400">專為平板與手機觸控優化設計</p>
            </div>
        </main>

        <!-- 畫面 2: 遊戲主體 -->
        <main id="screen-game" class="hidden flex-1 flex flex-col p-4 md:p-8">
            <div class="text-center mb-6">
                <div id="order-hint" class="inline-block px-6 py-2 rounded-full text-white font-black text-sm mb-4"></div>
                <h2 class="text-xl font-bold text-slate-700">拖動下方分數至對應空格</h2>
            </div>

            <!-- 分數卡片池 -->
            <div id="pool" class="flex-1 bg-slate-100 rounded-[2rem] border-2 border-dashed border-slate-200 flex flex-wrap items-center justify-center gap-4 p-6 mb-6"></div>

            <!-- 排列區 -->
            <div id="targets" class="flex flex-wrap items-center justify-center gap-4 mb-8"></div>

            <footer class="mt-auto">
                <button id="btn-check" disabled onclick="evaluateLevel()" class="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black text-2xl shadow-xl disabled:opacity-30">驗證排列</button>
            </footer>
        </main>

        <!-- 回饋覆蓋層 -->
        <div id="overlay" class="hidden absolute inset-0 z-50 bg-white/95 backdrop-blur-sm flex flex-col items-center justify-center p-8 text-center">
            <div id="feedback-emoji" class="text-8xl mb-4"></div>
            <h2 id="feedback-text" class="text-4xl font-black mb-6"></h2>
            <div id="feedback-tip" class="bg-slate-100 p-6 rounded-2xl text-lg font-bold text-slate-700 mb-8 max-w-md"></div>
            <button onclick="proceedToNext()" class="w-full max-w-xs bg-slate-900 text-white py-5 rounded-2xl font-black text-xl">下一關</button>
        </div>

        <!-- 結算畫面 -->
        <div id="screen-end" class="hidden absolute inset-0 z-[60] bg-indigo-600 text-white flex flex-col items-center justify-center p-12 text-center">
            <div class="text-9xl mb-6">🏁</div>
            <h2 class="text-5xl font-black mb-2">挑戰結束</h2>
            <p class="text-xl opacity-80 mb-10">你的最終積分</p>
            <div class="text-8xl font-black mb-12" id="final-score">0</div>
            <button onclick="location.reload()" class="bg-white text-indigo-600 px-12 py-5 rounded-2xl font-black text-xl">再次挑戰</button>
        </div>

    </div>

    <script>
        let gameState = {
            score: 0,
            level: 0,
            timer: 0,
            totalLevels: 10,
            levelsData: [],
            isAscending: true,
            draggedEl: null,
            touchOffset: { x: 0, y: 0 }
        };

        const config = {
            difficulties: ['入門', '進階', '專家', '大師'],
            colors: { asc: '#10b981', desc: '#f59e0b' }
        };

        // --- 初始化由淺入深的題目 ---
        function generateLevels() {
            let data = [];
            for(let i=0; i<gameState.totalLevels; i++) {
                let type, count, diff;
                let ratio = i / gameState.totalLevels;
                
                if(ratio < 0.3) { type = 'same_d'; count = 2; diff = '入門'; }
                else if(ratio < 0.6) { type = 'same_n'; count = 3; diff = '進階'; }
                else { type = 'mixed'; count = 3; diff = '專家挑戰'; }

                let fracs = [];
                if(type === 'same_d') {
                    const d = 5 + Math.floor(Math.random()*5);
                    let nums = new Set();
                    while(nums.size < count) nums.add(1 + Math.floor(Math.random()*(d-1)));
                    fracs = Array.from(nums).map(n => ({n, d}));
                } else if(type === 'same_n') {
                    const n = 1 + Math.floor(Math.random()*3);
                    let dens = new Set();
                    while(dens.size < count) dens.add(5 + Math.floor(Math.random()*10));
                    fracs = Array.from(dens).map(d => ({n, d}));
                } else {
                    while(fracs.length < count) {
                        const d = 2 + Math.floor(Math.random()*10), n = 1 + Math.floor(Math.random()*(d-1));
                        if(!fracs.some(f => f.n/f.d === n/d)) fracs.push({n, d});
                    }
                }
                data.push({ fracs, diff, isAsc: Math.random() > 0.5 });
            }
            return data;
        }

        function initGameFlow() {
            gameState.levelsData = generateLevels();
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('info-bar').classList.remove('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            renderLevel();
            startTimer();
        }

        function renderLevel() {
            const data = gameState.levelsData[gameState.level];
            gameState.isAscending = data.isAsc;

            // 更新介面
            document.getElementById('lvl-display').innerText = `Level ${String(gameState.level + 1).padStart(2, '0')}`;
            document.getElementById('diff-label').innerText = data.diff;
            
            const hint = document.getElementById('order-hint');
            hint.innerText = data.isAsc ? "由小到大排列 ↗️" : "由大到小排列 ↘️";
            hint.style.backgroundColor = data.isAsc ? config.colors.asc : config.colors.desc;

            // 清理區域
            const pool = document.getElementById('pool');
            const targets = document.getElementById('targets');
            pool.innerHTML = ''; targets.innerHTML = '';
            document.getElementById('btn-check').disabled = true;

            // 建立方塊
            [...data.fracs].sort(() => Math.random() - 0.5).forEach((f, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.val = f.n / f.d;
                card.dataset.n = f.n; card.dataset.d = f.d;
                card.innerHTML = `<span class="text-2xl font-black">${f.n}</span><div class="fraction-line"></div><span class="text-2xl font-black">${f.d}</span>`;
                
                // 觸控事件綁定
                card.addEventListener('touchstart', onTouchStart, {passive: false});
                card.addEventListener('touchmove', onTouchMove, {passive: false});
                card.addEventListener('touchend', onTouchEnd);
                pool.appendChild(card);

                // 建立目標區
                const zone = document.createElement('div');
                zone.className = 'drop-target';
                targets.appendChild(zone);
                if(idx < data.fracs.length - 1) {
                    const icon = document.createElement('div');
                    icon.className = "text-2xl font-black text-slate-300 mx-1";
                    icon.innerText = data.isAsc ? "<" : ">";
                    targets.appendChild(icon);
                }
            });
        }

        // --- 觸控邏輯引擎 ---
        function onTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            gameState.draggedEl = e.currentTarget;
            const rect = gameState.draggedEl.getBoundingClientRect();
            
            gameState.touchOffset = {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };

            gameState.draggedEl.classList.add('dragging');
            gameState.draggedEl.style.position = 'fixed';
            gameState.draggedEl.style.width = rect.width + 'px';
            updateDragPos(touch.clientX, touch.clientY);
        }

        function onTouchMove(e) {
            if(!gameState.draggedEl) return;
            const touch = e.touches[0];
            updateDragPos(touch.clientX, touch.clientY);

            // 偵測目標碰撞
            document.querySelectorAll('.drop-target').forEach(zone => {
                const r = zone.getBoundingClientRect();
                if(touch.clientX > r.left && touch.clientX < r.right && touch.clientY > r.top && touch.clientY < r.bottom) {
                    zone.classList.add('highlight');
                } else {
                    zone.classList.remove('highlight');
                }
            });
        }

        function onTouchEnd(e) {
            if(!gameState.draggedEl) return;
            const touch = e.changedTouches[0];
            const el = gameState.draggedEl;
            gameState.draggedEl = null;
            el.classList.remove('dragging');
            el.style.position = ''; el.style.left = ''; el.style.top = ''; el.style.width = '';

            let dropped = false;
            document.querySelectorAll('.drop-target').forEach(zone => {
                const r = zone.getBoundingClientRect();
                if(touch.clientX > r.left && touch.clientX < r.right && touch.clientY > r.top && touch.clientY < r.bottom) {
                    if(zone.firstChild) document.getElementById('pool').appendChild(zone.firstChild);
                    zone.appendChild(el);
                    dropped = true;
                }
                zone.classList.remove('highlight');
            });

            if(!dropped) document.getElementById('pool').appendChild(el);
            
            // 檢查是否所有坑都填滿
            const allFilled = Array.from(document.querySelectorAll('.drop-target')).every(z => z.firstChild);
            document.getElementById('btn-check').disabled = !allFilled;
        }

        function updateDragPos(x, y) {
            gameState.draggedEl.style.left = `${x - gameState.touchOffset.x}px`;
            gameState.draggedEl.style.top = `${y - gameState.touchOffset.y}px`;
        }

        // --- 遊戲邏輯 ---
        function evaluateLevel() {
            const zones = document.querySelectorAll('.drop-target');
            const userValues = Array.from(zones).map(z => parseFloat(z.firstChild.dataset.val));
            
            let isCorrect = true;
            for(let i=0; i<userValues.length-1; i++) {
                if(gameState.isAscending) {
                    if(userValues[i] > userValues[i+1]) isCorrect = false;
                } else {
                    if(userValues[i] < userValues[i+1]) isCorrect = false;
                }
            }

            showFeedback(isCorrect);
        }

        function showFeedback(isCorrect) {
            const overlay = document.getElementById('overlay');
            const emoji = document.getElementById('feedback-emoji');
            const title = document.getElementById('feedback-text');
            const tip = document.getElementById('feedback-tip');

            if(isCorrect) {
                gameState.score += 10;
                emoji.innerText = "🌟";
                title.innerText = "太棒了！";
                title.className = "text-4xl font-black text-emerald-500 mb-6";
                tip.innerText = "你的邏輯非常清晰，完全正確！";
            } else {
                emoji.innerText = "💡";
                title.innerText = "差一點點";
                title.className = "text-4xl font-black text-orange-500 mb-6";
                tip.innerText = "提示：可以想像圓餅圖的大小。分母越大代表切得越細喔！";
            }
            
            document.getElementById('score').innerText = gameState.score;
            overlay.classList.remove('hidden');
        }

        function proceedToNext() {
            document.getElementById('overlay').classList.add('hidden');
            gameState.level++;
            if(gameState.level >= gameState.totalLevels) {
                endGame();
            } else {
                renderLevel();
            }
        }

        function startTimer() {
            gameState.timer = 120;
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                gameState.timer--;
                timerEl.innerText = gameState.timer;
                if(gameState.timer <= 0) {
                    clearInterval(interval);
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-end').classList.remove('hidden');
            document.getElementById('final-score').innerText = gameState.score;
        }
    </script>
</body>
</html>
