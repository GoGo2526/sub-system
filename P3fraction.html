<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三年級數學-分數的比較</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            background-color: #f1f5f9;
        }
        .fraction-num { border-bottom: 2px solid #1e293b; padding: 0 2px; min-width: 20px; text-align: center; }
        .fraction-den { padding: 0 2px; min-width: 20px; text-align: center; }
        @media (min-width: 768px) {
            .fraction-num { border-bottom-width: 3px; padding: 0 4px; min-width: 35px; }
            .fraction-den { padding: 0 4px; min-width: 35px; }
        }
        
        .drop-zone {
            min-height: 150px;
            border: 3px dashed #cbd5e1;
            border-radius: 1.5rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
        }
        .drop-zone.active {
            border-color: #3b82f6;
            background-color: #eff6ff;
            transform: scale(1.05);
        }
        .draggable {
            cursor: grab;
            touch-action: none;
            user-select: none;
        }
        .draggable:active { cursor: grabbing; }
        
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .animate-bounce-slow { animation: bounce-slow 2s infinite; }

        /* 隱藏原生卷軸但保留滑動功能 */
        .hide-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
        .hide-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-0 md:p-8 bg-slate-100 h-[100dvh] md:h-auto md:min-h-screen overflow-hidden md:overflow-auto">
    <div id="game-app" class="max-w-5xl mx-auto bg-white rounded-none md:rounded-[2.5rem] shadow-2xl flex flex-col h-full md:h-auto border-none md:border md:border-slate-200 w-full overflow-hidden">
        <!-- 頂部狀態列 -->
        <div class="bg-gradient-to-r from-indigo-600 to-blue-700 text-white p-6 flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-xl md:text-2xl font-black tracking-tight">三年級數學-分數的比較</h1>
                <p id="level-text" class="text-blue-100 text-sm font-bold mt-1">載入中...</p>
            </div>
            <div class="flex gap-4 md:gap-8">
                <div class="text-center">
                    <p class="text-[10px] uppercase font-bold opacity-70">目前得分</p>
                    <p id="score" class="text-3xl md:text-4xl font-black">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] uppercase font-bold opacity-70">倒數</p>
                    <p id="timer" class="text-3xl md:text-4xl font-black text-yellow-300">60</p>
                </div>
            </div>
        </div>

        <!-- 初始畫面 -->
        <div id="start-screen" class="p-8 md:p-16 text-center flex-1 overflow-y-auto">
            <div class="mb-8 inline-block p-6 bg-indigo-50 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
            </div>
            <h2 class="text-4xl font-black mb-6 text-slate-800">準備好進行比賽了嗎？</h2>
            
            <div class="max-w-sm mx-auto mb-10 p-6 bg-slate-50 rounded-2xl border border-slate-100">
                <label class="block text-slate-600 font-bold mb-2">設定比賽總題數：</label>
                <input type="number" id="total-levels-input" value="10" min="1" max="50" class="w-full text-center text-2xl font-black p-3 rounded-xl border-2 border-indigo-200 focus:border-indigo-500 outline-none">
            </div>

            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <button onclick="startGame('random')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-12 py-5 rounded-2xl font-black text-xl transition-all shadow-xl hover:shadow-indigo-200">開始隨機比賽</button>
                <button onclick="showTeacherMode()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-10 py-5 rounded-2xl font-bold text-xl transition-all">進入教師預設</button>
            </div>
        </div>

        <!-- 遊戲畫面 -->
        <div id="game-screen" class="hidden flex-1 flex flex-col p-2 md:p-8 overflow-y-auto justify-evenly md:justify-start">
            <div class="text-center shrink-0">
                <h3 id="main-instruction" class="text-base sm:text-xl md:text-3xl font-black text-slate-800 flex items-center justify-center whitespace-nowrap">
                    請按<span id="sort-order-badge" class="inline-block px-2 py-0.5 md:px-3 md:py-1 rounded-full text-white font-black text-sm sm:text-base md:text-xl shadow-md mx-1 md:mx-2 align-baseline">正在載入順序...</span>排列分數。
                </h3>
            </div>

            <div id="fraction-pool" class="flex justify-center items-center flex-wrap gap-2 md:gap-6 my-2 md:my-6 min-h-[60px] md:min-h-[140px] p-2 md:p-8 bg-slate-50 rounded-[1rem] md:rounded-[2rem] border-2 border-dashed border-slate-200 shrink-0"></div>

            <!-- 可滑動的答題排列區 -->
            <div class="w-full overflow-x-auto hide-scrollbar py-2 md:py-6 my-1 md:my-4 shrink-0">
                <div id="drop-area" class="flex flex-nowrap min-w-full w-max justify-center items-center gap-1 md:gap-4 px-2 md:px-4 mx-auto shrink-0"></div>
            </div>

            <div class="flex justify-center shrink-0">
                <button id="submit-btn" disabled onclick="checkAnswer()" class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 md:px-16 md:py-5 rounded-xl md:rounded-2xl font-black text-lg md:text-2xl disabled:opacity-20 transition-all shadow-xl">提交答案</button>
            </div>
        </div>

        <!-- 教師面板 -->
        <div id="teacher-panel" class="hidden flex-1 p-6 md:p-10 bg-slate-50 border-t overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black">教師題目自訂</h3>
                <button onclick="hideTeacherMode()" class="text-slate-400 hover:text-slate-600 text-xl font-bold">✖</button>
            </div>
            <p class="text-slate-500 mb-4 font-bold italic">規則：每行一題，最多設定10個分數，用逗號隔開（如 1/2, 2/3, 3/4, 4/5）。系統會自動決定排列順序。</p>
            <textarea id="preset-input" class="w-full h-48 p-6 border-2 rounded-2xl mb-6 font-mono text-lg focus:ring-4 focus:ring-indigo-100 outline-none" placeholder="1/2, 1/3, 1/4&#10;2/5, 4/5&#10;3/7, 3/8, 3/10&#10;1/2, 2/3, 3/4, 4/5"></textarea>
            
            <div class="flex flex-col md:flex-row items-center gap-4 mb-6">
                <label class="font-bold text-slate-700 whitespace-nowrap">比賽題數：</label>
                <input type="number" id="preset-count-input" class="w-full md:w-24 p-3 rounded-xl border-2 border-indigo-200 text-center font-bold text-xl" min="1" value="5">
            </div>

            <div class="flex flex-col md:flex-row gap-4">
                <button onclick="savePresets()" class="flex-1 bg-slate-600 text-white py-5 rounded-2xl font-black text-xl hover:bg-slate-700 transition-all shadow-lg">保存題目</button>
                <button id="preset-start-btn" disabled onclick="startPresetGame()" class="flex-1 bg-slate-300 text-slate-500 py-5 rounded-2xl font-black text-xl transition-all shadow-lg cursor-not-allowed">開始比賽</button>
            </div>
            <p id="preset-status" class="mt-4 text-center font-bold text-green-600 hidden"></p>
        </div>

        <!-- 反饋彈窗 -->
        <div id="feedback-overlay" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-50 overflow-y-auto">
            <div class="min-h-[100dvh] flex items-center justify-center p-4 py-8">
                <div class="bg-white rounded-[2rem] md:rounded-[3rem] p-6 md:p-10 max-w-4xl w-full shadow-2xl border-4 border-white">
                    <div class="text-center mb-6 md:mb-8">
                        <div id="feedback-icon" class="text-6xl md:text-8xl mb-4"></div>
                        <h3 id="feedback-title" class="text-3xl md:text-4xl font-black mb-4 md:mb-6"></h3>
                        <div id="logic-hint" class="block w-full p-4 md:p-8 bg-blue-50 border-2 border-blue-100 text-blue-900 rounded-[1.5rem] md:rounded-[2rem] text-lg md:text-2xl font-black leading-snug shadow-inner"></div>
                    </div>

                    <div class="p-4 md:p-8 bg-slate-100 rounded-[1.5rem] md:rounded-[2rem] border border-slate-200 mb-6 md:mb-8">
                        <p id="visual-label" class="text-center font-black text-slate-500 mb-4 md:mb-6 uppercase tracking-widest text-xs md:text-sm">正確的分數排列與圖像</p>
                        <!-- 可滑動的解答區 -->
                        <div class="w-full overflow-x-auto hide-scrollbar pb-4">
                            <div id="correct-visual" class="flex flex-nowrap min-w-full w-max justify-center items-center gap-2 md:gap-8 px-2 mx-auto"></div>
                        </div>
                    </div>

                    <button onclick="nextLevel()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-5 md:py-6 rounded-xl md:rounded-2xl font-black text-xl md:text-2xl shadow-xl transition-all">繼續挑戰下一題</button>
                </div>
            </div>
        </div>

        <!-- 結算畫面 -->
        <div id="end-screen" class="hidden flex-1 p-8 md:p-16 text-center overflow-y-auto">
            <div id="result-icon" class="text-8xl md:text-9xl mb-8 animate-bounce-slow"></div>
            <h2 id="result-comment" class="text-5xl font-black mb-6">評語載入中</h2>
            <div class="inline-block px-12 py-4 bg-slate-100 rounded-3xl mb-12">
                <p class="text-2xl font-bold text-slate-500">百分比得分</p>
                <p id="final-score" class="text-7xl font-black text-indigo-600">0</p>
            </div>
            <div id="result-subtext" class="text-xl text-slate-500 mb-12 max-w-md mx-auto leading-relaxed"></div>
            <button onclick="location.reload()" class="bg-indigo-600 text-white px-16 py-6 rounded-3xl font-black text-2xl shadow-2xl hover:scale-105 transition-transform">重新挑戰</button>
        </div>
    </div>

    <script>
        let score = 0; // 實際顯示分數 (0-100)
        let timeLeft = 60;
        let timerInterval;
        let currentLevel = 0;
        let levels = [];
        let totalLevelsCount = 10;
        let draggedElement = null;
        let isAscending = true;
        let teacherPresets = [];

        // --- 觸控拖曳支援 (平板/手機) ---
        function handleTouchStart(e) {
            if(e.cancelable) e.preventDefault();
            draggedElement = e.currentTarget;
            const touch = e.touches[0];
            const rect = draggedElement.getBoundingClientRect();
            
            draggedElement.style.width = rect.width + 'px';
            draggedElement.style.height = rect.height + 'px';
            draggedElement.style.position = 'fixed';
            draggedElement.style.zIndex = '1000';
            draggedElement.style.left = (touch.clientX - rect.width/2) + 'px';
            draggedElement.style.top = (touch.clientY - rect.height/2) + 'px';
            draggedElement.style.opacity = '0.9';
            draggedElement.style.pointerEvents = 'none';
        }

        function handleTouchMove(e) {
            if(!draggedElement) return;
            if(e.cancelable) e.preventDefault();
            const touch = e.touches[0];
            draggedElement.style.left = (touch.clientX - draggedElement.offsetWidth/2) + 'px';
            draggedElement.style.top = (touch.clientY - draggedElement.offsetHeight/2) + 'px';

            const elementUnderTouch = document.elementFromPoint(touch.clientX, touch.clientY);
            const newDropZone = elementUnderTouch ? elementUnderTouch.closest('.drop-zone') : null;

            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active'));
            if (newDropZone) {
                newDropZone.classList.add('active');
            }
        }

        function handleTouchEnd(e) {
            if(!draggedElement) return;
            const touch = e.changedTouches[0];
            const elementUnderTouch = document.elementFromPoint(touch.clientX, touch.clientY);
            const dropZone = elementUnderTouch ? elementUnderTouch.closest('.drop-zone') : null;

            draggedElement.style.position = '';
            draggedElement.style.zIndex = '';
            draggedElement.style.left = '';
            draggedElement.style.top = '';
            draggedElement.style.width = '';
            draggedElement.style.height = '';
            draggedElement.style.opacity = '';
            draggedElement.style.pointerEvents = '';

            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active'));

            const sourceParent = draggedElement.parentNode;

            if (dropZone) {
                if (dropZone !== sourceParent) {
                    if (dropZone.hasChildNodes()) {
                        const existingElement = dropZone.firstChild;
                        if (sourceParent && sourceParent.classList.contains('drop-zone')) {
                            sourceParent.appendChild(existingElement);
                        } else {
                            document.getElementById('fraction-pool').appendChild(existingElement);
                        }
                    }
                    dropZone.appendChild(draggedElement);
                }
            } else {
                document.getElementById('fraction-pool').appendChild(draggedElement);
            }
            document.getElementById('submit-btn').disabled = !Array.from(document.querySelectorAll('.drop-zone')).every(z => z.hasChildNodes());
            draggedElement = null;
        }
        // -----------------------------

        function createFractionPie(n, d, size = 100, color = "#4f46e5") {
            const radius = 16;
            const cx = 16;
            const cy = 16;
            const percentage = n / d;
            let slices = '';
            for (let i = 0; i < d; i++) {
                const angle = (2 * Math.PI * i) / d;
                const x2 = cx + radius * Math.sin(angle);
                const y2 = cy - radius * Math.cos(angle);
                slices += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#cbd5e1" stroke-width="0.6" />`;
            }
            const endAngle = 2 * Math.PI * percentage;
            const x = cx + radius * Math.sin(endAngle);
            const y = cy - radius * Math.cos(endAngle);
            const largeArcFlag = percentage > 0.5 ? 1 : 0;
            const pathData = (percentage === 1) ? `M ${cx} ${cy-radius} A ${radius} ${radius} 0 1 1 ${cx-0.01} ${cy-radius} Z` : (percentage === 0) ? "" : `M ${cx} ${cy} L ${cx} ${cy - radius} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x} ${y} Z`;
            return `<svg width="${size}" height="${size}" viewBox="0 0 32 32" class="rounded-full bg-white shadow-md border-2 border-slate-800"><circle cx="${cx}" cy="${cy}" r="${radius}" fill="#f8fafc" /><path d="${pathData}" fill="${color}" />${slices}<circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="#1e293b" stroke-width="1.2" /></svg>`;
        }

        function generateRandomLevels(count) {
            let result = [];
            for(let i=0; i<count; i++) {
                let progress = i / count;
                let type, numCount;

                // 由淺入深難度分配：同分母 -> 同分子 -> 異分母
                if (progress < 0.35) type = 'same_den';
                else if (progress < 0.7) type = 'same_num';
                else type = 'diff';

                // 每個階段內，前半為兩項，後半為三項挑戰
                let subProgress;
                if (progress < 0.35) subProgress = progress / 0.35;
                else if (progress < 0.7) subProgress = (progress - 0.35) / 0.35;
                else subProgress = (progress - 0.7) / 0.3;
                numCount = subProgress < 0.5 ? 2 : 3;

                let fracs = [];
                if (type === 'same_den') {
                    const d = Math.floor(Math.random() * 7) + 3; // 分母 3-9
                    let nums = new Set();
                    while(nums.size < numCount) nums.add(Math.floor(Math.random() * (d-1)) + 1);
                    fracs = Array.from(nums).map(n => ({ n, d }));
                } else if (type === 'same_num') {
                    const n = Math.floor(Math.random() * 3) + 1; // 分子 1-3
                    let dens = new Set();
                    while(dens.size < numCount) dens.add(Math.floor(Math.random() * 8) + (n + 1));
                    fracs = Array.from(dens).map(d => ({ n, d }));
                } else {
                    let used = new Set();
                    while(fracs.length < numCount) {
                        const d = Math.floor(Math.random() * 10) + 2; // 分母 2-11
                        const n = Math.floor(Math.random() * (d - 1)) + 1;
                        if(!used.has(`${n}/${d}`)) { used.add(`${n}/${d}`); fracs.push({n, d}); }
                    }
                }
                result.push({ type, fractions: fracs, isAscending: Math.random() > 0.5 });
            }
            return result;
        }

        function startGame(mode) {
            if (mode === 'random') {
                totalLevelsCount = parseInt(document.getElementById('total-levels-input').value) || 10;
                levels = generateRandomLevels(totalLevelsCount);
            }
            // Teacher preset mode sets levels separately in startPresetGame()
            
            score = 0;
            currentLevel = 0;
            updateScoreDisplay();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            loadLevel();
            startTimer();
        }

        function startTimer() {
            timeLeft = 60 + (totalLevelsCount * 2); // 根據題數稍微調整時間
            document.getElementById('timer').innerText = timeLeft;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function loadLevel() {
            if (currentLevel >= levels.length) {
                endGame();
                return;
            }
            const data = levels[currentLevel];
            isAscending = data.isAscending;
            const badge = document.getElementById('sort-order-badge');
            badge.innerText = isAscending ? "從小到大 ⬆️" : "從大到小 ⬇️";
            badge.className = isAscending ? "inline-block px-2 py-0.5 md:px-3 md:py-1 rounded-full text-white font-black text-sm sm:text-base md:text-xl shadow-md mx-1 md:mx-2 align-baseline bg-green-500" : "inline-block px-2 py-0.5 md:px-3 md:py-1 rounded-full text-white font-black text-sm sm:text-base md:text-xl shadow-md mx-1 md:mx-2 align-baseline bg-orange-500";
            
            document.getElementById('level-text').innerText = `進度：第 ${currentLevel + 1} 題 / 共 ${levels.length} 題`;
            document.getElementById('submit-btn').disabled = true;
            const pool = document.getElementById('fraction-pool');
            pool.innerHTML = '';
            
            // 允許從答案區拉回題庫區 (桌機版)
            pool.addEventListener('dragover', e => e.preventDefault());
            pool.addEventListener('drop', e => {
                e.preventDefault();
                pool.appendChild(draggedElement);
                document.getElementById('submit-btn').disabled = !Array.from(document.querySelectorAll('.drop-zone')).every(z => z.hasChildNodes());
            });

            const len = data.fractions.length;
            
            let cardSizeClass, pClass, numClass, zoneSizeClass, symClass;
            
            if (len >= 8) {
                cardSizeClass = 'w-10 h-14 md:w-20 md:h-28';
                pClass = 'p-0.5 md:p-2';
                numClass = 'text-sm md:text-xl';
                zoneSizeClass = 'w-12 h-16 md:w-24 md:h-32';
                symClass = 'text-base md:text-2xl mx-0.5 md:mx-1';
            } else if (len >= 5) {
                cardSizeClass = 'w-12 h-16 md:w-24 md:h-32';
                pClass = 'p-1 md:p-4';
                numClass = 'text-base md:text-2xl';
                zoneSizeClass = 'w-14 h-20 md:w-28 md:h-36';
                symClass = 'text-lg md:text-3xl mx-0.5 md:mx-2';
            } else if (len >= 3) {
                cardSizeClass = 'w-14 h-20 md:w-28 md:h-36';
                pClass = 'p-1 md:p-4';
                numClass = 'text-lg md:text-3xl';
                zoneSizeClass = 'w-16 h-24 md:w-32 md:h-40';
                symClass = 'text-xl md:text-4xl mx-0.5 md:mx-2';
            } else {
                cardSizeClass = 'w-16 h-24 md:w-32 md:h-40';
                pClass = 'p-2 md:p-6';
                numClass = 'text-xl md:text-3xl';
                zoneSizeClass = 'w-20 h-28 md:w-36 md:h-44';
                symClass = 'text-2xl md:text-4xl mx-1 md:mx-4';
            }

            [...data.fractions].sort(() => Math.random() - 0.5).forEach((f, idx) => {
                const card = document.createElement('div');
                card.className = `fraction-container bg-white border-2 md:border-4 border-slate-200 ${pClass} ${cardSizeClass} rounded-xl md:rounded-[1.5rem] shadow-sm draggable hover:border-indigo-400 shrink-0 flex flex-col items-center justify-center`;
                card.draggable = true;
                card.id = `f-${idx}`;
                card.dataset.n = f.n;
                card.dataset.d = f.d;
                card.dataset.val = f.n / f.d;
                
                card.innerHTML = `<div class="fraction-num ${numClass} font-black text-slate-800">${f.n}</div><div class="fraction-den ${numClass} font-black text-slate-800">${f.d}</div>`;
                
                // 桌面版拖曳
                card.addEventListener('dragstart', e => { draggedElement = card; e.dataTransfer.setData('text/plain', card.id); });
                
                // 行動裝置觸控拖曳支援
                card.addEventListener('touchstart', handleTouchStart, {passive: false});
                card.addEventListener('touchmove', handleTouchMove, {passive: false});
                card.addEventListener('touchend', handleTouchEnd);

                pool.appendChild(card);
            });
            const dropArea = document.getElementById('drop-area');
            dropArea.innerHTML = '';
            data.fractions.forEach((_, i) => {
                const zone = document.createElement('div');
                zone.className = `drop-zone ${zoneSizeClass} shrink-0`;
                zone.addEventListener('dragover', e => e.preventDefault());
                zone.addEventListener('dragenter', e => zone.classList.add('active'));
                zone.addEventListener('dragleave', e => zone.classList.remove('active'));
                zone.addEventListener('drop', e => {
                    e.preventDefault();
                    zone.classList.remove('active');
                    const sourceParent = draggedElement.parentNode;
                    if (zone !== sourceParent) {
                        if (zone.hasChildNodes()) {
                            const existingElement = zone.firstChild;
                            if (sourceParent && sourceParent.classList.contains('drop-zone')) {
                                sourceParent.appendChild(existingElement);
                            } else {
                                pool.appendChild(existingElement);
                            }
                        }
                        zone.appendChild(draggedElement);
                    }
                    document.getElementById('submit-btn').disabled = !Array.from(document.querySelectorAll('.drop-zone')).every(z => z.hasChildNodes());
                });
                dropArea.appendChild(zone);
                if (i < data.fractions.length - 1) {
                    const symbol = document.createElement('div');
                    symbol.className = `${symClass} font-black text-slate-300 shrink-0`;
                    symbol.innerHTML = isAscending ? "&lt;" : "&gt;";
                    dropArea.appendChild(symbol);
                }
            });
        }

        function checkAnswer() {
            const zones = document.querySelectorAll('.drop-zone');
            const userF = Array.from(zones).map(z => ({ n: parseInt(z.firstChild.dataset.n), d: parseInt(z.firstChild.dataset.d), val: parseFloat(z.firstChild.dataset.val) }));
            const correctF = [...userF].sort((a, b) => isAscending ? a.val - b.val : b.val - a.val);
            const isCorrect = userF.every((f, i) => Math.abs(f.val - correctF[i].val) < 0.0001);
            let hint = "";
            const data = levels[currentLevel];
            if (data.type === 'same_den') hint = "比較同分母分數時，分子越大，分數數值越大。";
            else if (data.type === 'same_num') hint = "比較同分子分數時，分母越大，分數數值越小。";
            else {
                const values = userF.map(f => f.val);
                const isEquiv = values.every(v => Math.abs(v - values[0]) < 0.0001);
                hint = isEquiv ? "比較等值分數時，將圖案分成相同等份。" : "比較不同分數時，以圖像形式直接比較。";
            }
            showFeedback(isCorrect, correctF, hint);
        }

        function showFeedback(isCorrect, correctF, hint) {
            const overlay = document.getElementById('feedback-overlay');
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            const logicHint = document.getElementById('logic-hint');
            const correctVisual = document.getElementById('correct-visual');
            correctVisual.innerHTML = '';
            
            const len = correctF.length;
            let pieSize;
            if (window.innerWidth < 768) {
                if (len >= 8) pieSize = 25;
                else if (len >= 6) pieSize = 35;
                else if (len >= 3) pieSize = 45;
                else pieSize = 65;
            } else {
                pieSize = len >= 8 ? 45 : (len >= 6 ? 60 : 110);
            }

            let wrapClass, numSize, symClass;
            if (len >= 8) {
                wrapClass = 'min-w-[40px] md:min-w-[70px] p-1 gap-1 md:gap-2';
                numSize = 'text-sm md:text-lg';
                symClass = 'text-base md:text-xl';
            } else if (len >= 6) {
                wrapClass = 'min-w-[50px] md:min-w-[80px] p-2 gap-1 md:gap-2';
                numSize = 'text-base md:text-xl';
                symClass = 'text-lg md:text-2xl';
            } else if (len >= 3) {
                wrapClass = 'min-w-[60px] md:min-w-[120px] p-2 md:p-4 gap-2 md:gap-4';
                numSize = 'text-lg md:text-2xl';
                symClass = 'text-xl md:text-3xl';
            } else {
                wrapClass = 'min-w-[80px] md:min-w-[120px] p-3 md:p-4 gap-3 md:gap-4';
                numSize = 'text-xl md:text-2xl';
                symClass = 'text-2xl md:text-3xl';
            }

            correctF.forEach((f, i) => {
                const wrap = document.createElement('div');
                wrap.className = `flex flex-col items-center bg-white rounded-xl md:rounded-2xl shadow-sm border border-slate-100 shrink-0 ${wrapClass}`;
                
                wrap.innerHTML = `${createFractionPie(f.n, f.d, pieSize, isCorrect ? '#10b981' : '#4f46e5')}<div class="flex flex-col items-center"><div class="${numSize} font-black border-b-2 border-slate-800 px-2">${f.n}</div><div class="${numSize} font-black px-2">${f.d}</div></div>`;
                correctVisual.appendChild(wrap);
                if(i < correctF.length - 1) {
                    const arrow = document.createElement('div');
                    arrow.className = `flex items-center ${symClass} font-black text-slate-300 shrink-0`;
                    arrow.innerHTML = isAscending ? "&lt;" : "&gt;";
                    correctVisual.appendChild(arrow);
                }
            });
            if (isCorrect) {
                // 每題計分 = 100 / 總題數 (無條件捨去至整數)
                score += Math.floor(100 / totalLevelsCount);
                icon.innerText = "❤️";
                title.innerText = "正確！做得好";
                title.className = "text-5xl font-black mb-6 text-green-600";
            } else {
                icon.innerText = "💡";
                title.innerText = "別灰心，看這裡！";
                title.className = "text-5xl font-black mb-6 text-orange-500";
            }
            logicHint.innerText = hint;
            updateScoreDisplay();
            overlay.classList.remove('hidden');
        }

        function nextLevel() {
            document.getElementById('feedback-overlay').classList.add('hidden');
            currentLevel++;
            loadLevel();
        }

        function updateScoreDisplay() {
            // 顯示當前累積的百分比分數
            document.getElementById('score').innerText = score;
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            const endScreen = document.getElementById('end-screen');
            const resIcon = document.getElementById('result-icon');
            const resComment = document.getElementById('result-comment');
            const resSub = document.getElementById('result-subtext');
            const finalScoreEl = document.getElementById('final-score');
            
            // 處理最後得分 (若全對則強制補正為 100，避免捨去誤差)
            if (score > 90 && score < 100) score = 100;

            finalScoreEl.innerText = score;
            endScreen.classList.remove('hidden');

            if (score >= 100) {
                resIcon.innerText = "🏆";
                resComment.innerText = "做得好，非常棒！";
                resComment.className = "text-5xl font-black mb-6 text-yellow-500";
                resSub.innerText = "你已經完全掌握了分數比較的技巧，你是真正的數學小天才！";
            } else if (score >= 80) {
                resIcon.innerText = "🥈";
                resComment.innerText = "很好，十分棒！";
                resComment.className = "text-5xl font-black mb-6 text-blue-600";
                resSub.innerText = "你的表現非常出色，幾乎完美的完成了挑戰，繼續保持！";
            } else if (score >= 60) {
                resIcon.innerText = "🥉";
                resComment.innerText = "表現不錯。";
                resComment.className = "text-5xl font-black mb-6 text-green-600";
                resSub.innerText = "你對分數已經有了不錯的理解，再細心一點就能拿到更高分囉。";
            } else if (score >= 40) {
                resIcon.innerText = "🌱";
                resComment.innerText = "有改善空間，繼續努力。";
                resComment.className = "text-5xl font-black mb-6 text-orange-500";
                resSub.innerText = "基礎已經打好了，建議再多觀察圓餅圖的佔比，加油！";
            } else {
                resIcon.innerText = "🔍";
                resComment.innerText = "看看自己問題所在，糾正錯處。";
                resComment.className = "text-5xl font-black mb-6 text-slate-600";
                resSub.innerText = "別難過，學習就是從錯誤中進步。仔細看看剛才的提示，再試一次吧！";
            }
        }

        function showTeacherMode() { document.getElementById('teacher-panel').classList.remove('hidden'); }
        function hideTeacherMode() { document.getElementById('teacher-panel').classList.add('hidden'); }

        function savePresets() {
            const val = document.getElementById('preset-input').value.trim();
            if (!val) {
                alert("請先輸入題目！");
                return;
            }
            
            let hasEquivalentError = false;
            let hasLimitError = false;

            const newLevels = val.split('\n').filter(l => l.trim()).map(line => {
                const fracs = line.split(',').map(s => {
                    const p = s.trim().split('/');
                    if (p.length !== 2) return null;
                    return { n: parseInt(p[0]), d: parseInt(p[1]) };
                }).filter(f => f !== null && !isNaN(f.n) && !isNaN(f.d));
                
                if (fracs.length < 2) return null;
                
                if (fracs.length > 10) {
                    hasLimitError = true;
                }

                const values = fracs.map(f => f.n / f.d);
                const uniqueValues = new Set(values);
                if (uniqueValues.size !== values.length) {
                    hasEquivalentError = true;
                }

                let type = 'diff';
                if (fracs.every(f => f.d === fracs[0].d)) type = 'same_den';
                else if (fracs.every(f => f.n === fracs[0].n)) type = 'same_num';
                return { type, fractions: fracs, isAscending: Math.random() > 0.5 };
            }).filter(l => l !== null);
            
            if (hasLimitError) {
                alert("每題最多只能設定 10 個分數！請修改題目後再儲存！");
                return;
            }

            if (hasEquivalentError) {
                alert("設定的題目中包含了「相同等值」的分數（例如 1/2 與 2/4），這會導致無法依大小排列。請修改題目後再儲存！");
                return;
            }

            if (newLevels.length) {
                teacherPresets = newLevels;
                
                // 更新 UI 狀態
                const status = document.getElementById('preset-status');
                status.innerText = `✅ 已成功保存 ${teacherPresets.length} 題庫！請設定「比賽題數」並點擊開始。`;
                status.classList.remove('hidden');

                const startBtn = document.getElementById('preset-start-btn');
                startBtn.disabled = false;
                startBtn.classList.remove('bg-slate-300', 'text-slate-500', 'cursor-not-allowed');
                startBtn.classList.add('bg-indigo-600', 'text-white', 'hover:bg-indigo-700');

                // 設定題數上限
                const countInput = document.getElementById('preset-count-input');
                countInput.max = teacherPresets.length;
                if(parseInt(countInput.value) > teacherPresets.length) {
                    countInput.value = teacherPresets.length;
                }
            } else {
                alert("請輸入正確的分數格式，例如：1/2, 1/3");
            }
        }

        function startPresetGame() {
            if(teacherPresets.length === 0) return;
            
            let targetCount = parseInt(document.getElementById('preset-count-input').value) || teacherPresets.length;
            if (targetCount > teacherPresets.length) targetCount = teacherPresets.length;

            // 隨機抽題以構成遊戲回合
            let shuffled = [...teacherPresets].sort(() => Math.random() - 0.5);
            levels = shuffled.slice(0, targetCount);
            totalLevelsCount = levels.length;

            startGame('preset');
            hideTeacherMode();
        }
    </script>
