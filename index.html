            let firebaseConfig;

            if (isCanvasEnvironment) {

              font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
              color: #0f172a;
              margin: 0;
              padding: 0;
              -webkit-print-color-adjust: exact;
              print-color-adjust: exact;
            }
            .page {
              page-break-after: always;
              display: flex;
              flex-direction: column;
            }
            .page:last-child {
              page-break-after: auto;
            }
            .header-container {
              margin-bottom: 16px;
              padding-bottom: 8px;
            }
            .header-row {
              display: flex;
              justify-content: space-between;
              align-items: flex-end;
              margin-bottom: 8px;
            }
            .title-text {
              font-size: 24px;
              font-weight: 900;
            }
            .sub-text {
              font-size: 16px;
              font-weight: 700;
            }
            table {
              width: 100%;
              border-collapse: collapse;
              font-size: 14px;
            }
            th, td {
              border: 1px solid #1e293b;
              padding: 6px 8px;
              text-align: center;
              font-weight: 700;
            }
            th {
              background-color: #f1f5f9;
              font-weight: 900;
            }
          </style>
        </head>
        <body>
          ${pages.map((pageData, index) => `
          <div class="page">
            <div class="header-container">
              <div class="header-row">
                <span class="title-text">觀塘官立小學(秀明道)</span>
                <span class="sub-text">列印日期：${printDate}</span>
              </div>
              <div class="header-row">
                <span class="sub-text">代課資料統計 (截至日期：${updateDateStr})</span>
                <span class="sub-text">第 ${index + 1} 頁</span>
              </div>
            </div>
            <table>
              <thead>
                <tr>
                  <th>教師代號</th>
                  <th>缺課日數</th>
                  <th>缺課課節</th>
                  <th>代課課節</th>
                  <th>淨值</th>
                </tr>
              </thead>
              <tbody>
                ${pageData.map(row => `
                <tr>
                  <td>${row.teacher}</td>
                  <td>${row.absentDays}</td>
                  <td>${row.absentPeriods}</td>
                  <td>${row.subPeriods}</td>
                  <td>${row.netValue}</td>
                </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
          `).join('')}
          <script>
            window.onload = () => {
              window.print();
            };
          <\/script>
        </body>
        </html>
        `;
        printWindow.document.write(htmlContent);
        printWindow.document.close();
      };

      // 處理 Excel 備份檔案匯入 (備份↑)
      const handleBackupUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        try {
          // 從檔案名稱中提取日期 (例如 REPORT-YYYYMMDD.xlsx)
          let dateStr = "";
          const match = file.name.match(/REPORT-(\d{4})(\d{2})(\d{2})/i);
          if (match) {
             dateStr = `${match[3]}-${match[2]}-${match[1]}`;
          } else {
             const today = new Date();
             dateStr = `${String(today.getDate()).padStart(2, '0')}-${String(today.getMonth() + 1).padStart(2, '0')}-${today.getFullYear()}`;
          }

          const data = await file.arrayBuffer();
          const workbook = XLSX.read(new Uint8Array(data), { type: 'array' });
          const sheetName = workbook.SheetNames[0];
          const worksheet = workbook.Sheets[sheetName];
          const jsonData = XLSX.utils.sheet_to_json(worksheet);

          const nextStats = JSON.parse(JSON.stringify(statsRawData));

          jsonData.forEach(row => {
            const teacher = row["教師代號"];
            const absentDays = Number(row["缺課日數"]) || 0;
            const absentPeriods = Number(row["缺課課節"]) || 0;
            const subPeriods = Number(row["代課課節"]) || 0;

            if (teacher && nextStats[teacher] !== undefined) {
              // 因為是備份還原，所以覆寫原有資料，並根據缺課日數與課節模擬出 absencesByDate 結構
              const absencesByDate = {};
              let remainingPeriods = absentPeriods;
              for (let i = 0; i < absentDays; i++) {
                 let p = Math.ceil(remainingPeriods / (absentDays - i));
                 if (p > 4) p = 4; // 根據規則每天最多計算 4 節
                 absencesByDate[`BACKUP-${dateStr}-${i}`] = p;
                 remainingPeriods -= p;
              }
              
              nextStats[teacher] = {
                 absencesByDate: absencesByDate,
                 subPeriods: subPeriods
              };
            }
          });

          setStatsRawData(nextStats);
          setStatsUpdateDate(dateStr);
          saveStatsToCloud(nextStats, dateStr);
          
          e.target.value = null;
          
          if (!firebaseUser || !db) {
            setAlertMessage(`成功還原備份資料！\n\n(注意：系統目前未設定 Firebase，資料僅儲存於本機)`);
          } else {
            setAlertMessage(`成功還原備份資料並已同步更新至雲端！`);
          }

        } catch (error) {
          console.error(error);
          setAlertMessage("讀取備份檔案失敗，請確定選擇了正確的 REPORT 備份檔案。");
        }
      };

      // 處理 Excel 檔案匯入與計算 (支援累積、剔除對調課堂與公務例外處理、多檔案匯入)
      const handleFileUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        try {
          // 拷貝現有的狀態以進行累積
          const nextStats = JSON.parse(JSON.stringify(statsRawData));
          
          // 確保所有教師存在
          teachers.forEach(t => {
            if (!nextStats[t]) nextStats[t] = { absencesByDate: {}, subPeriods: 0 };
          });

          // 循序處理每個檔案
          for (const file of files) {
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(new Uint8Array(data), { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            const jsonData = XLSX.utils.sheet_to_json(worksheet);

            jsonData.forEach(row => {
              // (1) 篩選出沒有”對調課堂”的列，不作計算
              const swapData = row["對調課堂"];
              if (swapData !== undefined && swapData !== null && String(swapData).trim() !== "") {
                return; // 忽略此列 (對調課堂)
              }

              const date = row["代課日期"];
              const originalTeacher = row["原任老師"];
              const substituteTeacher = row["代課老師"];
              const reason = String(row["缺課原因"] || "");
              
              // (2) 缺席原因為"公務"時，原任老師不計算缺課
              const isOfficial = reason.includes("公務");
              
              // 檢查節數是否為數字
              let periods = 1;
              if (row["節數"] !== undefined && row["節數"] !== null && row["節數"] !== "") {
                const parsed = Number(row["節數"]);
                periods = isNaN(parsed) ? 1 : parsed;
              }

              // 累積原任老師 (缺課) 數據 (若為公務則不計算缺課日數及缺課課節)
              if (originalTeacher && nextStats[originalTeacher] && !isOfficial) {
                if (date) {
                  if (!nextStats[originalTeacher].absencesByDate[date]) {
                    nextStats[originalTeacher].absencesByDate[date] = 0;
                  }
                  nextStats[originalTeacher].absencesByDate[date] += periods;
                }
              }

              // 累積代課老師 (代課) 數據
              if (substituteTeacher && nextStats[substituteTeacher]) {
                nextStats[substituteTeacher].subPeriods += periods;
              }
            });
          }

          // 設定更新日期為 日-月-年 (DD-MM-YYYY)
          const today = new Date();
          const dd = String(today.getDate()).padStart(2, '0');
          const mm = String(today.getMonth() + 1).padStart(2, '0');
          const yyyy = today.getFullYear();
          const newDateStr = `${dd}-${mm}-${yyyy}`;

          setStatsRawData(nextStats);
          setStatsUpdateDate(newDateStr);
          saveStatsToCloud(nextStats, newDateStr); // 呼叫存檔(同步至雲端與本地)
          
          // 讀取後清空 input 的值，讓使用者可以再次選擇同一個檔案
          e.target.value = null;
          
          if (!firebaseUser || !db) {
            setAlertMessage(`成功匯入 ${files.length} 個檔案！\n\n(注意：系統目前未設定 Firebase，資料僅儲存於本機)`);
          } else {
            setAlertMessage(`成功匯入 ${files.length} 個檔案並已同步更新至雲端！`);
          }

        } catch (error) {
          console.error(error);
          setAlertMessage("讀取檔案失敗，請確定檔案為 Excel 格式，且包含「代課日期」、「原任老師」、「代課老師」、「節數」、「缺課原因」、「對調課堂」等欄位。");
        }
      };

      // 已移除定時器 setInterval，解決原生小月曆在週末被強制鎖定或關閉的問題
      useEffect(() => {
        const now = new Date();
        const day = now.getDay();
        const dayMap = { 1: 'mon', 2: 'tue', 3: 'wed', 4: 'thur', 5: 'fri' };
        if (dayMap[day]) {
          setActiveTab(dayMap[day]);
          setSelectedDayView(dayMap[day]);
        }
      }, []);

      const displayDateInfo = useMemo(() => {
        const currentDayConfig = DAYS_CONFIG.find(d => d.id === activeTab);
        const dayOfWeek = todayDate.getDay();
        let baseDate = new Date(todayDate);
        if (dayOfWeek === 0 || dayOfWeek === 6) {
            baseDate.setDate(todayDate.getDate() + (dayOfWeek === 0 ? 1 : 2));
        } else {
            baseDate.setDate(todayDate.getDate() + (1 - dayOfWeek));
        }
        const targetDate = new Date(baseDate);
        targetDate.setDate(baseDate.getDate() + (currentDayConfig.offset - 1));
        return {
          dateString: targetDate.toLocaleDateString('zh-HK', { year: 'numeric', month: 'long', day: 'numeric' }),
          weekday: `星期${currentDayConfig.label}`,
          rawDate: targetDate
        };
      }, [activeTab, todayDate]);

      const teachers = useMemo(() => {
        const dayData = rawData[activeTab] || rawData.mon;
        const headerRow = dayData.find(row => row[0] && row[0].includes("教師代號"));
        return headerRow ? headerRow.slice(1).filter(t => t && t.trim() !== "") : [];
      }, [rawData, activeTab]);

      const availableClasses = useMemo(() => {
        const classes = new Set();
        const standardClasses = ["1A", "1B", "1C", "1D", "1E", "2A", "2B", "2C", "2D", "2E", "3A", "3B", "3C", "3D", "3E", "4A", "4B", "4C", "4D", "4E", "5A", "5B", "5C", "5D", "5E", "6A", "6B", "6C", "6D", "6E"];
        standardClasses.forEach(c => classes.add(c));
        return Array.from(classes).sort();
      }, []);

      const getTeacherSchedule = (teacherName, dayId) => {
        const dayData = rawData[dayId] || rawData.mon;
        const headerRow = dayData.find(row => row[0] && row[0].includes("教師代號"));
        if (!headerRow) return Array(SCHEDULE_STRUCTURE.length).fill("");
        const teacherIdx = headerRow.indexOf(teacherName);
        if (teacherIdx === -1) return Array(SCHEDULE_STRUCTURE.length).fill("");
        return SCHEDULE_STRUCTURE.map(slot => {
          const dataRow = dayData.find(row => row[0] && row[0].includes(slot.csvKey));
          return dataRow ? dataRow[teacherIdx] || "" : "";
        });
      };

      const getClassSchedule = (cls, dayId) => {
        if (!cls) return [];
        const dayData = rawData[dayId] || rawData.mon;
        const headerRow = dayData.find(row => row[0] && row[0].includes("教師代號"));
        
        return SCHEDULE_STRUCTURE.map(slot => {
          if (slot.type === 'break') {
            return { ...slot, subject: '', teacher: '' };
          }
          const dataRow = dayData.find(r => r[0] && r[0].includes(slot.csvKey));
          let subject = '';
          let teacher = '';
          if (dataRow && headerRow) {
            for (let i = 1; i < dataRow.length; i++) {
              const cell = dataRow[i];
              if (cell) {
                if (cell === cls) {
                  subject = slot.id === 'HR' ? '班主任節' : slot.label;
                  teacher = headerRow[i];
                  break;
                } else if (cell.startsWith(cls + '/')) {
                  subject = cell.split('/')[1];
                  teacher = headerRow[i];
                  break;
                }
              }
            }
          }

          if (dayId === 'fri' && (slot.id === '8' || slot.id === '9')) {
            subject = '課外活動';
          }

          return { ...slot, subject, teacher };
        });
      };

      const isClassOccupied = (content) => {
        if (!content || content.trim() === "") return false;
        const busyKeywords = ["BREAK", "REST", "小息", "小休", "午息", "午休", "班主任節"];
        return !busyKeywords.some(b => content.toUpperCase().includes(b));
      };

      const getAvailableTeachers = (dayId, lessonIdx) => {
        const available = [];
        const seenNames = new Set();
        teachers.forEach(t => {
          if (seenNames.has(t) || t === selectedTeacher) return;
          const schedule = getTeacherSchedule(t, dayId);
          if (!isClassOccupied(schedule[lessonIdx])) {
            const totalLessons = schedule.filter(l => isClassOccupied(l)).length;
            
            let prevCount = 0;
            let hasPrev1Lesson = false;
            let hasPrev2Lesson = false;
            for (let i = lessonIdx - 1; i >= 0; i--) {
              if (SCHEDULE_STRUCTURE[i].type === 'break') continue;
              prevCount++;
              if (prevCount === 1) hasPrev1Lesson = isClassOccupied(schedule[i]);
              if (prevCount === 2) {
                hasPrev2Lesson = isClassOccupied(schedule[i]);
                break;
              }
            }

            let nextCount = 0;
            let hasNext1Lesson = false;
            let hasNext2Lesson = false;
            for (let i = lessonIdx + 1; i < schedule.length; i++) {
              if (SCHEDULE_STRUCTURE[i].type === 'break') continue;
              nextCount++;
              if (nextCount === 1) hasNext1Lesson = isClassOccupied(schedule[i]);
              if (nextCount === 2) {
                hasNext2Lesson = isClassOccupied(schedule[i]);
                break;
              }
            }

            const prevStatus = (hasPrev1Lesson && hasPrev2Lesson) ? 'X' : (hasPrev1Lesson ? 'R' : 'G');
            const nextStatus = (hasNext1Lesson && hasNext2Lesson) ? 'X' : (hasNext1Lesson ? 'R' : 'G');

            available.push({ id: t, total: totalLessons, prevStatus, nextStatus });
            seenNames.add(t);
          }
        });
        return available.sort((a, b) => a.total - b.total);
      };

      const getTeacherTextColor = (name) => {
        if (MAROON_TEACHERS.includes(name)) return 'text-[#800000]';
        if (GREEN_TEACHERS.includes(name)) return 'text-emerald-700';
        return 'text-black';
      };

      const handleAssignSub = (lessonIdx, subId) => {
        const key = `${activeTab}-${lessonIdx}-${selectedTeacher}`;
        setAssignments(prev => ({ ...prev, [key]: subId }));
        
        if (isSwapMode) {
          setSwapArrangements(prev => ({
            ...prev,
            [key]: { date: '', period: '' }
          }));
        } else {
          setSwapArrangements(prev => {
            const next = { ...prev };
            delete next[key];
            return next;
          });
        }
      };

      const handleRemoveSub = (lessonIdx) => {
        const key = `${activeTab}-${lessonIdx}-${selectedTeacher}`;
        const newAssignments = { ...assignments };
        delete newAssignments[key];
        setAssignments(newAssignments);

        setSwapArrangements(prev => {
          const next = { ...prev };
          delete next[key];
          return next;
        });
      };

      const handleUpdateSwap = (key, field, value) => {
        setSwapArrangements(prev => ({
          ...prev,
          [key]: {
            ...prev[key],
            [field]: value
          }
        }));
      };

      const handleReasonChange = (e) => {
        const key = `${selectedTeacher}-${activeTab}`;
        setLeaveReasons(prev => ({ ...prev, [key]: e.target.value }));
      };

      const handleExportExcel = () => {
        const { rawDate } = displayDateInfo;
        const yyyy = rawDate.getFullYear();
        const mm = String(rawDate.getMonth() + 1).padStart(2, '0');
        const dd = String(rawDate.getDate()).padStart(2, '0');
        const dateStr = `${yyyy}${mm}${dd}`;
        const processId = `SUB-${dateStr}`;
        const fileName = `${processId}.csv`;

        const leaveReason = leaveReasons[`${selectedTeacher}-${activeTab}`] || "未註明";
        const formattedDisplayDate = `${yyyy}年${mm}月${dd}日`;

        let csvContent = "\uFEFF";
        csvContent += "代課日期,缺課原因,原任老師,節數,時段,班別,科目,代課老師,處理編號,對調課堂\n";

        let hasData = false;

        SCHEDULE_STRUCTURE.forEach((slot, idx) => {
          const assignedSub = assignments[`${activeTab}-${idx}-${selectedTeacher}`];
          if (assignedSub) {
            hasData = true;
            const content = getTeacherSchedule(selectedTeacher, activeTab)[idx];
            let classCode = "", subject = "";
            
            if (content && content.includes('/')) {
              [classCode, subject] = content.split('/');
            } else if (content) {
              classCode = content;
              subject = slot.id === 'HR' ? "班主任節" : slot.label;
            }

            let swapString = "";
            const swapData = swapArrangements[`${activeTab}-${idx}-${selectedTeacher}`];
            if (swapData && swapData.date && swapData.period) {
              const d = new Date(swapData.date);
              if (!isNaN(d.getTime())) {
                const day = d.getDate();
                const month = d.getMonth() + 1;
                const weekday = ['日', '一', '二', '三', '四', '五', '六'][d.getDay()];
                swapString = `${day}/${month} (${weekday}), ${swapData.period}`;
              }
            }

            const row = [
              formattedDisplayDate,
              leaveReason,
              selectedTeacher,
              slot.label,
              slot.time,
              classCode,
              subject,
              assignedSub,
              processId,
              swapString
            ].map(field => `"${field}"`).join(",");
            
            csvContent += row + "\n";
          }
        });

        if (!hasData) return;

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", fileName);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleLogin = (e) => {
        e.preventDefault();
        if (passwordInput === 'Smr-2026') {
          setIsAuthenticated(true);
          setIsAdmin(true); // 管理員權限
          setLoginError("");
        } else if (passwordInput === 'Smr-12345') {
          setIsAuthenticated(true);
          setIsAdmin(false); // 一般使用者權限
          setLoginError("");
        } else {
          setLoginError("密碼錯誤，請重新輸入。");
          setPasswordInput("");
        }
      };

      // 處理檢視調放建議的比對邏輯
      const handleViewSwapSuggestions = () => {
        if (!swapOriginalTeacher || !swapSubTeacher) {
          setAlertMessage("請先選擇「代課」及「缺課」教師！");
          return;
        }
        if (swapOriginalTeacher === swapSubTeacher) {
          setAlertMessage("「代課」與「缺課」不能為同一人！");
          return;
        }

        const results = {};
        DAYS_CONFIG.forEach(day => {
          const origSched = getTeacherSchedule(swapOriginalTeacher, day.id);
          const subSched = getTeacherSchedule(swapSubTeacher, day.id);
          const matchedSlots = [];

          SCHEDULE_STRUCTURE.forEach((slot, idx) => {
            // 略過小息、午休時間，但包括班主任節及午膳時間作比對
            if (slot.type === 'break') return;
            
            const origOccupied = isClassOccupied(origSched[idx]);
            const subOccupied = isClassOccupied(subSched[idx]);

            // 邏輯：比對”代課”的吉堂(!origOccupied) 和”缺課”的要上課(subOccupied)
            // 剔除兩者都有課堂，或兩者都是吉堂的課節
            if (!origOccupied && subOccupied) {
              matchedSlots.push(slot.label);
            }
          });
          results[day.id] = matchedSlots.length > 0 ? matchedSlots.join(", ") : "--";
        });
        setSwapSuggestions(results);
      };

      if (!isAuthenticated) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 font-sans text-slate-900">
            <div className="bg-white p-10 rounded-[3rem] shadow-2xl border-2 border-slate-100 max-w-md w-full text-center relative">
              <div className="flex justify-center mb-6">
                <div className="bg-blue-600 p-4 rounded-[1.5rem] shadow-xl transform rotate-3">
                  <Calendar className="text-white w-10 h-10" />
                </div>
              </div>
              <h1 className="text-3xl font-black text-slate-800 tracking-tight leading-none mb-3">觀塘官立小學(秀明道)</h1>
              <h2 className="text-2xl font-bold text-blue-600 mb-8">智能編代課系統</h2>
              
              <form onSubmit={handleLogin} className="flex flex-col gap-6">
                <div className="text-left">
                  <label className="text-lg font-black text-slate-700 mb-3 block">請輸入密碼：</label>
                  <div className="relative">
                    <input 
                      type={showPassword ? "text" : "password"}
                      value={passwordInput}
                      onChange={(e) => { setPasswordInput(e.target.value); setLoginError(""); }}
                      className={`w-full px-6 py-4 bg-slate-50 border-2 ${loginError ? 'border-rose-500' : 'border-slate-200'} rounded-2xl text-xl font-bold focus:border-blue-600 outline-none transition-all text-center tracking-widest pr-12`}
                      autoFocus
                      placeholder="•••••••••"
                    />
                    <button 
                      type="button"
                      onClick={() => setShowPassword(!showPassword)}
                      className="absolute right-4 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-slate-600 transition-colors"
                    >
                      {showPassword ? <EyeOff className="w-6 h-6" /> : <Eye className="w-6 h-6" />}
                    </button>
                  </div>
                  {loginError && (
                    <p className="text-rose-500 text-sm font-bold mt-3 text-center">{loginError}</p>
                  )}
                </div>
                <button 
                  type="submit"
                  className="bg-blue-600 text-white text-xl font-black py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all active:scale-95 mt-2"
                >
                  登入系統
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <>
        <div id="root-app" className="text-slate-900 p-4 md:p-6 font-sans">
          <header className="max-w-7xl mx-auto mb-10 space-y-6">
            <div className="flex items-start gap-5">
              <div className="bg-blue-600 p-4 rounded-[1.5rem] shadow-xl transform rotate-3">
                <Calendar className="text-white w-8 h-8" />
              </div>
              <div className="flex-1 w-full overflow-hidden">
                <h1 className="text-3xl font-black text-slate-800 tracking-tight leading-none mb-2">觀塘官立小學(秀明道)</h1>
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 w-full">
                  <div className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-3 overflow-hidden shrink w-full sm:w-auto">
                    <h2 className="text-[5vw] sm:text-xl font-bold text-blue-600 whitespace-nowrap overflow-hidden text-ellipsis">智能編代課系統v.3.1.2</h2>
                    <div className="flex flex-row items-center justify-between w-full sm:w-auto shrink-0">
                      <div className="flex gap-2 sm:gap-2">
                        <button onClick={() => window.location.href='https://gogo2526.github.io/sub-system/'} className="bg-[#800000] hover:bg-[#600000] text-white text-[3.8vw] sm:text-sm font-bold py-1.5 px-3 sm:px-3 rounded-lg shadow-sm transition-colors whitespace-nowrap">全日</button>
                        <button onClick={() => window.location.href='https://gogo2526.github.io/sub-system/index-a.html'} className="bg-gray-500 hover:bg-gray-600 text-white text-[3.8vw] sm:text-sm font-bold py-1.5 px-3 sm:px-3 rounded-lg shadow-sm transition-colors whitespace-nowrap">半日</button>
                        <button onClick={() => { setSelectedTeacher(""); setSubRequest(null); }} className="bg-slate-400 hover:bg-slate-500 text-white text-[3.8vw] sm:text-sm font-bold py-1.5 px-3 sm:px-3 rounded-lg shadow-sm transition-colors whitespace-nowrap">-</button>
                      </div>
                      <button 
                        onClick={() => { setIsAuthenticated(false); setPasswordInput(""); }} 
                        className="sm:hidden bg-yellow-600 hover:bg-yellow-700 text-white text-[3.8vw] font-bold py-1.5 px-3 rounded-lg shadow-sm transition-all whitespace-nowrap shrink-0"
                      >
                        登出
                      </button>
                    </div>
                  </div>
                  <button 
                    onClick={() => { setIsAuthenticated(false); setPasswordInput(""); }} 
                    className="hidden sm:block bg-yellow-600 hover:bg-yellow-700 text-white text-lg sm:text-2xl font-black py-1 sm:py-1.5 px-3 sm:px-6 rounded-xl shadow-sm transition-all whitespace-nowrap shrink-0"
                  >
                    登出
                  </button>
                </div>
              </div>
            </div>

            <div className="w-full flex flex-col md:flex-row items-center justify-between gap-4 bg-white p-2.5 rounded-3xl shadow-sm border border-slate-200">
              <div className="relative group w-full md:w-auto min-w-[240px]">
                <select
                  value={selectedTeacher}
                  onChange={(e) => { setSelectedTeacher(e.target.value); setSubRequest(null); }}
                  className="pl-11 pr-8 py-3.5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xl font-black hover:border-blue-600 outline-none transition-all cursor-pointer appearance-none w-full shadow-sm text-black"
                >
                  <option value="" disabled>請選擇缺席教師...</option>
                  {teachers.map((t, idx) => (
                    <option key={`${t}-${idx}`} value={t} className={getTeacherTextColor(t)}>{t}</option>
                  ))}
                </select>
                <User className="absolute left-4 top-1/2 -translate-y-1/2 w-6 h-6 text-blue-600 pointer-events-none" />
                <ChevronDown className="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 pointer-events-none" />
              </div>

              <div className="flex bg-slate-50 p-1.5 rounded-2xl w-full md:w-auto">
                {DAYS_CONFIG.map(day => (
                  <button
                    key={day.id}
                    onClick={() => { setActiveTab(day.id); setSubRequest(null); }}
                    className={`flex-1 px-2 sm:px-4 md:px-6 py-3 text-2xl font-black rounded-xl transition-all ${activeTab === day.id ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-blue-600'}`}
                  >
                    {day.label}
                  </button>
                ))}
              </div>
            </div>
          </header>

          <div className="max-w-7xl mx-auto">
            {!selectedTeacher ? (
              <div className="bg-white rounded-[3rem] border-4 border-dashed border-slate-200 h-[50vh] flex flex-col items-center justify-center text-slate-400">
                <User className="w-24 h-24 opacity-10 mb-8" />
                <h3 className="text-3xl font-black mb-2 text-slate-500">準備開始編配代課</h3>
                <p className="text-xl font-bold opacity-60">請先從上方選單揀選缺席教師</p>
              </div>
            ) : (
              <div className="flex flex-col gap-8 w-full">
                <div className="bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden">
                  <div className="p-10 border-b border-slate-100 bg-gradient-to-br from-white to-blue-50/30">
                    <div className="flex gap-8">
                      <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-4xl font-black shadow-2xl">
                        {selectedTeacher.charAt(0)}
                      </div>
                      <div className="flex flex-col gap-2 w-full">
                        <h2 className="text-4xl font-black tracking-tighter text-black">上課時間表 ({selectedTeacher})</h2>
                        <p className="font-black text-2xl text-slate-700">日期：{displayDateInfo.dateString} ({displayDateInfo.weekday})</p>
                        <div className="mt-2 text-2xl font-black text-black flex flex-wrap items-center gap-1">
                          <span className="shrink-0">缺課原因：</span>
                          <div className="relative inline-flex items-center min-w-[180px]">
                            <select 
                              value={leaveReasons[`${selectedTeacher}-${activeTab}`] || ""} 
                              onChange={handleReasonChange}
                              className="bg-transparent border-none outline-none focus:ring-0 cursor-pointer text-black appearance-none pr-8 py-0"
                            >
                              <option value="">請揀選原因...</option>
                              <option value="病假">病假</option>
                              <option value="事假">事假</option>
                              <option value="出席工作坊">出席工作坊</option>
                              <option value="進修">進修</option>
                              <option value="校內活動">校內活動</option>
                              <option value="出外參觀">出外參觀</option>
                              <option value="出席會議">出席會議</option>
                              <option value="帶隊比賽">帶隊比賽</option>
                              <option value="境外交流">境外交流</option>
                              <option value="公務(不計算代課)">公務(不計算代課)</option>
                              <option value="其他">其他</option>
                            </select>
                            <ChevronDown className="w-5 h-5 absolute right-0 text-slate-400 pointer-events-none" />
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="p-8 space-y-4">
                    {SCHEDULE_STRUCTURE.map((slot, idx) => {
                      const content = getTeacherSchedule(selectedTeacher, activeTab)[idx];
                      const isBreak = slot.type === 'break';
                      const isSelected = subRequest && subRequest.lessonIdx === idx;
                      const assignedSub = assignments[`${activeTab}-${idx}-${selectedTeacher}`];
                      const isActualLesson = isClassOccupied(content);
                      
                      let classCode = "", subject = "";
                      if (isActualLesson) {
                        if (content.includes('/')) [classCode, subject] = content.split('/');
                        else { classCode = content; subject = slot.id === 'HR' ? "班主任節" : slot.label; }
                      }

                      if (isBreak) {
                        return (
                          <div key={idx} className="bg-slate-100 border-2 border-slate-400 rounded-2xl py-3 px-8 flex items-center justify-between">
                            <span className="text-lg font-black text-black tracking-widest">{slot.time}</span>
                            <div className="flex items-center gap-4">
                              <span className="font-black text-black text-2xl">{slot.label}</span>
                              {slot.icon}
                            </div>
                          </div>
                        );
                      }

                      return (
                        <div key={idx} className="relative">
                          <div 
                            onClick={() => {
                              if (isActualLesson && !assignedSub) {
                                setSubRequest({ lessonIdx: idx });
                                setIsSwapMode(false);
                              }
                            }}
                            className={`flex flex-col md:flex-row gap-6 p-6 rounded-[2rem] border-2 transition-all ${
                              isActualLesson 
                                ? isSelected ? "bg-orange-50 border-[#800000] scale-[1.02] shadow-lg" 
                                : assignedSub ? "bg-[#E3F2FD] border-slate-500"
                                : slot.id === 'LUNCH' ? "bg-[#FFF9E3] border-slate-500 hover:border-blue-400 cursor-pointer"
                                : "bg-white border-slate-500 hover:border-blue-400 cursor-pointer"
                              : "bg-slate-50 border-slate-300"
                            }`}
                          >
                            <div className="md:w-56 flex flex-col justify-center border-r pr-6 border-slate-100">
                              <span className="text-xl font-black uppercase tracking-tight text-slate-700">{slot.label}</span>
                              <span className="text-3xl font-black mt-1 text-slate-800">{slot.time}</span>
                            </div>

                            <div className="flex-grow flex items-center">
                              {isActualLesson ? (
                                <div className="flex items-center justify-between w-full">
                                  <div className="flex items-center gap-8">
                                    <div className="px-6 py-2 bg-white rounded-xl font-black text-3xl tracking-tighter shadow-sm border-2 text-[#008080] border-[#008080]">
                                      {classCode}
                                    </div>
                                    <div className="text-3xl font-black text-blue-700">
                                      {subject}
                                    </div>
                                  </div>
                                  <div className="flex items-center ml-auto">
                                    {assignedSub ? (
                                      <div className="flex items-center gap-3 px-6 py-2">
                                        <span className={`${assignedSub === 'Rachel' ? 'text-2xl' : 'text-4xl'} font-black ${getTeacherTextColor(assignedSub)}`}>{assignedSub}</span>
                                        <span className="text-2xl font-bold opacity-80 text-slate-700">代課</span>
                                        <button onClick={(e) => { e.stopPropagation(); handleRemoveSub(idx); }} className="p-2 text-slate-400 hover:text-red-500 transition-colors"><XCircle className="w-7 h-7" /></button>
                                      </div>
                                    ) : !isSelected && (
                                      <div className="flex items-center gap-2 group text-slate-500">
                                        <UserPlus className="w-5 h-5 text-slate-400 group-hover:text-blue-600" />
                                        <span className="text-sm font-black uppercase tracking-wide group-hover:text-blue-600">安排代課</span>
                                      </div>
                                    )}
                                  </div>
                                </div>
                              ) : (
                                <span className="text-3xl font-black text-slate-500 italic tracking-widest ml-4 uppercase">吉堂</span>
                              )}
                            </div>
                          </div>
                          
                          {isSelected && (
                            <div className="mt-4 p-8 bg-[#FFF9E3] border-2 border-slate-500 rounded-[2.5rem] animate-in zoom-in-95 shadow-xl">
                              <div className="flex flex-col md:flex-row justify-between items-start gap-6 mb-8 text-black">
                                <div className="flex flex-col gap-4 w-full">
                                  <h4 className="text-4xl font-black flex items-center gap-4">選擇代課教師</h4>
                                  <div className="bg-blue-50 border-2 border-slate-500 rounded-2xl p-4 flex flex-col gap-1.5 w-fit shadow-sm">
                                    <div className="flex items-center gap-2.5 text-sm font-bold text-black">
                                      <span className="font-black text-black text-base leading-none w-2.5 text-center flex justify-center">X</span>
                                      <span>X：代表該節「前兩課節」或「後兩課節」有課堂</span>
                                    </div>
                                    <div className="flex items-center gap-2.5 text-sm font-bold text-black">
                                      <span className="w-2.5 h-2.5 rounded-full bg-red-500 inline-block shadow-sm"></span>
                                      <span>紅點：代表該節「前一課節」或「後一課節」有課堂</span>
                                    </div>
                                    <div className="flex items-center gap-2.5 text-sm font-bold text-black">
                                      <span className="w-2.5 h-2.5 rounded-full bg-green-500 inline-block shadow-sm"></span>
                                      <span>綠點：代表該節「前一課節」或「後一課節」沒有課堂</span>
                                    </div>
                                    <div className="flex items-center gap-2.5 text-sm font-bold text-black mt-1">
                                      <span className="w-2.5 text-center font-black">*</span>
                                      <span>教師代號旁的左、右符號表示課節前後的狀況</span>
                                    </div>
                                  </div>
                                </div>
                                <div className="flex items-center gap-4 shrink-0">
                                  <label className="flex items-center gap-2 cursor-pointer bg-white px-4 py-2 rounded-xl border-2 border-slate-500 font-black text-lg text-slate-700 hover:bg-slate-50 transition-all">
                                    <input 
                                      type="checkbox" 
                                      checked={isSwapMode}
                                      onChange={(e) => setIsSwapMode(e.target.checked)}
                                      className="w-5 h-5 accent-blue-600 cursor-pointer"
                                    />
                                    調堂
                                  </label>
                                  <button 
                                    onClick={() => setSubRequest(null)} 
                                    className="bg-white px-4 py-2 rounded-xl border-2 border-slate-500 font-black text-lg text-slate-700 hover:bg-slate-50 hover:shadow-md transition-all shrink-0"
                                  >
                                    取消選取
                                  </button>
                                </div>
                              </div>
                              
                              <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-4">
                                {getAvailableTeachers(activeTab, idx).map((sub, sIdx) => (
                                  <button key={`${sub.id}-${sIdx}`} onClick={() => { handleAssignSub(idx, sub.id); setSubRequest(null); }} className="bg-white p-6 rounded-2xl border-2 border-orange-300 hover:border-[#800000] hover:shadow-xl transition-all flex flex-col items-center group relative overflow-hidden">
                                    <div className="flex items-center gap-2 mb-3">
                                        {sub.prevStatus === 'X' ? <span className="text-black font-black text-xl leading-none select-none w-3 flex justify-center -mt-0.5" title="前兩節有課">X</span> : <div className={`w-3 h-3 rounded-full shadow-sm shrink-0 ${sub.prevStatus === 'R' ? 'bg-red-500' : 'bg-green-500'}`} title={sub.prevStatus === 'R' ? '前一節有課' : '前一節無課'}></div>}
                                        <span className={`${sub.id === 'Rachel' ? 'text-2xl' : 'text-4xl'} font-black ${getTeacherTextColor(sub.id)}`}>{sub.id}</span>
                                        {sub.nextStatus === 'X' ? <span className="text-black font-black text-xl leading-none select-none w-3 flex justify-center -mt-0.5" title="後兩節有課">X</span> : <div className={`w-3 h-3 rounded-full shadow-sm shrink-0 ${sub.nextStatus === 'R' ? 'bg-red-500' : 'bg-green-500'}`} title={sub.nextStatus === 'R' ? '後一節有課' : '後一節無課'}></div>}
                                    </div>
                                    <span className="text-lg font-black text-slate-400 uppercase leading-none">總節數</span>
                                    <span className="text-3xl font-black text-slate-700">{sub.total}節</span>
                                  </button>
                                ))}
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                    
                    {Object.keys(swapArrangements).some(k => k.startsWith(`${activeTab}-`) && k.endsWith(`-${selectedTeacher}`)) && (
                      <div className="mt-8 pt-8 border-t-2 border-dashed border-slate-300">
                        <h3 className="text-2xl font-black text-slate-800 mb-6 flex items-center gap-3">
                          <Calendar className="w-6 h-6 text-blue-600" />
                          對調課堂安排
                        </h3>
                        
                        {(() => {
                          const allTeacherSwaps = Object.entries(swapArrangements)
                            .filter(([k]) => k.endsWith(`-${selectedTeacher}`));
                          
                          const comboMap = new Map();
                          const duplicateKeys = new Set();

                          for (const [k, swap] of allTeacherSwaps) {
                            if (swap.date && swap.period) {
                              const combo = `${swap.date}-${swap.period}`;
                              if (comboMap.has(combo)) {
                                duplicateKeys.add(k);
                                duplicateKeys.add(comboMap.get(combo));
                              } else {
                                comboMap.set(combo, k);
                              }
                            }
                          }

                          const visibleSwaps = allTeacherSwaps
                            .filter(([k]) => k.startsWith(`${activeTab}-`))
                            .sort((a, b) => parseInt(a[0].split('-')[1]) - parseInt(b[0].split('-')[1]));
                          
                          const hasVisibleConflict = visibleSwaps.some(([k]) => duplicateKeys.has(k));

                          return (
                            <>
                              {hasVisibleConflict && (
                                <div className="mb-6 p-4 bg-red-50 border-2 border-red-500 rounded-2xl flex items-center gap-3 text-red-600 animate-in fade-in slide-in-from-top-2 shadow-sm">
                                  <XCircle className="w-6 h-6 shrink-0" />
                                  <span className="text-lg font-black tracking-wide">所選的調課日子和課節出現重複,請重選.</span>
                                </div>
                              )}

                              <div className="flex flex-col gap-4">
                                {visibleSwaps.map(([key, swap]) => {
                                  const idx = parseInt(key.split('-')[1]);
                                  const slot = SCHEDULE_STRUCTURE[idx];
                                  const content = getTeacherSchedule(selectedTeacher, activeTab)[idx];
                                  let classCode = "";
                                  let subject = "";
                                  if (content && content.includes('/')) {
                                    [classCode, subject] = content.split('/');
                                  } else if (content) {
                                    classCode = content;
                                    subject = slot.id === 'HR' ? "班主任節" : slot.label;
                                  }
                                  
                                  const isConflict = duplicateKeys.has(key);
                                  
                                  return (
                                    <div key={key} className={`flex flex-col md:flex-row items-start md:items-center gap-4 p-5 rounded-2xl border-2 shadow-sm transition-all ${isConflict ? 'bg-red-50 border-red-300' : 'bg-purple-50 border-purple-200'}`}>
                                      <div className="text-xl font-black text-slate-800 min-w-[150px]">
                                        {slot.label}
                                        {classCode && <span className="text-[#800000] ml-2">{classCode}</span>}
                                        {subject && <span className="text-blue-600 ml-2">{subject}</span>}
                                      </div>
                                      <div className="text-lg font-black text-slate-500 shrink-0">已安排</div>
                                      <div className="flex flex-wrap items-center gap-3 w-full md:w-auto">
                                        <input 
                                          type="date" 
                                          lang="en-GB"
                                          value={swap.date}
                                          onChange={(e) => {
                                            const val = e.target.value;
                                            if (val) {
                                              const [y, m, d] = val.split('-');
                                              const dateObj = new Date(parseInt(y, 10), parseInt(m, 10) - 1, parseInt(d, 10));
                                              // 若使用者揀選星期六(6)或星期日(0)時，才出現提示訊息
                                              if (dateObj.getDay() === 0 || dateObj.getDay() === 6) {
                                                setAlertMessage("「對調課堂」不能選擇「星期六」或「星期日」");
                                                handleUpdateSwap(key, 'date', '');
                                                return;
                                              } else {
                                                // 若使用者選擇的日子是星期一至星期五，提示訊息絕對不會出現
                                                setAlertMessage("");
                                              }
                                            }
                                            handleUpdateSwap(key, 'date', val);
                                          }}
                                          className={`px-4 py-2.5 border-2 rounded-xl font-bold text-slate-700 outline-none focus:border-blue-500 bg-white shadow-sm transition-colors ${isConflict ? 'border-red-400 focus:border-red-500' : 'border-slate-300'}`}
                                        />
                                        <select
                                          value={swap.period}
                                          onChange={(e) => handleUpdateSwap(key, 'period', e.target.value)}
                                          className={`px-4 py-2.5 border-2 rounded-xl font-bold text-slate-700 outline-none focus:border-blue-500 bg-white shadow-sm min-w-[120px] transition-colors ${isConflict ? 'border-red-400 focus:border-red-500' : 'border-slate-300'}`}
                                        >
                                          <option value="">請選擇節數</option>
                                          {SCHEDULE_STRUCTURE.filter(s => s.type === 'class').map(s => (
                                            <option key={s.id} value={s.label}>{s.label}</option>
                                          ))}
                                        </select>
                                        <div className="text-lg font-black text-slate-500 shrink-0">對調課堂</div>
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            </>
                          );
                        })()}
                      </div>
                    )}

                    <div className="flex flex-col md:flex-row justify-between items-center mt-12 pt-8 border-t-2 border-slate-200 gap-6">
                      <button
                        onClick={handleExportExcel}
                        className="flex items-center justify-center gap-3 w-full md:w-auto px-8 py-4 bg-emerald-600 text-white rounded-2xl font-black text-xl sm:text-2xl whitespace-nowrap hover:bg-emerald-700 hover:shadow-lg transition-all"
                      >
                        <Download className="w-8 h-8 shrink-0" />
                        輸出Excel檔案
                      </button>
                      
                      <button
                        onClick={() => window.open('https://gogo2526.github.io/sub-system/print.html', '_blank')}
                        className="flex items-center justify-center gap-3 w-full md:w-auto px-8 py-4 bg-[#800000] text-white rounded-2xl font-black text-xl sm:text-2xl whitespace-nowrap hover:bg-[#600000] hover:shadow-lg transition-all"
                      >
                        <FileText className="w-8 h-8 shrink-0" />
                        製作「代課通知單」
                      </button>
                    </div>

                    <div className="pt-8 pb-4"></div>
                  </div>
                </div>
              </div>
            )}

            {/* 獨立方塊：包含 3 個藍色系列按鈕 (移至條件判斷外，無需選擇教師即可顯示) */}
            <div className="mt-8 bg-white rounded-[2rem] shadow-xl border-2 border-slate-100 p-6 sm:p-8">
              <div className="flex flex-row w-full gap-1.5 sm:gap-3 justify-between">
                <button 
                  onClick={() => {
                    setShowDataStatsSection(prev => !prev);
                    setTimeout(() => {
                      const el = document.getElementById('data-stats-section');
                      if(el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                  }}
                  className="flex-1 bg-blue-100 text-blue-800 hover:bg-blue-200 border-2 border-blue-200 rounded-lg sm:rounded-xl py-2 px-1 text-xs min-[375px]:text-sm sm:text-base md:text-xl font-black transition-all shadow-sm whitespace-nowrap overflow-hidden text-ellipsis"
                >
                  <span className="sm:hidden">數據統計</span>
                  <span className="hidden sm:inline">數據統計</span>
                </button>
                <button 
                  onClick={() => {
                    setShowSwapSuggestionSection(prev => !prev);
                    setTimeout(() => {
                      const el = document.getElementById('swap-suggestion-section');
                      if(el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                  }}
                  className="flex-1 bg-blue-500 text-white hover:bg-blue-600 border-2 border-blue-500 rounded-lg sm:rounded-xl py-2 px-1 text-xs min-[375px]:text-sm sm:text-base md:text-xl font-black transition-all shadow-sm whitespace-nowrap overflow-hidden text-ellipsis"
                >
                  <span className="sm:hidden">調課建議</span>
                  <span className="hidden sm:inline">調課吉堂建議</span>
                </button>
                <button 
                  onClick={() => {
                    setShowClassScheduleSection(prev => !prev);
                    setTimeout(() => {
                      const el = document.getElementById('class-schedule-section');
                      if(el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                  }}
                  className="flex-1 bg-blue-800 text-white hover:bg-blue-900 border-2 border-blue-800 rounded-lg sm:rounded-xl py-2 px-1 text-xs min-[375px]:text-sm sm:text-base md:text-xl font-black transition-all shadow-sm whitespace-nowrap overflow-hidden text-ellipsis"
                >
                  <span className="sm:hidden">班時間表</span>
                  <span className="hidden sm:inline">班別時間表</span>
                </button>
              </div>
            </div>

            {/* 新增方塊：數據統計資料 */}
            {showDataStatsSection && (
              <div id="data-stats-section" className="mt-8 bg-white p-6 md:p-10 rounded-[3rem] shadow-2xl border-2 border-slate-200 animate-in fade-in slide-in-from-top-4 duration-300">
                <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-4 gap-4 border-b-2 border-slate-100 pb-4">
                  <div className="flex flex-row items-baseline justify-between w-full lg:w-auto gap-2">
                    <h2 className="text-[4.5vw] sm:text-2xl md:text-3xl tracking-tight text-slate-800 font-black whitespace-nowrap">代課資料統計</h2>
                    <span className="text-[3vw] sm:text-sm md:text-base text-slate-500 font-bold whitespace-nowrap">
                      (更新日期：{statsUpdateDate || '日-月-年'})
                    </span>
                  </div>
                  
                  {isAdmin && (
                    <div className="flex flex-wrap items-center shrink-0 gap-2 w-full lg:w-auto justify-end mt-2 lg:mt-0">
                      <button 
                        onClick={handleImportBackupClick}
                        className="cursor-pointer bg-[#800000] text-white hover:bg-[#600000] font-black py-2.5 px-3 sm:px-5 rounded-xl shadow-sm transition-all text-sm md:text-base border border-[#600000] flex items-center justify-center shrink-0"
                      >
                        備份 ↑
                      </button>
                      <input 
                        type="file" 
                        accept=".xlsx, .xls, .csv" 
                        onChange={handleBackupUpload} 
                        className="hidden"
                        ref={backupInputRef}
                      />
                      <button 
                        onClick={handleExportBackup}
                        className="cursor-pointer bg-[#800000] text-white hover:bg-[#600000] font-black py-2.5 px-3 sm:px-5 rounded-xl shadow-sm transition-all text-sm md:text-base border border-[#600000] flex items-center justify-center shrink-0"
                      >
                        備份 ↓
                      </button>
                      
                      <button 
                        onClick={handleImportClick}
                        className="cursor-pointer bg-blue-800 text-white hover:bg-blue-900 font-black py-2.5 px-3 sm:px-5 rounded-xl shadow-sm transition-all text-sm md:text-base border border-blue-900 flex items-center justify-center shrink-0"
                      >
                        匯入檔案
                      </button>
                      <input 
                        type="file" 
                        accept=".xlsx, .xls, .csv"
                        multiple 
                        onChange={handleFileUpload} 
                        className="hidden"
                        ref={fileInputRef}
                      />
                      <button 
                        onClick={handleClearStats}
                        className="cursor-pointer bg-purple-800 text-white hover:bg-purple-900 font-black py-2.5 px-3 sm:px-5 rounded-xl shadow-sm transition-all text-sm md:text-base border border-purple-900 flex items-center justify-center shrink-0"
                      >
                        清空
                      </button>
                      <button 
                        onClick={handlePrintReport}
                        className="cursor-pointer bg-green-600 text-white hover:bg-green-700 font-black py-2.5 px-3 sm:px-5 rounded-xl shadow-sm transition-all text-sm md:text-base border border-green-700 flex items-center justify-center shrink-0"
                      >
                        列印報告
                      </button>
                    </div>
                  )}
                </div>
                
                <div className="mb-4 text-[3.5vw] min-[400px]:text-[14px] sm:text-sm md:text-base text-slate-500 font-bold flex flex-col gap-1 w-full leading-snug">
                  <span>備註：</span>
                  <span className="pl-2 sm:pl-4">(1) 代課資料僅供參考，實際數據以校方公佈為準。</span>
                  <span className="pl-2 sm:pl-4">(2) 缺課原因為處理”公務”時，不會計算”缺課日數”及”缺課課節”。</span>
                  <span className="pl-2 sm:pl-4">(3) 若缺課當天課節多於4個課節，”缺課課節”只計算4個課節。</span>
                </div>

                <div className="border-2 border-slate-400 rounded-lg overflow-hidden bg-white p-1 shadow-sm">
                  <div className="overflow-x-auto overflow-y-auto max-h-[50vh] no-scrollbar">
                    <table className="w-full text-center stat-table text-xs min-[375px]:text-sm sm:text-base md:text-xl font-bold table-auto">
                      <thead className="relative z-10">
                        <tr>
                          <th className="sticky top-0 bg-[#D9D9D9] py-2 md:py-3 px-1 sm:px-2 md:px-4 text-slate-800 font-black shadow-sm outline outline-1 outline-[#888] -outline-offset-1">教師代號</th>
                          <th className="sticky top-0 bg-[#FFF2CC] py-2 md:py-3 px-1 sm:px-2 md:px-4 text-slate-800 font-black shadow-sm outline outline-1 outline-[#888] -outline-offset-1">缺課日數</th>
                          <th className="sticky top-0 bg-[#DDEBF7] py-2 md:py-3 px-1 sm:px-2 md:px-4 text-slate-800 font-black shadow-sm outline outline-1 outline-[#888] -outline-offset-1">缺課課節</th>
                          <th className="sticky top-0 bg-[#E2EFDA] py-2 md:py-3 px-1 sm:px-2 md:px-4 text-slate-800 font-black shadow-sm outline outline-1 outline-[#888] -outline-offset-1">代課課節</th>
                          <th className="sticky top-0 bg-[#FCE4D6] py-2 md:py-3 px-1 sm:px-2 md:px-4 text-slate-800 font-black shadow-sm outline outline-1 outline-[#888] -outline-offset-1">淨值</th>
                        </tr>
                      </thead>
                      <tbody>
                        {statsData.map((row, idx) => (
                          <tr key={idx}>
                            <td className="bg-[#F2F2F2] py-2 md:py-3 px-1 sm:px-2 md:px-4 text-slate-700 font-bold">{row.teacher}</td>
                            <td className="bg-[#FFF9E6] py-2 md:py-3 px-1 sm:px-2 md:px-4 text-slate-700 font-bold">{String(row.absentDays)}</td>
                            <td className="bg-[#EEF5FC] py-2 md:py-3 px-1 sm:px-2 md:px-4 text-slate-700 font-bold">{String(row.absentPeriods)}</td>
                            <td className="bg-[#F0F7EC] py-2 md:py-3 px-1 sm:px-2 md:px-4 text-slate-700 font-bold">{String(row.subPeriods)}</td>
                            <td className="bg-[#FDF1EB] py-2 md:py-3 px-1 sm:px-2 md:px-4 text-slate-700 font-bold">{String(row.netValue)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* 新增方塊：調課吉堂建議 */}
            {showSwapSuggestionSection && (
              <div id="swap-suggestion-section" className="mt-8 bg-blue-50 rounded-[3rem] shadow-2xl border border-blue-200 overflow-hidden text-slate-800 w-full animate-in fade-in slide-in-from-top-4 duration-300">
                <div className="p-5 md:p-10 border-b border-blue-200 bg-gradient-to-br from-blue-100 to-blue-50">
                  <div className="flex flex-row items-center mb-6 md:mb-8">
                    <Calendar className="w-6 h-6 md:w-8 md:h-8 text-blue-600" />
                    <h3 className="text-xl md:text-3xl font-black text-blue-900 ml-3 md:ml-4 flex items-center">
                      調課吉堂建議
                      <div className="flex items-center gap-2 ml-2 md:ml-4">
                        <button onClick={() => setShowSwapSuggestionSection(false)} className="w-8 h-8 flex items-center justify-center bg-white border-2 border-blue-300 text-blue-600 rounded-lg hover:bg-blue-50 font-black text-xl leading-none transition-colors shadow-sm">-</button>
                      </div>
                    </h3>
                  </div>

                  <div className="flex flex-col md:flex-row gap-3 md:gap-6 mb-6">
                    <div className="flex-1 relative group w-full min-w-0">
                      <label className="block text-sm md:text-lg font-bold mb-1 md:mb-3 text-blue-900 truncate">代課老師：</label>
                      <div className="relative">
                        <select
                          value={swapOriginalTeacher}
                          onChange={(e) => setSwapOriginalTeacher(e.target.value)}
                          className="w-full appearance-none bg-white border-2 border-blue-200 px-2 py-3 md:px-6 md:py-4 rounded-xl md:rounded-2xl text-sm md:text-xl font-bold text-slate-800 focus:border-blue-500 outline-none transition-all cursor-pointer shadow-sm truncate"
                        >
                          <option value="" disabled>請選擇...</option>
                          {teachers.map(t => (
                            <option key={t} value={t} className="text-slate-900">{t}</option>
                          ))}
                        </select>
                        <ChevronDown className="absolute right-2 md:right-5 top-1/2 -translate-y-1/2 w-4 h-4 md:w-6 md:h-6 text-blue-400 pointer-events-none" />
                      </div>
                    </div>

                    <div className="flex-1 relative group w-full min-w-0">
                      <label className="block text-sm md:text-lg font-bold mb-1 md:mb-3 text-blue-900 truncate">缺課老師：</label>
                      <div className="relative">
                        <select
                          value={swapSubTeacher}
                          onChange={(e) => setSwapSubTeacher(e.target.value)}
                          className="w-full appearance-none bg-white border-2 border-blue-200 px-2 py-3 md:px-6 md:py-4 rounded-xl md:rounded-2xl text-sm md:text-xl font-bold text-slate-800 focus:border-blue-500 outline-none transition-all cursor-pointer shadow-sm truncate"
                        >
                          <option value="" disabled>請選擇...</option>
                          {teachers.map(t => (
                            <option key={t} value={t} className="text-slate-900">{t}</option>
                          ))}
                        </select>
                        <ChevronDown className="absolute right-2 md:right-5 top-1/2 -translate-y-1/2 w-4 h-4 md:w-6 md:h-6 text-blue-400 pointer-events-none" />
                      </div>
                    </div>

                    <div className="flex flex-col justify-end min-w-[120px]">
                      <button
                        onClick={handleViewSwapSuggestions}
                        className="w-full appearance-none bg-blue-600 border-2 border-blue-600 px-4 py-3 md:px-6 md:py-4 rounded-xl md:rounded-2xl text-sm md:text-xl font-black text-white hover:bg-blue-700 outline-none transition-all cursor-pointer shadow-sm"
                      >
                        檢視
                      </button>
                    </div>
                  </div>

                  {swapSuggestions && (
                    <div className="p-4 sm:p-6 md:p-8 bg-white/60 rounded-2xl md:rounded-3xl border-2 border-blue-200 shadow-sm w-full">
                      <h4 className="text-lg md:text-2xl font-black text-blue-900 mb-4 border-b-2 border-blue-300 pb-2">建議清單 ({swapOriginalTeacher}) → ({swapSubTeacher})</h4>
                      <div className="flex flex-col gap-2 md:gap-4 text-sm md:text-lg lg:text-xl font-bold text-slate-800">
                        {DAYS_CONFIG.map(day => (
                          <div key={day.id} className="flex gap-4 md:gap-8 items-start">
                            <div className="text-blue-800 font-black min-w-[60px] md:min-w-[80px]">星期{day.label}</div>
                            <div className="text-slate-700 break-words">{swapSuggestions[day.id]}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {showClassScheduleSection && (
              <div id="class-schedule-section" className="mt-8 bg-emerald-50 rounded-[3rem] shadow-2xl border border-emerald-200 overflow-hidden text-slate-800 w-full animate-in fade-in slide-in-from-top-4 duration-300">
                <div className="p-5 md:p-10 border-b border-emerald-200 bg-gradient-to-br from-emerald-100 to-emerald-50">
                  <div className="flex flex-row items-center mb-6 md:mb-8">
                    <BookOpen className="w-6 h-6 md:w-8 md:h-8 text-emerald-600" />
                    <h3 className="text-xl md:text-3xl font-black text-emerald-900 ml-3 md:ml-4 flex items-center">
                      檢視班別時間表
                      <div className="flex items-center gap-2 ml-2 md:ml-4">
                        <button onClick={() => setIsClassScheduleVisible(true)} className="w-8 h-8 flex items-center justify-center bg-white border-2 border-emerald-300 text-emerald-600 rounded-lg hover:bg-emerald-50 font-black text-xl leading-none transition-colors shadow-sm">+</button>
                        <button onClick={() => setIsClassScheduleVisible(false)} className="w-8 h-8 flex items-center justify-center bg-white border-2 border-emerald-300 text-emerald-600 rounded-lg hover:bg-emerald-50 font-black text-xl leading-none transition-colors shadow-sm">-</button>
                      </div>
                    </h3>
                  </div>
                
                <div className="flex flex-row gap-3 md:gap-6 mb-2">
                  <div className="flex-1 relative group w-full min-w-0">
                    <label className="block text-sm md:text-lg font-bold mb-1 md:mb-3 text-emerald-900 truncate">班別</label>
                    <div className="relative">
                      <select
                        value={selectedClassView}
                        onChange={(e) => setSelectedClassView(e.target.value)}
                        className="w-full appearance-none bg-white border-2 border-emerald-200 px-2 py-3 md:px-6 md:py-4 rounded-xl md:rounded-2xl text-sm md:text-xl font-bold text-slate-800 focus:border-emerald-500 outline-none transition-all cursor-pointer shadow-sm truncate"
                      >
                        <option value="" disabled>請選擇班別...</option>
                        {availableClasses.map(cls => (
                          <option key={cls} value={cls} className="text-slate-900">{cls}</option>
                        ))}
                      </select>
                      <ChevronDown className="absolute right-2 md:right-5 top-1/2 -translate-y-1/2 w-4 h-4 md:w-6 md:h-6 text-emerald-400 pointer-events-none" />
                    </div>
                  </div>

                  <div className="flex-1 relative group w-full min-w-0">
                    <label className="block text-sm md:text-lg font-bold mb-1 md:mb-3 text-emerald-900 truncate">星期</label>
                    <div className="relative">
                      <select
                        value={selectedDayView}
                        onChange={(e) => setSelectedDayView(e.target.value)}
                        className="w-full appearance-none bg-white border-2 border-emerald-200 px-2 py-3 md:px-6 md:py-4 rounded-xl md:rounded-2xl text-sm md:text-xl font-bold text-slate-800 focus:border-emerald-500 outline-none transition-all cursor-pointer shadow-sm truncate"
                      >
                        {DAYS_CONFIG.map(day => (
                          <option key={day.id} value={day.id} className="text-slate-900">星期{day.label}</option>
                        ))}
                      </select>
                      <ChevronDown className="absolute right-2 md:right-5 top-1/2 -translate-y-1/2 w-4 h-4 md:w-6 md:h-6 text-emerald-400 pointer-events-none" />
                    </div>
                  </div>
                </div>
              </div>

              {isClassScheduleVisible && selectedClassView && (
                <div className="p-1.5 sm:p-6 md:p-10 bg-white/40 overflow-hidden w-full">
                  <div className="w-full mx-auto">
                    <div className="grid grid-cols-[0.6fr_1.1fr_3.4fr_0.9fr_1fr] md:grid-cols-5 gap-1 sm:gap-2 md:gap-4 border-b-2 border-slate-500 pb-2 md:pb-4 mb-2 md:mb-4 text-emerald-900 font-black text-[10px] min-[375px]:text-[11px] sm:text-sm md:text-lg lg:text-xl text-center px-0.5">
                      <div className="whitespace-nowrap tracking-tighter sm:tracking-normal">班別</div>
                      <div className="whitespace-nowrap tracking-tighter sm:tracking-normal">課節</div>
                      <div className="whitespace-nowrap tracking-tighter sm:tracking-normal">時間</div>
                      <div className="whitespace-nowrap tracking-tighter sm:tracking-normal">科目</div>
                      <div className="whitespace-nowrap tracking-tighter sm:tracking-normal">教師代號</div>
                    </div>
                    
                    <div className="space-y-1.5 md:space-y-3">
                      {getClassSchedule(selectedClassView, selectedDayView).map((slot, idx) => {
                        const isBreak = slot.type === 'break';
                        const isLunch = slot.id === 'LUNCH';

                        let rowStyles = "bg-white hover:bg-emerald-50 text-slate-800 border-2 border-slate-500";
                        if (isLunch) {
                          rowStyles = "bg-emerald-700 hover:bg-emerald-800 text-white border-2 border-slate-500";
                        } else if (isBreak) {
                          rowStyles = "bg-emerald-100/80 hover:bg-emerald-200/80 text-emerald-800 border-2 border-slate-500";
                        }

                        return (
                          <div 
                            key={idx} 
                            className={`grid grid-cols-[0.6fr_1.1fr_3.4fr_0.9fr_1fr] md:grid-cols-5 gap-1 sm:gap-2 md:gap-4 items-center text-center text-[10px] min-[375px]:text-[11px] sm:text-sm md:text-base lg:text-lg font-bold px-0.5 py-1 min-[375px]:px-1 min-[375px]:py-1.5 sm:p-2 md:p-4 rounded-lg md:rounded-2xl transition-all shadow-sm ${rowStyles}`}
                          >
                            <div className="whitespace-nowrap tracking-tighter sm:tracking-normal overflow-hidden text-ellipsis">
                              {isBreak ? '--' : selectedClassView}
                            </div>
                            <div className="whitespace-nowrap tracking-tighter sm:tracking-normal overflow-hidden text-ellipsis">
                              {slot.label}
                            </div>
                            <div className="whitespace-nowrap tracking-tighter sm:tracking-normal overflow-hidden text-ellipsis">
                              {slot.time}
                            </div>
                            <div className="whitespace-nowrap tracking-tighter sm:tracking-normal overflow-hidden text-ellipsis">
                              {slot.subject || (isBreak ? slot.label : '--')}
                            </div>
                            <div className="whitespace-nowrap tracking-tighter sm:tracking-normal overflow-hidden text-ellipsis">
                              {slot.teacher || '--'}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              )}
            </div>
            )}
          </div>

          {/* 提示訊息彈跳視窗 */}
          {alertMessage && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
              <div className="bg-white rounded-[1.25rem] shadow-2xl w-full max-w-[240px] p-4 text-center animate-in zoom-in-95 duration-200">
                <div className="w-10 h-10 bg-rose-50 text-rose-500 rounded-lg flex items-center justify-center mx-auto mb-2 shadow-sm transform rotate-3">
                  <XCircle className="w-5 h-5" />
                </div>
                <h3 className="text-2xl font-black text-slate-800 mb-1.5">提示</h3>
                <p className="text-lg text-slate-600 font-bold mb-4 leading-tight">{alertMessage}</p>
                <button
                  onClick={() => setAlertMessage("")}
                  className="w-full py-2 bg-blue-600 text-white font-black text-xl rounded-xl shadow-md hover:bg-blue-700 transition-all active:scale-95"
                >
                  確定
                </button>
              </div>
            </div>
          )}
        </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
