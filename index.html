    <!-- 載入 Tailwind CSS 編譯器 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 載入 Babel 用於瀏覽器解析 JSX -->

    <!-- 載入 Lucide 圖標庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @media print {
            @page { size: landscape; margin: 0.5cm; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; display: flex !important; flex-direction: row !important; gap: 20px; }
            .no-print { display: none !important; }
            .print-copy { width: calc(50% - 10px); zoom: 0.65; border: 2px solid #000; padding: 20px; border-radius: 15px; height: fit-content; background: white !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 使用解構賦值獲取 React 常用 Hook
        const { useState, useMemo, useEffect } = React;

        // 預定義數據：星期一課表基礎數據

                ["班主任節", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "", "6A", "6B", "6C", "6D", "6E", "6E", "5A", "5B", "5C", "5D", "5E", "4A", "4B", "4C", "4D", "4E", "3A", "3B", "3C", "3D", "3E", "2A", "2B", "2C", "2D", "2E", "1A", "1B", "1C", "1D", "1E", "", "", "", "", "", "", ""],

                ["3", "", "", "", "", "3D/常識", "6B/數學", "5A/英文", "4E/英文", "4D/數學", "", "", "5B/數學", "", "1A/英文", "5E/視藝", "5C/音樂", "4A/科學", "1C/普話", "1D/數學", "", "", "", "6E/科技", "", "4B/數學", "", "3A/音樂", "", "", "2C/英文", "", "2B/體育", "", "3E/數學", "2A/視藝", "6C/普話", "", "5D/英文", "", "", "", "", "1B/中文", "3C/常識", "", "", "", "6D/中作", "", "3B/數學", "6A/體育", "1E/中文", "4C/視藝", "2D/數學", "2E/數學", ""],
                ["4", "", "", "", "5C/中文", "", "", "5A/英文", "4E/英文", "", "2D/體育", "", "5B/數學", "3D/普話", "1A/英文", "5E/視藝", "", "3A/常識", "", "", "", "", "", "4D/人文", "", "4B/數學", "", "1D/英文", "", "", "2C/英文", "", "", "", "3E/數學", "2A/視藝", "4A/普話", "", "5D/音樂", "3B/普話", "", "", "6C/數學", "1B/中文", "3C/常識", "", "2B/數學", "1C/英文", "6D/中作", "6B/常識", "6A/科技", "6E/體育", "1E/中文", "4C/視藝", "", "2E/數學", ""],
                ["5", "", "5B/中文", "4B/中文", "", "P3/常共議", "3A/數學", "3B/英文", "5D/常識", "4D/體育", "6A/中文", "4E/音樂", "4A/數學", "", "", "6B/中文", "5A/中文", "P3/常共議", "P3/常共議", "P3/常共議", "1E/英文", "2E/視藝", "5E/數學", "", "", "", "3E/英S", "", "1A/中文", "4C/英文", "5C/常識", "", "", "3C/體育", "", "", "P3/常共議", "", "", "", "", "1C/數學", "2A/數學", "", "P3/常共議", "6D/視藝", "1B/音樂", "1D/科學", "", "", "3D/科技", "6E/數學", "2C/中文", "6C/常識", "2B/常識", "2D/常識", "3E/英S"],
                ["6", "","","4B/中文","1C/人文","P3/常共議","3A/數學","3B/英S","","5D/體育","6A/中文","","4A/數學","3C/中文","","6B/中文","5A/中文","P3/常共議","P3/常共議","P3/常共議","1E/英文","2E/視藝","5E/數學","4D/科技","","","3E/英文","","1A/中文","4C/英文","5C/常識","","3D/體育","","4E/數學","","P3/常共議","","","","","1B/科學","2A/數學","","P3/常共議","6D/視藝","5B/音樂","1D/科學","","","","6E/數學","2C/中文","6C/常識","2B/常識","2D/處理", "3B/英S"],
                ["LUNCH", "", "", "", "", "", "", "3B/午膳", "4E/午膳", "", "6A/午膳", "", "4C/午膳", "6D/午膳", "1A/午膳", "", "", "", "2E/午膳", "", "6B/午膳", "6C/午膳", "", "", "6E/午膳", "5A/午膳", "5B/午膳", "5C/午膳", "5D/午膳", "5E/午膳", "4A/午膳", "4B/午膳", "", "4D/午膳", "", "3A/午膳", "", "3C/午膳", "3D/午膳", "3E/午膳", "2A/午膳", "2B/午膳", "2C/午膳", "2D/午膳", "", "", "", "1C/午膳", "1D/午膳", "1E/午膳", "", "", "1B/午膳", "", "", "", ""],
                ["7", "4C/數學","","","5A/常識","5C/數學","","","2C/常識","","","4A/中作","","","6C/英文","","6D/音樂","3C/數學","6E/中文","","","1C/中文","4B/科技","4E/中文","2D/英P","6B/視藝","","","","","","2E/英文","","1D/體育","","1B/英文","","4D/英文","3B/音樂","2A/中文","6A/英文","1A/科學","","1E/人文","5E/中文","3A/中文","","","","","5D/數學","5B/體育","","3E/視藝","3D/數學","2B/中作","2D/英P"],
                ["8", "4C/數學","","","","5C/數學","","","2C/常識","","1E/體育","4A/中作","","","6C/英文","","5A/音樂","3C/數學","6E/中文","","","1C/中文","5B/科技","4E/中文","2D/英P","6B/視藝","","1D/英文","","","","2E/英文","4B/體育","","6D/常識","1B/英文","3B/常識","4D/英文","1A/音樂","2A/中文","6A/英文","","","","5E/中文","3A/中文","","","","","5D/數學","","","3E/視藝","3D/數學","2B/中作","2D/英P"],
                ["9", "", "5B/導修", "4B/導修", "5C/導修", "", "P6/數拔", "3B/導修", "", "", "2C/導修", "4A/導修", "4C/導修", "3D/導修", "", "", "", "", "6E/導修", "", "6B/導修", "6C/導修", "5E/導修", "4E/導修", "", "", "", "", "5D/導修", "", "", "P3/英補", "1A/導修", "4D/導修", "", "", "", "3C/導修", "", "3E/導修", "6A/導修", "1C/導修", "", "2D/導修", "2E/導修", "", "1B/導修", "6D/導修", "1D/導修", "1E/導修", "5A/導修", "", "P3/中補", "3A/導修", "2B/導修", "2A/導修", ""],
            ],
        };

        const DAYS_CONFIG = [
            { id: 'mon', label: '一', offset: 1 },
            { id: 'tue', label: '二', offset: 2 },
            { id: 'wed', label: '三', offset: 3 },
            { id: 'thur', label: '四', offset: 4 },
            { id: 'fri', label: '五', offset: 5 }
        ];

        const MAROON_TEACHERS = ["張", "何", "李", "潘", "黎", "譚", "樊", "文", "鄧", "羅", "梁", "黃", "蔡", "伍", "袁", "皓", "和", "輝"];
        const GREEN_TEACHERS = ["達", "豪", "蓮", "廖", "婉", "慧", "Rachel"];

        function App() {
            // 安全獲取 Lucide 圖標組件
            const getIcon = (name) => {
                if (typeof lucideReact !== 'undefined' && lucideReact[name]) {
                    return lucideReact[name];
                }
                return () => null; // 回退為空組件
            };

            const User = getIcon('User');
            const Calendar = getIcon('Calendar');
            const Coffee = getIcon('Coffee');
            const Utensils = getIcon('Utensils');
            const Moon = getIcon('Moon');
            const Sun = getIcon('Sun');
            const XCircle = getIcon('XCircle');
            const ChevronDown = getIcon('ChevronDown');
            const Printer = getIcon('Printer');
            const UserPlus = getIcon('UserPlus');

            const [rawData, setRawData] = useState(INITIAL_RAW_DATA);
            const [selectedTeacher, setSelectedTeacher] = useState("");
            const [activeTab, setActiveTab] = useState('mon');
            const [subRequest, setSubRequest] = useState(null);
            const [assignments, setAssignments] = useState({});
            const [leaveReasons, setLeaveReasons] = useState({});
            const [todayDate, setTodayDate] = useState(new Date());

            const scheduleStructure = [
                { type: 'class', id: 'HR', label: '班主任節', time: '8:15 - 8:35', csvKey: '班主任節' },
                { type: 'class', id: '1', label: '第一節', time: '8:35 - 9:10', csvKey: '1' },
                { type: 'class', id: '2', label: '第二節', time: '9:10 - 9:45', csvKey: '2' },
                { type: 'break', id: 'B1', label: '小息', time: '9:45 - 10:05', icon: <Sun className="w-5 h-5 text-black" />, csvKey: 'B1' },
                { type: 'class', id: '3', label: '第三節', time: '10:05 - 10:40', csvKey: '3' },
                { type: 'class', id: '4', label: '第四節', time: '10:40 - 11:15', csvKey: '4' },
                { type: 'break', id: 'B2', label: '小休', time: '11:15 - 11:25', icon: <Coffee className="w-5 h-5 text-black" />, csvKey: 'B2' },
                { type: 'class', id: '5', label: '第五節', time: '11:25 - 12:00', csvKey: '5' },
                { type: 'class', id: '6', label: '第六節', time: '12:00 - 12:35', csvKey: '6' },
                { type: 'class', id: 'LUNCH', label: '午膳', time: '12:35 - 1:15', icon: <Utensils className="w-5 h-5 text-black" />, csvKey: 'LUNCH' },
                { type: 'break', id: 'REST', label: '午息', time: '1:15 - 1:35', icon: <Moon className="w-5 h-5 text-black" />, csvKey: 'REST' },
                { type: 'class', id: '7', label: '第七節', time: '1:35 - 2:10', csvKey: '7' },
                { type: 'class', id: '8', label: '第八節', time: '2:10 - 2:45', csvKey: '8' },
                { type: 'class', id: '9', label: '第九節', time: '2:45 - 3:15', csvKey: '9' },
            ];

            useEffect(() => {
                const day = todayDate.getDay();
                const dayMap = { 1: 'mon', 2: 'tue', 3: 'wed', 4: 'thur', 5: 'fri' };
                if (dayMap[day]) setActiveTab(dayMap[day]);
                const timer = setInterval(() => setTodayDate(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const currentFullDateTime = useMemo(() => {
                return `${todayDate.toLocaleDateString('zh-HK', { year: 'numeric', month: 'long', day: 'numeric' })} ${todayDate.toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit', hour12: true })}`;
            }, [todayDate]);

            const displayDateInfo = useMemo(() => {
                const currentDayConfig = DAYS_CONFIG.find(d => d.id === activeTab);
                const dayOfWeek = todayDate.getDay();
                let baseDate = new Date(todayDate);
                // 處理週末跳轉到下週一
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    baseDate.setDate(todayDate.getDate() + (dayOfWeek === 0 ? 1 : 2));
                } else {
                    baseDate.setDate(todayDate.getDate() + (1 - dayOfWeek));
                }
                const targetDate = new Date(baseDate);
                targetDate.setDate(baseDate.getDate() + (currentDayConfig.offset - 1));
                return {
                    dateString: targetDate.toLocaleDateString('zh-HK', { year: 'numeric', month: 'long', day: 'numeric' }),
                    weekday: `星期${currentDayConfig.label}`
                };
            }, [activeTab, todayDate]);

            const teachersList = useMemo(() => {
                const dayData = rawData[activeTab] || rawData.mon;
                const headerRow = dayData.find(row => row[0] && row[0].includes("教師代號"));
                return headerRow ? headerRow.slice(1).filter(t => t && t.trim() !== "") : [];
            }, [rawData, activeTab]);

            const getTeacherSchedule = (teacherName, dayId) => {
                const dayData = rawData[dayId] || rawData.mon;
                const headerRow = dayData.find(row => row[0] && row[0].includes("教師代號"));
                if (!headerRow) return Array(scheduleStructure.length).fill("");
                const teacherIdx = headerRow.indexOf(teacherName);
                if (teacherIdx === -1) return Array(scheduleStructure.length).fill("");
                return scheduleStructure.map(slot => {
                    const dataRow = dayData.find(row => row[0] && row[0].includes(slot.csvKey));
                    return dataRow ? dataRow[teacherIdx] || "" : "";
                });
            };

            const isClassOccupied = (content) => {
                if (!content || content.trim() === "") return false;
                const busyKeywords = ["BREAK", "REST", "小息", "小休", "午息", "午休", "班主任節"];
                return !busyKeywords.some(b => content.toUpperCase().includes(b));
            };

            const getAvailableTeachers = (dayId, lessonIdx) => {
                const available = [];
                const seenNames = new Set();
                teachersList.forEach(t => {
                    if (seenNames.has(t) || t === selectedTeacher) return;
                    const schedule = getTeacherSchedule(t, dayId);
                    if (!isClassOccupied(schedule[lessonIdx])) {
                        const totalLessons = schedule.filter(l => isClassOccupied(l)).length;
                        const hasPrevLesson = lessonIdx > 0 ? isClassOccupied(schedule[lessonIdx - 1]) : false;
                        const hasNextLesson = lessonIdx < schedule.length - 1 ? isClassOccupied(schedule[lessonIdx + 1]) : false;
                        available.push({ id: t, total: totalLessons, hasPrevLesson, hasNextLesson });
                        seenNames.add(t);
                    }
                });
                return available.sort((a, b) => a.total - b.total);
            };

            const getTeacherTextColor = (name) => {
                if (MAROON_TEACHERS.includes(name)) return 'text-[#800000]';
                if (GREEN_TEACHERS.includes(name)) return 'text-emerald-700';
                return 'text-black';
            };

            const handleAssignSub = (lessonIdx, subId) => {
                const key = `${activeTab}-${lessonIdx}-${selectedTeacher}`;
                setAssignments(prev => ({ ...prev, [key]: subId }));
            };

            const handleRemoveSub = (lessonIdx) => {
                const key = `${activeTab}-${lessonIdx}-${selectedTeacher}`;
                const newAssignments = { ...assignments };
                delete newAssignments[key];
                setAssignments(newAssignments);
            };

            const handleReasonChange = (e) => {
                const key = `${selectedTeacher}-${activeTab}`;
                setLeaveReasons(prev => ({ ...prev, [key]: e.target.value }));
            };

            return (
                <div className="min-h-screen bg-[#F0F2F5] text-slate-900 p-4 md:p-6 font-sans">
                    <header className="max-w-7xl mx-auto mb-10 no-print space-y-6">
                        <div className="flex items-start gap-5">
                            <div className="bg-blue-600 p-4 rounded-[1.5rem] shadow-xl transform rotate-3 shrink-0">
                                <Calendar className="text-white w-8 h-8" />
                            </div>
                            <div>
                                <h1 className="text-2xl md:text-3xl font-black text-slate-800 tracking-tight leading-none mb-2">觀塘官立小學(秀明道)</h1>
                                <h2 className="text-lg md:text-xl font-bold text-blue-600">智能編代課系統 v1.12.4</h2>
                            </div>
                        </div>

                        <div className="w-full flex flex-wrap items-center gap-4 bg-white p-3 rounded-3xl shadow-sm border border-slate-200">
                            <div className="relative group w-fit min-w-[140px]">
                                <select
                                    value={selectedTeacher}
                                    onChange={(e) => { setSelectedTeacher(e.target.value); setSubRequest(null); }}
                                    className="pl-11 pr-10 py-3.5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xl font-black hover:border-blue-600 outline-none transition-all cursor-pointer appearance-none w-full shadow-sm text-black"
                                >
                                    <option value="" disabled>請選擇缺席教師...</option>
                                    {teachersList.map((t, idx) => (
                                        <option key={`${t}-${idx}`} value={t} className={getTeacherTextColor(t)}>{t}</option>
                                    ))}
                                </select>
                                <User className="absolute left-4 top-1/2 -translate-y-1/2 w-6 h-6 text-blue-600 pointer-events-none" />
                                <ChevronDown className="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 pointer-events-none" />
                            </div>

                            <div className="flex bg-slate-50 p-1.5 rounded-2xl flex-grow md:flex-initial min-w-[300px]">
                                {DAYS_CONFIG.map(day => (
                                    <button
                                        key={day.id}
                                        onClick={() => { setActiveTab(day.id); setSubRequest(null); }}
                                        className={`flex-1 px-4 py-3 text-xl sm:text-2xl font-black rounded-xl transition-all ${activeTab === day.id ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-blue-600'}`}
                                    >
                                        {day.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto">
                        {!selectedTeacher ? (
                            <div className="bg-white rounded-[3rem] border-4 border-dashed border-slate-200 h-[50vh] flex flex-col items-center justify-center text-slate-400 no-print px-6 text-center">
                                <User className="w-20 md:w-24 h-20 md:h-24 opacity-10 mb-8" />
                                <h3 className="text-2xl md:text-3xl font-black mb-2 text-slate-500">準備開始編配代課</h3>
                                <p className="text-lg md:text-xl font-bold opacity-60">請先從上方選單揀選教師代號</p>
                            </div>
                        ) : (
                            <div id="print-area" className="flex flex-col gap-8 w-full">
                                {[1, 2].map((copyNum) => (
                                    <div key={copyNum} className={`bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden ${copyNum === 2 ? 'hidden print:block print-copy' : 'print-copy'}`}>
                                        <div className="p-6 md:p-10 border-b border-slate-100 bg-gradient-to-br from-white to-blue-50/30">
                                            <div className="flex flex-col md:flex-row gap-6 md:gap-8 items-center md:items-start text-center md:text-left">
                                                <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-4xl font-black shadow-2xl shrink-0">
                                                    {selectedTeacher.charAt(0)}
                                                </div>
                                                <div className="flex flex-col gap-2 w-full">
                                                    <div className="flex flex-col md:flex-row justify-between items-center gap-2">
                                                        <h2 className="text-3xl md:text-4xl font-black tracking-tighter text-black">上課時間表 ({selectedTeacher})</h2>
                                                        <span className="hidden print:block text-slate-400 text-xl font-bold">{copyNum === 1 ? '存檔副本' : '教師副本'}</span>
                                                    </div>
                                                    <p className="font-black text-xl md:text-2xl text-slate-700">日期：{displayDateInfo.dateString} ({displayDateInfo.weekday})</p>
                                                    
                                                    <div className="mt-2 text-xl md:text-2xl font-black text-black flex flex-wrap items-center justify-center md:justify-start gap-1">
                                                        <span className="shrink-0">缺課原因：</span>
                                                        <div className="relative inline-flex items-center min-w-[180px]">
                                                            <select 
                                                                value={leaveReasons[`${selectedTeacher}-${activeTab}`] || ""} 
                                                                onChange={handleReasonChange}
                                                                className="bg-transparent border-none outline-none focus:ring-0 cursor-pointer text-black appearance-none pr-8 py-0"
                                                            >
                                                                <option value="">請揀選原因...</option>
                                                                <option value="病假">病假</option>
                                                                <option value="事假">事假</option>
                                                                <option value="出席工作坊">出席工作坊</option>
                                                                <option value="進修">進修</option>
                                                                <option value="校內活動">校內活動</option>
                                                                <option value="出外參觀">出外參觀</option>
                                                                <option value="境外交流">境外交流</option>
                                                                <option value="其他">其他</option>
                                                            </select>
                                                            <ChevronDown className="w-5 h-5 absolute right-0 text-slate-400 no-print pointer-events-none" />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="p-4 md:p-8 space-y-4">
                                            {scheduleStructure.map((slot, idx) => {
                                                const content = getTeacherSchedule(selectedTeacher, activeTab)[idx];
                                                const isBreak = slot.type === 'break';
                                                const isSelected = subRequest && subRequest.lessonIdx === idx;
                                                const assignedSub = assignments[`${activeTab}-${idx}-${selectedTeacher}`];
                                                const isActualLesson = isClassOccupied(content);
                                                
                                                let classCode = "", subject = "";
                                                if (isActualLesson) {
                                                    if (content.includes('/')) [classCode, subject] = content.split('/');
                                                    else { classCode = content; subject = slot.id === 'HR' ? "班主任節" : slot.label; }
                                                }

                                                if (isBreak) {
                                                    return (
                                                        <div key={idx} className="bg-slate-100 border-2 border-slate-400 rounded-2xl py-3 px-4 md:px-8 flex items-center justify-between">
                                                            <span className="text-sm md:text-lg font-black text-black tracking-wider md:tracking-widest">{slot.time}</span>
                                                            <div className="flex items-center gap-2 md:gap-4">
                                                                <span className="font-black text-black text-lg md:text-2xl">{slot.label}</span>
                                                                {slot.icon}
                                                            </div>
                                                        </div>
                                                    );
                                                }

                                                return (
                                                    <div key={idx} className="relative">
                                                        <div 
                                                            onClick={() => isActualLesson && !assignedSub && setSubRequest({ lessonIdx: idx })}
                                                            className={`flex flex-col md:flex-row gap-4 md:gap-6 p-4 md:p-6 rounded-[1.5rem] md:rounded-[2rem] border-2 transition-all ${
                                                                isActualLesson 
                                                                    ? isSelected ? "bg-orange-50 border-[#800000] scale-[1.01] md:scale-[1.02] shadow-lg" 
                                                                    : assignedSub ? "bg-[#E3F2FD] border-slate-500"
                                                                    : slot.id === 'LUNCH' ? "bg-[#FFF9E3] border-slate-500 hover:border-blue-400 cursor-pointer"
                                                                    : "bg-white border-slate-500 hover:border-blue-400 cursor-pointer"
                                                                    : "bg-slate-50 border-slate-300"
                                                            }`}
                                                        >
                                                            <div className="md:w-56 flex flex-row md:flex-col items-baseline md:items-start justify-between md:justify-center md:border-r md:pr-6 border-slate-100">
                                                                <span className="text-base md:text-xl font-black uppercase tracking-tight text-slate-700">{slot.label}</span>
                                                                <span className="text-xl md:text-3xl font-black mt-1 text-slate-800">{slot.time}</span>
                                                            </div>

                                                            <div className="flex-grow flex items-center">
                                                                {isActualLesson ? (
                                                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between w-full gap-3">
                                                                        <div className="flex items-center gap-4 md:gap-8">
                                                                            <div className="px-3 md:px-6 py-1 md:py-2 bg-white rounded-xl font-black text-xl md:text-3xl tracking-tighter shadow-sm border-2 text-[#008080] border-[#008080] shrink-0">
                                                                                {classCode}
                                                                            </div>
                                                                            <div className="text-xl md:text-3xl font-black text-blue-700 truncate">
                                                                                {subject}
                                                                            </div>
                                                                        </div>
                                                                        <div className="flex items-center sm:ml-auto">
                                                                            {assignedSub ? (
                                                                                <div className="flex items-center gap-2 md:gap-3 px-2 md:px-6 py-1 md:py-2">
                                                                                    <span className={`${assignedSub === 'Rachel' ? 'text-lg md:text-2xl' : 'text-2xl md:text-4xl'} font-black ${getTeacherTextColor(assignedSub)}`}>{assignedSub}</span>
                                                                                    <span className="text-lg md:text-2xl font-bold opacity-80 text-slate-700">代課</span>
                                                                                    <button onClick={(e) => { e.stopPropagation(); handleRemoveSub(idx); }} className="p-2 text-slate-400 hover:text-red-500 no-print transition-colors"><XCircle className="w-6 h-6 md:w-7 md:h-7" /></button>
                                                                                </div>
                                                                            ) : !isSelected && (
                                                                                <div className="flex items-center gap-2 no-print group text-slate-500 bg-slate-50 px-3 py-2 rounded-lg">
                                                                                    <UserPlus className="w-4 h-4 md:w-5 md:h-5 text-slate-400 group-hover:text-blue-600" />
                                                                                    <span className="text-xs md:text-sm font-black uppercase tracking-wide group-hover:text-blue-600">安排代課</span>
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    </div>
                                                                ) : (
                                                                    <span className="text-xl md:text-3xl font-black text-slate-500 italic tracking-widest ml-4 uppercase opacity-40">吉堂</span>
                                                                )}
                                                            </div>
                                                        </div>

                                                        {isSelected && (
                                                            <div className="mt-4 p-4 md:p-8 bg-[#FFF9E3] border-2 border-slate-500 rounded-[1.5rem] md:rounded-[2.5rem] no-print animate-in zoom-in-95 shadow-xl">
                                                                <div className="flex flex-col md:flex-row justify-between items-start gap-4 md:gap-6 mb-6 md:mb-8 text-black">
                                                                    <div className="flex flex-col gap-4 w-full">
                                                                        <h4 className="text-2xl md:text-4xl font-black flex items-center gap-4">選擇代課教師</h4>
                                                                        <div className="bg-blue-50 border-2 border-slate-500 rounded-xl md:rounded-2xl p-3 md:p-4 flex flex-col gap-1.5 w-full md:w-fit shadow-sm">
                                                                            <div className="flex items-center gap-2.5 text-xs md:text-sm font-bold text-black">
                                                                                <span className="w-2.5 h-2.5 rounded-full bg-red-500 inline-block shadow-sm"></span>
                                                                                <span>紅點：代表該節前後有課堂</span>
                                                                            </div>
                                                                            <div className="flex items-center gap-2.5 text-xs md:text-sm font-bold text-black">
                                                                                <span className="w-2.5 h-2.5 rounded-full bg-green-500 inline-block shadow-sm"></span>
                                                                                <span>綠點：代表該節前後沒有課堂</span>
                                                                            </div>
<div className="flex items-center gap-2.5 text-sm font-bold text-black">
                                    <span className="w-2.5 text-center font-black">*</span>
                                    <span>左右點分別代表「前一節」及「後一節」的狀態</span>
                                  </div>

                                                                        </div>
                                                                    </div>
                                                                    <button 
                                                                        onClick={() => setSubRequest(null)} 
                                                                        className="w-full md:w-auto bg-white px-4 py-2 rounded-xl border-2 border-slate-500 font-black text-lg text-slate-700 hover:bg-slate-50 hover:shadow-md transition-all shrink-0"
                                                                    >
                                                                        取消選取
                                                                    </button>
                                                                </div>
                                                                
                                                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 md:gap-4">
                                                                    {getAvailableTeachers(activeTab, idx).map((sub, sIdx) => (
                                                                        <button key={`${sub.id}-${sIdx}`} onClick={() => { handleAssignSub(idx, sub.id); setSubRequest(null); }} className="bg-white p-4 md:p-6 rounded-xl md:rounded-2xl border-2 border-orange-300 hover:border-[#800000] hover:shadow-xl transition-all flex flex-col items-center group relative overflow-hidden">
                                                                            <div className="flex items-center gap-2 mb-2 md:mb-3">
                                                                                <div className={`w-2.5 h-2.5 rounded-full shadow-sm ${sub.hasPrevLesson ? 'bg-red-500' : 'bg-green-500'}`} title="上一節"></div>
                                                                                <span className={`${sub.id === 'Rachel' ? 'text-xl md:text-2xl' : 'text-2xl md:text-4xl'} font-black ${getTeacherTextColor(sub.id)}`}>{sub.id}</span>
                                                                                <div className={`w-2.5 h-2.5 rounded-full shadow-sm ${sub.hasNextLesson ? 'bg-red-500' : 'bg-green-500'}`} title="下一節"></div>
                                                                            </div>
                                                                            <span className="text-xs md:text-lg font-black text-slate-400 uppercase leading-none">總節數</span>
                                                                            <span className="text-xl md:text-3xl font-black text-slate-700">{sub.total}節</span>
                                                                        </button>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                            
                                            <div className="flex flex-col items-center md:items-start gap-4 px-4 md:px-10 py-8 md:py-12 mt-4 border-t border-slate-100 text-center md:text-left">
                                                <div className="text-xl md:text-2xl font-black text-slate-800 flex flex-wrap items-center justify-center md:justify-start gap-2 leading-none">
                                                    編排代課老師：<span className="hidden md:inline-block text-4xl font-light text-slate-400 ml-1">(</span>
                                                    <span className="inline-block min-w-[150px] md:min-w-[200px] border-b-2 border-dotted border-slate-300 h-8"></span>
                                                    <span className="hidden md:inline-block text-4xl font-light text-slate-400">)</span>
                                                </div>
                                                <div className="text-xl md:text-2xl font-black text-slate-800">日期：{currentFullDateTime}</div>
                                            </div>

                                            <div className="flex justify-center pt-8 no-print pb-10">
                                                <button
                                                    onClick={() => window.print()}
                                                    className="group flex items-center gap-4 bg-blue-600 hover:bg-blue-700 text-white px-8 md:px-12 py-4 md:py-5 rounded-[1.5rem] md:rounded-[2rem] shadow-2xl transition-all hover:scale-105 active:scale-95"
                                                >
                                                    <Printer className="w-6 h-6 md:w-8 md:h-8 group-hover:animate-bounce" />
                                                    <span className="text-xl md:text-2xl font-black tracking-widest">列印預覽</span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // 初始化 React 應用 - 確保使用 DOMContentLoaded 或直接在 Script 結束前執行
        const initApp = () => {
            const container = document.getElementById('root');
            if (container) {
                const reactRoot = ReactDOM.createRoot(container);
                reactRoot.render(<App />);
            }
        };
        initApp();
    </script>
</body>
</html>
