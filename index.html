<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能編代課系統 v1.13.0</title>
    <!-- 引入必要的外部庫 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    
    <style>
        /* 保持原始版面設定 */
        @media print {
            @page { size: landscape; margin: 0.5cm; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; display: flex !important; flex-direction: row !important; gap: 20px; }
            .no-print { display: none !important; }
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; }
        .bg-custard-yellow { background-color: #fef9c3; }
        .bg-sky-blue { background-color: #e0f2fe; }
        .print-only { display: none; }
        @media print { .print-only { display: block; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 使用 Babel 在瀏覽器中編譯 JSX -->
    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo } = React;

        function App() {
            // 系統數據狀態
            const [activeTab, setActiveTab] = useState('AM');
            const [selectedTeacher, setSelectedTeacher] = useState('');
            const [teachers, setTeachers] = useState([]);
            const [schedule, setSchedule] = useState({ AM: [], PM: [] });
            const [assignments, setAssignments] = useState({});

            // 模擬初始數據或保留原本邏輯
            useEffect(() => {
                // 如果你有預設數據，可以在這裡初始化
                // 以下為範例結構預留
                const demoTeachers = [
                    { id: 'T01', name: '陳老師', total: 20 },
                    { id: 'T02', name: '林老師', total: 18 }
                ];
                setTeachers(demoTeachers);
            }, []);

            // 輔助函式：獲取可用代課老師 (保留原本邏輯)
            const getAvailableTeachers = (period, lessonIdx) => {
                return teachers.filter(t => t.id !== selectedTeacher);
            };

            const periods = ['1', '2', '3', '4', '5', '6', '7', '8', '9'];

            return (
                <div className="min-h-screen bg-gray-50 pb-20">
                    {/* 導航欄 */}
                    <header className="bg-white shadow-sm p-4 mb-6 sticky top-0 z-10 no-print">
                        <div className="container mx-auto flex justify-between items-center">
                            <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                                <span className="bg-blue-600 text-white p-1 rounded">智能</span>
                                編代課系統 <span className="text-sm font-normal text-gray-400">v1.13.0</span>
                            </h1>
                            <div className="flex gap-2">
                                <button onClick={() => window.print()} className="bg-gray-800 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-gray-700 transition">
                                    列印報表
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="container mx-auto p-4">
                        {/* 頁籤切換 */}
                        <div className="flex mb-6 bg-gray-200 p-1 rounded-xl w-fit no-print">
                            {['AM', 'PM'].map(tab => (
                                <button
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`px-8 py-2 rounded-lg font-bold transition ${activeTab === tab ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}`}
                                >
                                    {tab === 'AM' ? '上午校 (AM)' : '下午校 (PM)'}
                                </button>
                            ))}
                        </div>

                        {/* 主要操作區 */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6 no-print">
                            <div className="md:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <h3 className="font-bold text-gray-700 mb-4 flex items-center gap-2">
                                    選擇請假老師
                                </h3>
                                <select 
                                    className="w-full p-3 rounded-xl border-2 border-gray-100 focus:border-blue-400 outline-none transition"
                                    value={selectedTeacher}
                                    onChange={(e) => setSelectedTeacher(e.target.value)}
                                >
                                    <option value="">-- 請選擇 --</option>
                                    {teachers.map(t => (
                                        <option key={t.id} value={t.id}>{t.id} ({t.name})</option>
                                    ))}
                                </select>
                            </div>

                            <div id="print-area" className="md:col-span-3 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <h3 className="font-bold text-gray-700 mb-6">課表排列與代課安排</h3>
                                
                                <div className="grid grid-cols-1 gap-4">
                                    {periods.map((p, idx) => {
                                        const isOcc = selectedTeacher !== '';
                                        const subId = assignments[`${activeTab}-${idx}-${selectedTeacher}`];
                                        
                                        return (
                                            <div key={idx} className={`p-4 rounded-xl border-2 flex justify-between items-center ${isOcc ? 'border-blue-100 bg-blue-50/30' : 'border-gray-50'}`}>
                                                <div>
                                                    <span className="text-sm font-bold text-gray-400 mr-4">第 {p} 節</span>
                                                    <span className="font-bold text-gray-700">
                                                        {isOcc ? `${selectedTeacher} 老師原課` : '未選取老師'}
                                                    </span>
                                                </div>
                                                
                                                {isOcc && (
                                                    <div className="no-print">
                                                        {subId ? (
                                                            <button 
                                                                onClick={() => {
                                                                    const newAssign = {...assignments};
                                                                    delete newAssign[`${activeTab}-${idx}-${selectedTeacher}`];
                                                                    setAssignments(newAssign);
                                                                }}
                                                                className="bg-green-100 text-green-700 px-4 py-2 rounded-lg font-bold flex items-center gap-2"
                                                            >
                                                                代課: {subId} ✕
                                                            </button>
                                                        ) : (
                                                            <select 
                                                                onChange={e => setAssignments({...assignments, [`${activeTab}-${idx}-${selectedTeacher}`]: e.target.value})}
                                                                className="bg-blue-600 text-white p-2 rounded-lg font-bold border-none"
                                                            >
                                                                <option value="">安排代課...</option>
                                                                {getAvailableTeachers(activeTab, idx).map(t => (
                                                                    <option key={t.id} value={t.id}>{t.id} (連課:{t.total})</option>
                                                                ))}
                                                            </select>
                                                        )}
                                                    </div>
                                                )}
                                                
                                                {/* 列印顯示區域 */}
                                                {isOcc && subId && (
                                                    <div className="hidden print:block border-2 border-black px-4 py-1 rounded bg-custard-yellow font-bold">
                                                        代課：{subId}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        // 初始化 React 渲染
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
