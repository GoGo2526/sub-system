        const SCHEDULE_STRUCTURE = [
            { type: 'class', id: 'HR', label: '班主任節', time: '8:15 - 8:35', csvKey: '班主任節' },
            { type: 'class', id: '1', label: '第一節', time: '8:35 - 9:10', csvKey: '1' },
            { type: 'class', id: '2', label: '第二節', time: '9:10 - 9:45', csvKey: '2' },
            { type: 'break', id: 'B1', label: '小息', time: '9:45 - 10:05', icon: 'sun', csvKey: 'B1' },
            { type: 'class', id: '3', label: '第三節', time: '10:05 - 10:40', csvKey: '3' },
            { type: 'class', id: '4', label: '第四節', time: '10:40 - 11:15', csvKey: '4' },
            { type: 'break', id: 'B2', label: '小休', time: '11:15 - 11:25', icon: 'coffee', csvKey: 'B2' },
            { type: 'class', id: '5', label: '第五節', time: '11:25 - 12:00', csvKey: '5' },
            { type: 'class', id: '6', label: '第六節', time: '12:00 - 12:35', csvKey: '6' },
            { type: 'class', id: 'LUNCH', label: '午膳', time: '12:35 - 1:15', icon: 'utensils', csvKey: 'LUNCH' },
            { type: 'break', id: 'REST', label: '午息', time: '1:15 - 1:35', icon: 'moon', csvKey: 'REST' },
            { type: 'class', id: '7', label: '第七節', time: '1:35 - 2:10', csvKey: '7' },
            { type: 'class', id: '8', label: '第八節', time: '2:10 - 2:45', csvKey: '8' },
            { type: 'class', id: '9', label: '第九節', time: '2:45 - 3:15', csvKey: '9' },
        ];

        const DAYS_CONFIG = [
            { id: 'mon', label: '一', offset: 1 },
            { id: 'tue', label: '二', offset: 2 },
            { id: 'wed', label: '三', offset: 3 },
            { id: 'thur', label: '四', offset: 4 },
            { id: 'fri', label: '五', offset: 5 }
        ];

        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [rawData, setRawData] = useState(DEFAULT_DATA);
            const [selectedTeacher, setSelectedTeacher] = useState("");
            const [activeTab, setActiveTab] = useState('mon');
            const [assignments, setAssignments] = useState({});
            const [leaveReasons, setLeaveReasons] = useState({});
            const [todayDate, setTodayDate] = useState(new Date());

            // 處理 Excel 上傳
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const wb = XLSX.read(evt.target.result, { type: 'binary' });
                    const newData = {};
                    wb.SheetNames.forEach(name => {
                        newData[name.toLowerCase()] = XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1 });
                    });
                    setRawData(newData);
                    alert("Excel 數據匯入成功！");
                };
                reader.readAsBinaryString(file);
            };

            const teachers = useMemo(() => {
                const dayData = rawData[activeTab] || [];
                const headerRow = dayData.find(row => row[0] && String(row[0]).includes("教師代號"));
                return headerRow ? headerRow.slice(1).filter(t => t && String(t).trim() !== "") : [];
            }, [rawData, activeTab]);

            const getTeacherSchedule = (teacherName, dayId) => {
                const dayData = rawData[dayId] || [];
                const headerRow = dayData.find(row => row[0] && String(row[0]).includes("教師代號"));
                if (!headerRow) return Array(SCHEDULE_STRUCTURE.length).fill("");
                const teacherIdx = headerRow.indexOf(teacherName);
                return SCHEDULE_STRUCTURE.map(slot => {
                    const row = dayData.find(r => r[0] && String(r[0]).includes(slot.csvKey));
                    return row ? row[teacherIdx] || "" : "";
                });
            };

            const isClassOccupied = (content) => {
                if (!content || String(content).trim() === "") return false;
                const ignore = ["小息", "小休", "午息", "午休", "班主任節", "午膳", "LUNCH", "REST", "BREAK"];
                return !ignore.some(k => String(content).toUpperCase().includes(k));
            };

            const getAvailableTeachers = (dayId, lessonIdx) => {
                return teachers
                    .filter(t => t !== selectedTeacher)
                    .map(t => {
                        const sch = getTeacherSchedule(t, dayId);
                        return { id: t, isFree: !isClassOccupied(sch[lessonIdx]), total: sch.filter(isClassOccupied).length };
                    })
                    .filter(res => res.isFree)
                    .sort((a, b) => a.total - b.total);
            };

            return (
                <div className="min-h-screen p-4 md:p-6">
                    <header className="max-w-7xl mx-auto mb-6 no-print flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-600 p-3 rounded-2xl shadow-lg"><Icon name="calendar" className="text-white w-6 h-6" /></div>
                            <div>
                                <h1 className="text-2xl font-black">觀塘官立小學(秀明道)</h1>
                                <p className="text-blue-600 font-bold">智能編代課系統 v1.13.0</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <label className="bg-white border-2 border-slate-200 px-4 py-2 rounded-xl font-bold cursor-pointer hover:bg-slate-50 flex items-center gap-2">
                                <Icon name="file-up" className="w-4 h-4" /> 匯入 Excel
                                <input type="file" className="hidden" accept=".xlsx" onChange={handleFileUpload} />
                            </label>
                            <button onClick={() => window.print()} className="bg-slate-800 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-black">
                                <Icon name="printer" className="w-4 h-4" /> 列印
                            </button>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto mb-6 no-print bg-white p-4 rounded-3xl shadow-sm border flex flex-wrap gap-4 items-center justify-between">
                        <select value={selectedTeacher} onChange={e => setSelectedTeacher(e.target.value)} className="bg-slate-100 p-3 rounded-xl font-bold text-lg min-w-[200px]">
                            <option value="">選擇缺席教師...</option>
                            {teachers.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            {DAYS_CONFIG.map(d => (
                                <button key={d.id} onClick={() => setActiveTab(d.id)} className={`px-6 py-2 rounded-lg font-black transition-all ${activeTab === d.id ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>
                                    {d.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    <main id="print-area" className="max-w-7xl mx-auto flex flex-col gap-8">
                        {selectedTeacher && [1, 2].map(copy => (
                            <div key={copy} className={`bg-white rounded-[2rem] shadow-xl border overflow-hidden ${copy === 2 ? 'hidden print:block print-copy' : 'print-copy'}`}>
                                <div className="p-8 border-b bg-slate-50 flex justify-between items-center">
                                    <div>
                                        <h2 className="text-3xl font-black">代課安排通知 ({selectedTeacher})</h2>
                                        <p className="text-lg font-bold text-slate-500 mt-1">日期：星期{DAYS_CONFIG.find(d => d.id === activeTab).label}</p>
                                    </div>
                                    <div className="text-right no-print">
                                        <span className="text-sm text-slate-400">副本 {copy}</span>
                                    </div>
                                </div>
                                <div className="p-6 space-y-3">
                                    {SCHEDULE_STRUCTURE.map((slot, idx) => {
                                        const sch = getTeacherSchedule(selectedTeacher, activeTab);
                                        const content = sch[idx];
                                        const isOcc = isClassOccupied(content);
                                        const sub = assignments[`${activeTab}-${idx}-${selectedTeacher}`];
                                        return (
                                            <div key={idx} className={`flex items-center gap-4 p-4 rounded-2xl border-2 ${isOcc ? 'border-slate-100' : 'opacity-40 bg-slate-50 border-transparent'}`}>
                                                <div className="w-24 text-center border-r pr-4">
                                                    <div className="text-xs font-black text-blue-600">{slot.label}</div>
                                                    <div className="text-sm font-bold text-slate-400">{slot.time}</div>
                                                </div>
                                                <div className="flex-1 text-xl font-black">{content || (isOcc ? "有課" : "空堂")}</div>
                                                {isOcc && (
                                                    <div className="no-print">
                                                        {sub ? (
                                                            <button onClick={() => {
                                                                const a = {...assignments}; delete a[`${activeTab}-${idx}-${selectedTeacher}`]; setAssignments(a);
                                                            }} className="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-xl font-bold flex items-center gap-2">
                                                                代課: {sub} <Icon name="x" className="w-4 h-4" />
                                                            </button>
                                                        ) : (
                                                            <select onChange={e => setAssignments({...assignments, [`${activeTab}-${idx}-${selectedTeacher}`]: e.target.value})} className="bg-blue-50 text-blue-700 p-2 rounded-xl font-bold border-none">
                                                                <option value="">安排代課...</option>
                                                                {getAvailableTeachers(activeTab, idx).map(t => <option key={t.id} value={t.id}>{t.id} (連課:{t.total})</option>)}
                                                            </select>
                                                        )}
                                                    </div>
                                                )}
                                                {isOcc && sub && <div className="hidden print:block border-2 border-black px-4 py-2 rounded-lg font-black bg-custard-yellow">代課：{sub}</div>}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
