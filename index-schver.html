            { type: 'class', id: '4', label: '第四節', time: '10:40 - 11:15', csvKey: '4' },
            { type: 'break', id: 'B2', label: '小休', time: '11:15 - 11:25', icon: <Coffee className="w-5 h-5 text-black" />, csvKey: 'B2' },
            { type: 'class', id: '5', label: '第五節', time: '11:25 - 12:00', csvKey: '5' },
            { type: 'class', id: '6', label: '第六節', time: '12:00 - 12:35', csvKey: '6' },
            { type: 'class', id: 'LUNCH', label: '午膳', time: '12:35 - 1:15', icon: <Utensils className="w-5 h-5 text-black" />, csvKey: 'LUNCH' },
            { type: 'break', id: 'REST', label: '午息', time: '1:15 - 1:35', icon: <Moon className="w-5 h-5 text-black" />, csvKey: 'REST' },

            { type: 'class', id: '8', label: '第八節', time: '2:10 - 2:45', csvKey: '8' },
            { type: 'class', id: '9', label: '第九節', time: '2:45 - 3:15', csvKey: '9' },
        ];

        const DAYS_CONFIG = [
            { id: 'mon', label: '一', offset: 1 },
            { id: 'tue', label: '二', offset: 2 },
            { id: 'wed', label: '三', offset: 3 },
            { id: 'thur', label: '四', offset: 4 },
            { id: 'fri', label: '五', offset: 5 }
        ];

        const MAROON_TEACHERS = ["張", "何", "李", "潘", "黎", "譚", "樊", "文", "鄧", "羅", "梁", "黃", "蔡", "伍", "袁", "皓", "和", "輝"];
        const GREEN_TEACHERS = ["達", "豪", "蓮", "廖", "婉", "慧", "Rachel"];

        function App() {
            const [rawData] = useState(INITIAL_RAW_DATA);
            const [selectedTeacher, setSelectedTeacher] = useState("");
            const [activeTab, setActiveTab] = useState('mon');
            const [subRequest, setSubRequest] = useState(null);
            const [assignments, setAssignments] = useState({});
            const [swapArrangements, setSwapArrangements] = useState({});
            const [isSwapMode, setIsSwapMode] = useState(false);
            const [leaveReasons, setLeaveReasons] = useState({});
            const [todayDate, setTodayDate] = useState(new Date());
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [showPassword, setShowPassword] = useState(false);
            const [loginError, setLoginError] = useState("");

            useEffect(() => {
                const day = todayDate.getDay();
                const dayMap = { 1: 'mon', 2: 'tue', 3: 'wed', 4: 'thur', 5: 'fri' };
                if (dayMap[day]) setActiveTab(dayMap[day]);
                const timer = setInterval(() => setTodayDate(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const displayDateInfo = useMemo(() => {
                const currentDayConfig = DAYS_CONFIG.find(d => d.id === activeTab);
                const dayOfWeek = todayDate.getDay();
                let baseDate = new Date(todayDate);
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    baseDate.setDate(todayDate.getDate() + (dayOfWeek === 0 ? 1 : 2));
                } else {
                    baseDate.setDate(todayDate.getDate() + (1 - dayOfWeek));
                }
                const targetDate = new Date(baseDate);
                targetDate.setDate(baseDate.getDate() + (currentDayConfig.offset - 1));
                return {
                dateString: targetDate.toLocaleDateString('zh-HK', { year: 'numeric', month: 'long', day: 'numeric' }),
                weekday: `星期${currentDayConfig.label}`,
                rawDate: targetDate
                };
            }, [activeTab, todayDate]);

            const teachers = useMemo(() => {
                const dayData = rawData[activeTab] || rawData.mon;
                const headerRow = dayData.find(row => row[0] && row[0].includes("教師代號"));
                return headerRow ? headerRow.slice(1).filter(t => t && t.trim() !== "") : [];
            }, [rawData, activeTab]);

            const getTeacherSchedule = (teacherName, dayId) => {
                const dayData = rawData[dayId] || rawData.mon;
                const headerRow = dayData.find(row => row[0] && row[0].includes("教師代號"));
                if (!headerRow) return Array(SCHEDULE_STRUCTURE.length).fill("");
                const teacherIdx = headerRow.indexOf(teacherName);
                if (teacherIdx === -1) return Array(SCHEDULE_STRUCTURE.length).fill("");
                return SCHEDULE_STRUCTURE.map(slot => {
                const dataRow = dayData.find(row => row[0] && row[0].includes(slot.csvKey));
                return dataRow ? dataRow[teacherIdx] || "" : "";
                });
            };

            const isClassOccupied = (content) => {
                if (!content || content.trim() === "") return false;
                const busyKeywords = ["BREAK", "REST", "小息", "小休", "午息", "午休", "班主任節"];
                return !busyKeywords.some(b => content.toUpperCase().includes(b));
            };

            const getAvailableTeachers = (dayId, lessonIdx) => {
                const available = [];
                const seenNames = new Set();
                teachers.forEach(t => {
                if (seenNames.has(t) || t === selectedTeacher) return;
                const schedule = getTeacherSchedule(t, dayId);
                if (!isClassOccupied(schedule[lessonIdx])) {
                    const totalLessons = schedule.filter(l => isClassOccupied(l)).length;
                    const hasPrevLesson = lessonIdx > 0 ? isClassOccupied(schedule[lessonIdx - 1]) : false;
                    const hasNextLesson = lessonIdx < schedule.length - 1 ? isClassOccupied(schedule[lessonIdx + 1]) : false;
                    available.push({ id: t, total: totalLessons, hasPrevLesson, hasNextLesson });
                    seenNames.add(t);
                }
                });
                return available.sort((a, b) => a.total - b.total);
            };

            const getTeacherTextColor = (name) => {
                if (MAROON_TEACHERS.includes(name)) return 'text-[#800000]';
                if (GREEN_TEACHERS.includes(name)) return 'text-emerald-700';
                return 'text-black';
            };

            const handleAssignSub = (lessonIdx, subId) => {
                const key = `${activeTab}-${lessonIdx}-${selectedTeacher}`;
                setAssignments(prev => ({ ...prev, [key]: subId }));
                
                if (isSwapMode) {
                setSwapArrangements(prev => ({
                    ...prev,
                    [key]: { date: '', period: '' }
                }));
                } else {
                setSwapArrangements(prev => {
                    const next = { ...prev };
                    delete next[key];
                    return next;
                });
                }
            };

            const handleRemoveSub = (lessonIdx) => {
                const key = `${activeTab}-${lessonIdx}-${selectedTeacher}`;
                const newAssignments = { ...assignments };
                delete newAssignments[key];
                setAssignments(newAssignments);

                setSwapArrangements(prev => {
                const next = { ...prev };
                delete next[key];
                return next;
                });
            };

            const handleUpdateSwap = (key, field, value) => {
                setSwapArrangements(prev => ({
                ...prev,
                [key]: {
                    ...prev[key],
                    [field]: value
                }
                }));
            };

            const handleReasonChange = (e) => {
                const key = `${selectedTeacher}-${activeTab}`;
                setLeaveReasons(prev => ({ ...prev, [key]: e.target.value }));
            };

            const handleExportExcel = () => {
                const { rawDate } = displayDateInfo;
                const yyyy = rawDate.getFullYear();
                const mm = String(rawDate.getMonth() + 1).padStart(2, '0');
                const dd = String(rawDate.getDate()).padStart(2, '0');
                const dateStr = `${yyyy}${mm}${dd}`;
                const processId = `SUB-${dateStr}`;
                const fileName = `${processId}.csv`;

                const leaveReason = leaveReasons[`${selectedTeacher}-${activeTab}`] || "未註明";
                const formattedDisplayDate = `${yyyy}年${mm}月${dd}日`;

                let csvContent = "\uFEFF";
                csvContent += "代課日期,缺課原因,原任老師,節數,時段,班別,科目,代課老師,處理編號,對調課堂\n";

                let hasData = false;

                SCHEDULE_STRUCTURE.forEach((slot, idx) => {
                const assignedSub = assignments[`${activeTab}-${idx}-${selectedTeacher}`];
                if (assignedSub) {
                    hasData = true;
                    const content = getTeacherSchedule(selectedTeacher, activeTab)[idx];
                    let classCode = "", subject = "";
                    
                    if (content && content.includes('/')) {
                    [classCode, subject] = content.split('/');
                    } else if (content) {
                    classCode = content;
                    subject = slot.id === 'HR' ? "班主任節" : slot.label;
                    }

                    let swapString = "";
                    const swapData = swapArrangements[`${activeTab}-${idx}-${selectedTeacher}`];
                    if (swapData && swapData.date && swapData.period) {
                    const d = new Date(swapData.date);
                    if (!isNaN(d.getTime())) {
                        const day = d.getDate();
                        const month = d.getMonth() + 1;
                        const weekday = ['日', '一', '二', '三', '四', '五', '六'][d.getDay()];
                        swapString = `${day}/${month} (${weekday}), ${swapData.period}`;
                    }
                    }

                    const row = [
                    formattedDisplayDate,
                    leaveReason,
                    selectedTeacher,
                    slot.label,
                    slot.time,
                    classCode,
                    subject,
                    assignedSub,
                    processId,
                    swapString
                    ].map(field => `"${field}"`).join(",");
                    
                    csvContent += row + "\n";
                }
                });

                if (!hasData) return;

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", fileName);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === 'Smr-12345') {
                setIsAuthenticated(true);
                setLoginError("");
                } else {
                setLoginError("密碼錯誤，請重新輸入。");
                setPasswordInput("");
                }
            };

            if (!isAuthenticated) {
                return (
                <div className="min-h-screen bg-[#F0F2F5] flex items-center justify-center p-4 font-sans text-slate-900">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl border-2 border-slate-100 max-w-md w-full text-center relative">
                    
                    <div className="flex justify-center mb-6">
                        <div className="bg-blue-600 p-4 rounded-[1.5rem] shadow-xl transform rotate-3">
                        <Calendar className="text-white w-10 h-10" />
                        </div>
                    </div>
                    <h1 className="text-3xl font-black text-slate-800 tracking-tight leading-none mb-3">觀塘官立小學(秀明道)</h1>
                    <h2 className="text-2xl font-bold text-blue-600 mb-8">智能編代課系統</h2>
                    
                    <form onSubmit={handleLogin} className="flex flex-col gap-6">
                        <div className="text-left">
                        <label className="text-lg font-black text-slate-700 mb-3 block">請輸入密碼：</label>
                        <div className="relative">
                            <input 
                            type={showPassword ? "text" : "password"}
                            value={passwordInput}
                            onChange={(e) => { setPasswordInput(e.target.value); setLoginError(""); }}
                            className={`w-full px-6 py-4 bg-slate-50 border-2 ${loginError ? 'border-rose-500' : 'border-slate-200'} rounded-2xl text-xl font-bold focus:border-blue-600 outline-none transition-all text-center tracking-widest pr-12`}
                            autoFocus
                            placeholder="•••••••••"
                            />
                            <button 
                            type="button"
                            onClick={() => setShowPassword(!showPassword)}
                            className="absolute right-4 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-slate-600 transition-colors"
                            >
                            {showPassword ? <EyeOff className="w-6 h-6" /> : <Eye className="w-6 h-6" />}
                            </button>
                        </div>
                        {loginError && (
                            <p className="text-rose-500 text-sm font-bold mt-3 text-center">{loginError}</p>
                        )}
                        </div>
                        <button 
                        type="submit"
                        className="bg-blue-600 text-white text-xl font-black py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all active:scale-95 mt-2"
                        >
                        登入系統
                        </button>
                    </form>
                    </div>
                </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#F0F2F5] text-slate-900 p-4 md:p-6 font-sans">
                
                <header className="max-w-7xl mx-auto mb-10 space-y-6">
                    <div className="flex items-start gap-5">
                    <div className="bg-blue-600 p-4 rounded-[1.5rem] shadow-xl transform rotate-3">
                        <Calendar className="text-white w-8 h-8" />
                    </div>
                    <div>
                        <h1 className="text-3xl font-black text-slate-800 tracking-tight leading-none mb-2">觀塘官立小學(秀明道)</h1>
                        <h2 className="text-xl font-bold text-blue-600">智能編代課系統 v.1.13.2</h2>
                    </div>
                    </div>

                    <div className="w-full flex flex-col md:flex-row items-center justify-between gap-4 bg-white p-2.5 rounded-3xl shadow-sm border border-slate-200">
                    <div className="relative group w-full md:w-auto min-w-[240px]">
                        <select
                        value={selectedTeacher}
                        onChange={(e) => { setSelectedTeacher(e.target.value); setSubRequest(null); }}
                        className="pl-11 pr-8 py-3.5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xl font-black hover:border-blue-600 outline-none transition-all cursor-pointer appearance-none w-full shadow-sm text-black"
                        >
                        <option value="" disabled>請選擇缺席教師...</option>
                        {teachers.map((t, idx) => (
                            <option key={`${t}-${idx}`} value={t} className={getTeacherTextColor(t)}>{t}</option>
                        ))}
                        </select>
                        <User className="absolute left-4 top-1/2 -translate-y-1/2 w-6 h-6 text-blue-600 pointer-events-none" />
                        <ChevronDown className="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 pointer-events-none" />
                    </div>

                    <div className="flex bg-slate-50 p-1.5 rounded-2xl w-full md:w-auto">
                        {DAYS_CONFIG.map(day => (
                        <button
                            key={day.id}
                            onClick={() => { setActiveTab(day.id); setSubRequest(null); }}
                            className={`flex-1 px-6 py-3 text-2xl font-black rounded-xl transition-all ${activeTab === day.id ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-blue-600'}`}
                        >
                            {day.label}
                        </button>
                        ))}
                    </div>
                    </div>
                </header>

                <div className="max-w-7xl mx-auto">
                    {!selectedTeacher ? (
                    <div className="bg-white rounded-[3rem] border-4 border-dashed border-slate-200 h-[50vh] flex flex-col items-center justify-center text-slate-400">
                        <User className="w-24 h-24 opacity-10 mb-8" />
                        <h3 className="text-3xl font-black mb-2 text-slate-500">準備開始編配代課</h3>
                        <p className="text-xl font-bold opacity-60">請先從上方選單揀選缺席教師</p>
                    </div>
                    ) : (
                    <div className="flex flex-col gap-8 w-full">
                        <div className="bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden">
                        
                        <div className="p-10 border-b border-slate-100 bg-gradient-to-br from-white to-blue-50/30">
                            <div className="flex gap-8">
                            <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-4xl font-black shadow-2xl">
                                {selectedTeacher.charAt(0)}
                            </div>
                            <div className="flex flex-col gap-2 w-full">
                                <h2 className="text-4xl font-black tracking-tighter text-black">上課時間表 ({selectedTeacher})</h2>
                                <p className="font-black text-2xl text-slate-700">日期：{displayDateInfo.dateString} ({displayDateInfo.weekday})</p>
                                <div className="mt-2 text-2xl font-black text-black flex flex-wrap items-center gap-1">
                                <span className="shrink-0">缺課原因：</span>
                                <div className="relative inline-flex items-center min-w-[180px]">
                                    <select 
                                    value={leaveReasons[`${selectedTeacher}-${activeTab}`] || ""} 
                                    onChange={handleReasonChange}
                                    className="bg-transparent border-none outline-none focus:ring-0 cursor-pointer text-black appearance-none pr-8 py-0"
                                    >
                                    <option value="">請揀選原因...</option>
                                    <option value="病假">病假</option>
                                    <option value="事假">事假</option>
                                    <option value="出席工作坊">出席工作坊</option>
                                    <option value="進修">進修</option>
                                    <option value="校內活動">校內活動</option>
                                    <option value="出外參觀">出外參觀</option>
                                    <option value="境外交流">境外交流</option>
                                    <option value="其他">其他</option>
                                    </select>
                                    <ChevronDown className="w-5 h-5 absolute right-0 text-slate-400 pointer-events-none" />
                                </div>
                                </div>
                            </div>
                            </div>
                        </div>

                        <div className="p-8 space-y-4">
                            {SCHEDULE_STRUCTURE.map((slot, idx) => {
                            const content = getTeacherSchedule(selectedTeacher, activeTab)[idx];
                            const isBreak = slot.type === 'break';
                            const isSelected = subRequest && subRequest.lessonIdx === idx;
                            const assignedSub = assignments[`${activeTab}-${idx}-${selectedTeacher}`];
                            const isActualLesson = isClassOccupied(content);
                            
                            let classCode = "", subject = "";
                            if (isActualLesson) {
                                if (content.includes('/')) [classCode, subject] = content.split('/');
                                else { classCode = content; subject = slot.id === 'HR' ? "班主任節" : slot.label; }
                            }

                            if (isBreak) {
                                return (
                                <div key={idx} className="bg-slate-100 border-2 border-slate-400 rounded-2xl py-3 px-8 flex items-center justify-between">
                                    <span className="text-lg font-black text-black tracking-widest">{slot.time}</span>
                                    <div className="flex items-center gap-4">
                                    <span className="font-black text-black text-2xl">{slot.label}</span>
                                    {slot.icon}
                                    </div>
                                </div>
                                );
                            }

                            return (
                                <div key={idx} className="relative">
                                <div 
                                    onClick={() => {
                                    if (isActualLesson && !assignedSub) {
                                        setSubRequest({ lessonIdx: idx });
                                        setIsSwapMode(false);
                                    }
                                    }}
                                    className={`flex flex-col md:flex-row gap-6 p-6 rounded-[2rem] border-2 transition-all ${
                                    isActualLesson 
                                        ? isSelected ? "bg-orange-50 border-[#800000] scale-[1.02] shadow-lg" 
                                        : assignedSub ? "bg-[#E3F2FD] border-slate-500"
                                        : slot.id === 'LUNCH' ? "bg-[#FFF9E3] border-slate-500 hover:border-blue-400 cursor-pointer"
                                        : "bg-white border-slate-500 hover:border-blue-400 cursor-pointer"
                                    : "bg-slate-50 border-slate-300"
                                    }`}
                                >
                                    <div className="md:w-56 flex flex-col justify-center border-r pr-6 border-slate-100">
                                    <span className="text-xl font-black uppercase tracking-tight text-slate-700">{slot.label}</span>
                                    <span className="text-3xl font-black mt-1 text-slate-800">{slot.time}</span>
                                    </div>

                                    <div className="flex-grow flex items-center">
                                    {isActualLesson ? (
                                        <div className="flex items-center justify-between w-full">
                                        <div className="flex items-center gap-8">
                                            <div className="px-6 py-2 bg-white rounded-xl font-black text-3xl tracking-tighter shadow-sm border-2 text-[#008080] border-[#008080]">
                                            {classCode}
                                            </div>
                                            <div className="text-3xl font-black text-blue-700">
                                            {subject}
                                            </div>
                                        </div>
                                        <div className="flex items-center ml-auto">
                                            {assignedSub ? (
                                            <div className="flex items-center gap-3 px-6 py-2">
                                                <span className={`${assignedSub === 'Rachel' ? 'text-2xl' : 'text-4xl'} font-black ${getTeacherTextColor(assignedSub)}`}>{assignedSub}</span>
                                                <span className="text-2xl font-bold opacity-80 text-slate-700">代課</span>
                                                <button onClick={(e) => { e.stopPropagation(); handleRemoveSub(idx); }} className="p-2 text-slate-400 hover:text-red-500 transition-colors"><XCircle className="w-7 h-7" /></button>
                                            </div>
                                            ) : !isSelected && (
                                            <div className="flex items-center gap-2 group text-slate-500">
                                                <UserPlus className="w-5 h-5 text-slate-400 group-hover:text-blue-600" />
                                                <span className="text-sm font-black uppercase tracking-wide group-hover:text-blue-600">安排代課</span>
                                            </div>
                                            )}
                                        </div>
                                        </div>
                                    ) : (
                                        <span className="text-3xl font-black text-slate-500 italic tracking-widest ml-4 uppercase">吉堂</span>
                                    )}
                                    </div>
                                </div>

                                {isSelected && (
                                    <div className="mt-4 p-8 bg-[#FFF9E3] border-2 border-slate-500 rounded-[2.5rem] shadow-xl">
                                    <div className="flex flex-col md:flex-row justify-between items-start gap-6 mb-8 text-black">
                                        <div className="flex flex-col gap-4 w-full">
                                        <h4 className="text-4xl font-black flex items-center gap-4">選擇代課教師</h4>
                                        <div className="bg-blue-50 border-2 border-slate-500 rounded-2xl p-4 flex flex-col gap-1.5 w-fit shadow-sm">
                                            <div className="flex items-center gap-2.5 text-sm font-bold text-black">
                                            <span className="w-2.5 h-2.5 rounded-full bg-red-500 inline-block shadow-sm"></span>
                                            <span>紅點：代表該節前後有課堂</span>
                                            </div>
                                            <div className="flex items-center gap-2.5 text-sm font-bold text-black">
                                            <span className="w-2.5 h-2.5 rounded-full bg-green-500 inline-block shadow-sm"></span>
                                            <span>綠點：代表該節前後沒有課堂</span>
                                            </div>
                                            <div className="flex items-center gap-2.5 text-sm font-bold text-black">
                                            <span className="w-2.5 text-center font-black">*</span>
                                            <span>左右點分別代表「前一節」及「後一節」的狀態</span>
                                            </div>
                                        </div>
                                        </div>
                                        <div className="flex items-center gap-4 shrink-0">
                                        <label className="flex items-center gap-2 cursor-pointer bg-white px-4 py-2 rounded-xl border-2 border-slate-500 font-black text-lg text-slate-700 hover:bg-slate-50 transition-all">
                                            <input 
                                            type="checkbox" 
                                            checked={isSwapMode}
                                            onChange={(e) => setIsSwapMode(e.target.checked)}
                                            className="w-5 h-5 accent-blue-600 cursor-pointer"
                                            />
                                            調堂
                                        </label>
                                        <button 
                                            onClick={() => setSubRequest(null)} 
                                            className="bg-white px-4 py-2 rounded-xl border-2 border-slate-500 font-black text-lg text-slate-700 hover:bg-slate-50 hover:shadow-md transition-all shrink-0"
                                        >
                                            取消選取
                                        </button>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-4">
                                        {getAvailableTeachers(activeTab, idx).map((sub, sIdx) => (
                                        <button key={`${sub.id}-${sIdx}`} onClick={() => { handleAssignSub(idx, sub.id); setSubRequest(null); }} className="bg-white p-6 rounded-2xl border-2 border-orange-300 hover:border-[#800000] hover:shadow-xl transition-all flex flex-col items-center group relative overflow-hidden">
                                            <div className="flex items-center gap-2 mb-3">
                                                <div className={`w-3 h-3 rounded-full shadow-sm ${sub.hasPrevLesson ? 'bg-red-500' : 'bg-green-500'}`} title="上一節"></div>
                                                <span className={`${sub.id === 'Rachel' ? 'text-2xl' : 'text-4xl'} font-black ${getTeacherTextColor(sub.id)}`}>{sub.id}</span>
                                                <div className={`w-3 h-3 rounded-full shadow-sm ${sub.hasNextLesson ? 'bg-red-500' : 'bg-green-500'}`} title="下一節"></div>
                                            </div>
                                            <span className="text-lg font-black text-slate-400 uppercase leading-none">總節數</span>
                                            <span className="text-3xl font-black text-slate-700">{sub.total}節</span>
                                        </button>
                                        ))}
                                    </div>
                                    </div>
                                )}
                                </div>
                            );
                            })}
                            
                            {Object.keys(swapArrangements).some(k => k.startsWith(`${activeTab}-`) && k.endsWith(`-${selectedTeacher}`)) && (
                            <div className="mt-8 pt-8 border-t-2 border-dashed border-slate-300">
                                <h3 className="text-2xl font-black text-slate-800 mb-6 flex items-center gap-3">
                                <Calendar className="w-6 h-6 text-blue-600" />
                                對調課堂安排
                                </h3>
                                <div className="flex flex-col gap-4">
                                {Object.entries(swapArrangements)
                                    .filter(([k]) => k.startsWith(`${activeTab}-`) && k.endsWith(`-${selectedTeacher}`))
                                    .sort((a, b) => parseInt(a[0].split('-')[1]) - parseInt(b[0].split('-')[1]))
                                    .map(([key, swap]) => {
                                    const idx = parseInt(key.split('-')[1]);
                                    const slot = SCHEDULE_STRUCTURE[idx];
                                    const content = getTeacherSchedule(selectedTeacher, activeTab)[idx];
                                    let classCode = "";
                                    let subject = "";
                                    if (content && content.includes('/')) {
                                        [classCode, subject] = content.split('/');
                                    } else if (content) {
                                        classCode = content;
                                        subject = slot.id === 'HR' ? "班主任節" : slot.label;
                                    }
                                    
                                    return (
                                        <div key={key} className="flex flex-col md:flex-row items-start md:items-center gap-4 bg-purple-50 p-5 rounded-2xl border-2 border-purple-200 shadow-sm">
                                        <div className="text-xl font-black text-slate-800 min-w-[150px]">
                                            {slot.label}
                                            {classCode && <span className="text-[#800000] ml-2">{classCode}</span>}
                                            {subject && <span className="text-blue-600 ml-2">{subject}</span>}
                                        </div>
                                        <div className="text-lg font-black text-slate-500 shrink-0">已安排</div>
                                        <div className="flex flex-wrap items-center gap-3 w-full md:w-auto">
                                            <input 
                                            type="date" 
                                            lang="en-GB"
                                            value={swap.date}
                                            onChange={(e) => {
                                                const val = e.target.value;
                                                if (val) {
                                                const d = new Date(val);
                                                if (d.getDay() === 0 || d.getDay() === 6) {
                                                    e.target.setCustomValidity("不能揀選「星期六」或「星期日」。");
                                                    e.target.reportValidity();
                                                    handleUpdateSwap(key, 'date', '');
                                                    return;
                                                }
                                                }
                                                e.target.setCustomValidity("");
                                                handleUpdateSwap(key, 'date', val);
                                            }}
                                            className="px-4 py-2.5 border-2 border-slate-300 rounded-xl font-bold text-slate-700 outline-none focus:border-blue-500 bg-white shadow-sm"
                                            />
                                            <select
                                            value={swap.period}
                                            onChange={(e) => handleUpdateSwap(key, 'period', e.target.value)}
                                            className="px-4 py-2.5 border-2 border-slate-300 rounded-xl font-bold text-slate-700 outline-none focus:border-blue-500 bg-white shadow-sm min-w-[120px]"
                                            >
                                            <option value="">請選擇節數</option>
                                            {SCHEDULE_STRUCTURE.filter(s => s.type === 'class').map(s => (
                                                <option key={s.id} value={s.label}>{s.label}</option>
                                            ))}
                                            </select>
                                            <div className="text-lg font-black text-slate-500 shrink-0">對調課堂</div>
                                        </div>
                                        </div>
                                    );
                                    })}
                                </div>
                            </div>
                            )}

                            <div className="flex flex-col md:flex-row justify-between items-center mt-12 pt-8 border-t-2 border-slate-200 gap-6">
                            <button
                                onClick={handleExportExcel}
                                className="flex items-center justify-center gap-3 w-full md:w-auto px-8 py-4 bg-emerald-600 text-white rounded-2xl font-black text-2xl hover:bg-emerald-700 hover:shadow-lg transition-all"
                            >
                                <Download className="w-8 h-8" />
                                輸出Excel檔案
                            </button>
                            
                            <button
                                onClick={() => window.open('https://www.ktgps-smr.edu.hk/sub-system/print.html', '_blank')}
                                className="flex items-center justify-center gap-3 w-full md:w-auto px-8 py-4 bg-[#800000] text-white rounded-2xl font-black text-2xl hover:bg-[#600000] hover:shadow-lg transition-all"
                            >
                                <FileText className="w-8 h-8" />
                                製作「代課通知單」
                            </button>
                            </div>

                            <div className="pt-8 pb-4"></div>
                        </div>
                        </div>
                    </div>
                    )}
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
